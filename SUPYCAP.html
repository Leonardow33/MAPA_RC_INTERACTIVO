<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo</title>
    <meta charset="utf-8" />    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json"/>
    <link rel="apple-touch-icon" href="icons/icon-192.png"/>
    <meta name="theme-color" content="#0F172A"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Leonardow33/MAPA_RC_INTERACTIVO@main/css/supycap.css">
</head>

<body>

<div id="filtro">

    <!-- 🔍 BUSCADOR -->
    <input type="text" id="buscador" placeholder="🔍 Buscar tienda o código..." />
    <div id="resultados"></div>

    <!-- FILTROS -->
    <label>Rol:</label>
    <select id="rolFilter">
        <option value="supervisor">Supervisor</option>
        <option value="capacitador" selected>Capacitador</option>
    </select>

    <label>Nombre:</label>
    <select id="nombreFilter">
        <option value="ALL">Todos</option>
    </select>
    <span id="zonaWrap" style="display:none;">
        <label>Zona:</label>
        <select id="zonaFilter">
            <option value="otra_zona">Otra zona</option>
            <option value="su_zona">Su zona</option>
        </select>
    </span>

    <label>Partner:</label>
    <select id="partnerFilter">
        <option value="ALL">Todos</option>
    </select>

    <button id="btnModo" onclick="toggleModo()" style="display:none;">🚗 Auto</button>
    <button id="btnRuta" onclick="generarRuta()" style="display:none;">🗺️ Generar Ruta</button>
    <button id="btnLimpiarRuta" onclick="limpiarRuta()" style="display:none;">✕ Limpiar Ruta</button>
    <button id="btnSinVenta" onclick="toggleSinVenta()">🔴 Sin Venta</button>

</div>
<div id="filtro-chips"></div>
<div id="sinVentaBar">
    <span>🔴 Sin venta hoy · <b id="sinVentaCount">0</b> tiendas</span>
    <span style="margin-left:auto;font-weight:400;font-size:11px">Actualizado: <span id="sinVentaTs">--:--</span></span>
</div>

<div id="panelRuta">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong style="font-size:15px">🗺️ Ruta por cercanía</strong>
        <button onclick="document.getElementById('panelRuta').style.display='none'" style="border:none;background:none;font-size:22px;cursor:pointer;color:#888;line-height:1">×</button>
    </div>
    <div id="listaRuta"></div>
</div>


<div id="map"></div>

<button id="btnUbicacion" onclick="irAUbicacion()" title="Mi ubicación">📍</button>
<div id="gpsBanner">
    <div id="gpsBannerMsg"></div>
    <button id="gpsBannerBtn"></button>
</div>

<!-- Logo + crédito -->
<div style="
    position:fixed;
    bottom:10px;left:10px;
    z-index:1000;
    pointer-events:none;
    display:flex;flex-direction:column;align-items:flex-start;gap:3px;">
    <img src="icons/GEODOR.png"
         style="height:42px;object-fit:contain;
                opacity:0.88;
                filter:drop-shadow(0 1px 4px rgba(0,0,0,0.35));" />
    <span style="
        font-family:sans-serif;
        font-size:10px;
        color:#555;
        background:rgba(255,255,255,0.72);
        padding:2px 7px;
        border-radius:4px;
        letter-spacing:0.3px;">
        Desarrollado por <strong>Doriant C. F.</strong>
    </span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
  var s = document.createElement('script');
  s.src = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? 'js/supycap.js'
    : 'https://cdn.jsdelivr.net/gh/Leonardow33/MAPA_RC_INTERACTIVO@38d3fc2ea551856c23c1cc787c8d24738da6be7c/js/supycap.js';
  document.currentScript.parentNode.insertBefore(s, document.currentScript.nextSibling);
</script>

</body>
</html>
