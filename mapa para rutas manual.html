<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Armador de Ruta Manual</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100dvh; font-family: Arial, sans-serif; overflow: hidden; }

        /* ── MAPA ─────────────────────────────────────────────── */
        #map { flex: 1; z-index: 1; }

        /* ── PANEL LATERAL (desktop) ──────────────────────────── */
        #panel {
            width: 310px;
            min-width: 310px;
            background: linear-gradient(to bottom, #f9e4e4, #f5ece4);
            border-right: 2px solid #c4897a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 200;
            transition: width 0.3s ease, min-width 0.3s ease;
        }
        #panel.collapsed { width: 0; min-width: 0; border-right: none; }

        #panel-handle { display: none; }

        /* ── HEADER ───────────────────────────────────────────── */
        #panel-header {
            padding: 12px 14px;
            background: linear-gradient(to right, #c4897a, #a06050);
            color: white;
            font-weight: bold;
            font-size: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        #btn-toggle-panel {
            background: rgba(255,255,255,0.25);
            border: none; color: white;
            border-radius: 6px; padding: 4px 9px;
            font-size: 14px; cursor: pointer; flex-shrink: 0;
        }

        /* ── 10 MAS CERCANOS ──────────────────────────────────── */
        #nearest-area {
            padding: 8px 10px;
            border-bottom: 1px solid #c4897a;
            flex-shrink: 0;
            display: flex; gap: 6px; align-items: center;
        }
        #partner-filter {
            flex: 1; padding: 7px 8px;
            border: 1px solid #c4897a; border-radius: 6px;
            font-size: 12px; background: white;
        }
        #btn-nearest {
            padding: 7px 10px;
            background: #e65100; color: white;
            border: none; border-radius: 6px;
            font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        #btn-nearest:active { background: #bf360c; }

        /* ── DISTRITO ─────────────────────────────────────────── */
        #distrito-area {
            padding: 6px 10px;
            border-bottom: 1px solid #c4897a;
            flex-shrink: 0;
            display: flex; gap: 8px; align-items: center;
        }
        #distrito-filter {
            flex: 1; padding: 7px 8px;
            border: 1px solid #c4897a; border-radius: 6px;
            font-size: 12px; background: white;
        }

        /* ── BUSQUEDA ─────────────────────────────────────────── */
        #search-area {
            padding: 10px;
            border-bottom: 1px solid #c4897a;
            flex-shrink: 0; position: relative;
        }
        #search-input {
            width: 100%; padding: 9px 10px;
            border: 1px solid #c4897a; border-radius: 6px;
            font-size: 14px; background: white;
        }
        #search-results {
            position: absolute; left: 10px; right: 10px;
            max-height: 200px; overflow-y: auto;
            background: white;
            border: 1px solid #c4897a; border-top: none;
            border-radius: 0 0 6px 6px;
            z-index: 300; display: none;
        }
        #search-results.visible { display: block; }
        .result-item {
            padding: 9px 10px; cursor: pointer;
            font-size: 13px; border-bottom: 1px solid #f0e0d8;
        }
        .result-item:active, .result-item:hover { background: #fde8e0; }
        .result-item.added { color: #aaa; cursor: default; }
        .result-item .r-sub { color: #999; font-size: 11px; }

        /* ── OPCIONES ─────────────────────────────────────────── */
        #opts-area {
            padding: 8px 10px;
            border-bottom: 1px solid #c4897a;
            flex-shrink: 0; font-size: 13px; color: #6d3d2a;
        }
        #opts-area label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
        #opts-area input[type=checkbox] { width: 16px; height: 16px; }

        /* ── LISTA PARADAS ────────────────────────────────────── */
        #stops-area { flex: 1; overflow-y: auto; padding: 10px; }
        #stops-title { font-size: 12px; font-weight: bold; color: #6d3d2a; margin-bottom: 8px; }
        #stops-list { list-style: none; }
        .stop-item {
            display: flex; align-items: center;
            background: white; border: 1px solid #ddd;
            border-radius: 8px; padding: 8px;
            margin-bottom: 6px; font-size: 13px; gap: 5px;
        }
        .stop-num {
            background: #1565C0; color: white;
            border-radius: 50%;
            width: 26px; height: 26px; min-width: 26px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 12px;
        }
        .stop-name { flex: 1; line-height: 1.4; }
        .stop-name small { color: #999; display: block; font-size: 10px; }
        .stop-up, .stop-down {
            background: none; border: 1px solid #ccc; border-radius: 4px;
            cursor: pointer; font-size: 12px; padding: 3px 7px; color: #555;
        }
        .stop-up:active, .stop-down:active { background: #f0e0d8; }
        .stop-remove {
            background: none; border: none; color: #c00;
            cursor: pointer; font-size: 20px; line-height: 1; padding: 0 2px;
        }
        #empty-msg { text-align: center; color: #bbb; font-size: 12px; margin-top: 24px; }

        /* ── BOTONES CALCULAR ─────────────────────────────────── */
        #btn-area {
            padding: 10px; border-top: 1px solid #c4897a;
            display: flex; gap: 8px; flex-shrink: 0;
        }
        #btn-calcular {
            flex: 1; padding: 12px;
            background: #1565C0; color: white;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        #btn-calcular:active:not(:disabled) { background: #0d47a1; }
        #btn-calcular:disabled { background: #aaa; cursor: default; }
        #btn-limpiar {
            padding: 12px 14px;
            background: #e53935; color: white;
            border: none; border-radius: 8px; font-size: 15px; cursor: pointer;
        }

        /* ── FAB abrir panel (mobile) ─────────────────────────── */
        #fab-abrir {
            display: none;
            position: fixed; top: 14px; left: 14px; z-index: 500;
            background: linear-gradient(to right, #c4897a, #a06050);
            color: white; border: none; border-radius: 10px;
            padding: 10px 14px; font-size: 14px; font-weight: bold;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3); cursor: pointer;
        }

        /* ── BARRA DE ACCION POST-RUTA ────────────────────────── */
        #route-action-bar {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; border-top: 2px solid #c4897a;
            padding: 10px 14px;
            padding-bottom: max(10px, env(safe-area-inset-bottom));
            z-index: 600; flex-direction: column; gap: 8px;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.15);
        }
        #route-action-bar.visible { display: flex; }
        #ra-stats {
            display: flex; gap: 14px; justify-content: center;
            font-size: 13px; color: #444; flex-wrap: wrap;
        }
        #ra-stats span { font-weight: 600; }
        #ra-btns { display: flex; gap: 8px; }
        #btn-navegar {
            flex: 1; padding: 12px;
            background: #2e7d32; color: white;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        #btn-navegar:active { background: #1b5e20; }
        #btn-ver-lista {
            padding: 12px 14px;
            background: #1565C0; color: white;
            border: none; border-radius: 8px;
            font-size: 13px; cursor: pointer;
        }
        #btn-nueva-ruta {
            padding: 12px 14px;
            background: #e53935; color: white;
            border: none; border-radius: 8px;
            font-size: 13px; cursor: pointer;
        }

        /* ── BARRA FILTROS MAPA ───────────────────────────────── */
        #map-filtros {
            position: fixed;
            top: 0; left: 312px; right: 0;
            z-index: 250;
            background: linear-gradient(to right, #f9e4e4, #f5ece4);
            border-bottom: 2px solid #c4897a;
            padding: 7px 14px;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(150,80,60,0.15);
            transition: left 0.3s ease;
        }
        #map-filtros.panel-oculto { left: 0; }
        #map-filtros label {
            font-size: 12px; font-weight: bold; color: #6d3d2a;
        }
        #map-filtros select {
            padding: 6px 8px; border: 1.5px solid #c4897a;
            border-radius: 8px; font-size: 13px;
            background: white; color: #4a2318; min-width: 140px;
        }
        #map-filtros select:focus { outline: none; border-color: #9c4f3a; }
        #map-total {
            margin-left: auto; font-size: 12px;
            color: #6d3d2a; font-weight: bold;
        }

        /* ── WATERMARK ────────────────────────────────────────── */
        #watermark {
            position: fixed; bottom: 10px; left: 320px;
            z-index: 100; display: flex; align-items: center; gap: 6px;
            opacity: 0.65; pointer-events: none;
        }
        #watermark img { height: 24px; }
        #watermark span { font-size: 10px; color: #555; }

        /* ═══════════════ MOBILE ≤ 768px ════════════════════════ */
        @media (max-width: 768px) {
            body { display: block; }

            #map-filtros {
                left: 0;
                padding: 6px 10px;
                gap: 6px;
            }
            #map-filtros select { min-width: 120px; font-size: 12px; }

            #map {
                position: fixed;
                top: 46px; left: 0; right: 0; bottom: 0; z-index: 1;
            }

            #panel {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                width: 100% !important; min-width: unset !important;
                max-height: 80dvh;
                border-right: none; border-top: 2px solid #c4897a;
                border-radius: 18px 18px 0 0;
                z-index: 400;
                transform: translateY(0);
                transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            }
            #panel.collapsed { transform: translateY(calc(100% - 54px)); }
            #panel.hidden    { transform: translateY(100%); }

            #panel-handle {
                display: block;
                width: 40px; height: 4px;
                background: #c4897a; border-radius: 3px;
                margin: 8px auto 4px; flex-shrink: 0;
            }

            #fab-abrir { display: block; }
            #fab-abrir.oculto { display: none; }

            #watermark { left: 10px; bottom: 70px; }

            #route-action-bar { bottom: 54px; }

            #search-input { font-size: 16px; padding: 11px 10px; }
            .stop-item { padding: 10px 8px; }
            #btn-calcular, #btn-limpiar { padding: 14px 12px; font-size: 15px; }
            #btn-navegar { font-size: 15px; padding: 14px; }
        }
    </style>
</head>
<body>

<button id="fab-abrir" class="oculto" onclick="abrirPanel()">&#x2630; Paradas</button>

<div id="panel">
    <div id="panel-handle"></div>

    <div id="panel-header">
        <span>&#x1F5FA;&#xFE0F; Armador de Ruta Manual</span>
        <button id="btn-toggle-panel" onclick="togglePanel()">&#x2212;</button>
    </div>

    <div id="nearest-area">
        <select id="partner-filter">
            <option value="">-- Todos los partners --</option>
        </select>
        <button id="btn-nearest">&#x1F4CD; 10 cercanos</button>
    </div>

    <div id="distrito-area">
        <label style="font-size:12px;color:#6d3d2a;font-weight:bold;">Distrito:</label>
        <select id="distrito-filter">
            <option value="">-- Todos --</option>
        </select>
    </div>

    <div id="search-area">
        <input type="text" id="search-input" placeholder="Buscar por nombre o ID..." autocomplete="off"/>
        <div id="search-results"></div>
    </div>

    <div id="opts-area">
        <label>
            <input type="checkbox" id="chk-optimizar" checked/>
            Optimizar orden automaticamente
        </label>
    </div>

    <div id="stops-area">
        <div id="stops-title">Paradas: <span id="stops-count">0</span></div>
        <ul id="stops-list"></ul>
        <div id="empty-msg">Busca tiendas o usa "10 cercanos"</div>
    </div>

    <div id="btn-area">
        <button id="btn-calcular" disabled>Calcular Ruta</button>
        <button id="btn-limpiar">&#x1F5D1;</button>
    </div>
</div>

<div id="map-filtros">
    <label>Partner:</label>
    <select id="map-partner-sel">
        <option value="">Todos</option>
    </select>
    <label>Distrito:</label>
    <div id="map-dist-wrap" style="position:relative;display:inline-flex;align-items:center;gap:4px;">
        <input type="text" id="map-distrito-input" placeholder="Buscar distrito..." autocomplete="off"
            style="padding:6px 8px;border:1.5px solid #c4897a;border-radius:8px;font-size:13px;background:white;color:#4a2318;min-width:150px;"/>
        <button id="map-dist-clear" onclick="clearMapDistrito()"
            style="display:none;background:#c4897a;border:none;color:white;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;">&#x2715;</button>
        <div id="map-dist-sugg" style="display:none;position:absolute;top:100%;left:0;min-width:180px;background:white;border:1.5px solid #c4897a;border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:999;"></div>
    </div>
    <span id="map-total"></span>
</div>

<div id="map"></div>

<div id="route-action-bar">
    <div id="ra-stats"></div>
    <div id="ra-btns">
        <button id="btn-navegar">&#x1F9ED; Iniciar Navegacion</button>
        <button id="btn-ver-lista" onclick="abrirPanel()">&#x1F4CB; Lista</button>
        <button id="btn-nueva-ruta" onclick="nuevaRuta()">&#x1F5D1;</button>
    </div>
</div>

<div id="watermark">
    <img src="GEODOR.png" alt="GEODOR"/>
    <span>Desarrollado por Doriant C. F.</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map("map").setView([-9.19, -75.0], 6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap contributors", maxZoom: 19
}).addTo(map);

let allData       = [];
let selectedStops = [];
let routeLayer    = null;
let stopMarkers   = [];
let userMarker    = null;
let userLatLng    = null;
let rutaOrdenada  = [];
const displayLayer = L.layerGroup().addTo(map);

const COLORES = {
    "APUESTA TOTAL": "#FB8C00",
    "TAMBO":         "#8E24AA",
    "TINBET":        "#43A047",
    "LIVESPORT":     "#1E88E5",
    "BODEGA":        "#29B6F6",
    "AUR BODEGA":    "#29B6F6"
};
function colorPartner(r) { return COLORES[r] || "#757575"; }

// ── DATOS ─────────────────────────────────────────────────────────────────
fetch("puntos.json")
    .then(r => r.json())
    .then(data => { allData = data; poblarPartners(); });

// ── GPS ───────────────────────────────────────────────────────────────────
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
        userLatLng = [pos.coords.latitude, pos.coords.longitude];
        if (!userMarker) {
            userMarker = L.circleMarker(userLatLng, {
                radius: 11, color: "#1565C0",
                fillColor: "#42a5f5", fillOpacity: 0.9, weight: 3
            }).addTo(map).bindPopup("Tu ubicacion actual");
            map.setView(userLatLng, 12);
        } else {
            userMarker.setLatLng(userLatLng);
        }
    }, null, { enableHighAccuracy: true });
}

// ── POBLAR FILTROS ────────────────────────────────────────────────────────
function poblarPartners() {
    // Panel de ruta: partner y distrito
    const sel = document.getElementById("partner-filter");
    const partners = [...new Set(allData.map(p => p.responsable).filter(Boolean))].sort();
    partners.forEach(v => {
        const o = document.createElement("option");
        o.value = v; o.textContent = v;
        sel.appendChild(o);
    });

    const dSel = document.getElementById("distrito-filter");
    const distritos = [...new Set(allData.map(p => p.distrito).filter(Boolean))].sort();
    distritos.forEach(v => {
        const o = document.createElement("option");
        o.value = v; o.textContent = v;
        dSel.appendChild(o);
    });

    document.getElementById("distrito-filter").addEventListener("change", () => {
        searchResults.innerHTML = "";
        searchResults.classList.remove("visible");
        searchInput.value = "";
    });

    // Barra de filtros del mapa (independiente)
    const mpSel = document.getElementById("map-partner-sel");
    partners.forEach(v => {
        const o = document.createElement("option");
        o.value = v; o.textContent = v;
        mpSel.appendChild(o);
    });

    // buscador de distrito en barra del mapa
    const mapDistInput = document.getElementById("map-distrito-input");
    const mapDistSugg  = document.getElementById("map-dist-sugg");
    const mapDistClear = document.getElementById("map-dist-clear");
    let   mapDistrito  = "";

    mapDistInput.addEventListener("input", function () {
        const q = this.value.trim().toLowerCase();
        mapDistSugg.innerHTML = "";
        if (q.length < 1) { mapDistSugg.style.display = "none"; return; }
        const matches = distritos.filter(d => d.toLowerCase().includes(q)).slice(0, 30);
        if (!matches.length) { mapDistSugg.style.display = "none"; return; }
        matches.forEach(d => {
            const div = document.createElement("div");
            div.textContent = d;
            div.style.cssText = "padding:8px 10px;cursor:pointer;font-size:13px;border-bottom:1px solid #f0e0d8;";
            div.addEventListener("mouseover", () => div.style.background = "#fde8e0");
            div.addEventListener("mouseout",  () => div.style.background = "");
            div.addEventListener("click", () => {
                mapDistrito          = d;
                mapDistInput.value   = d;
                mapDistClear.style.display = "inline-block";
                mapDistSugg.style.display  = "none";
                renderDisplayPoints();
            });
            mapDistSugg.appendChild(div);
        });
        mapDistSugg.style.display = "block";
    });

    document.addEventListener("click", e => {
        if (!e.target.closest("#map-dist-wrap")) mapDistSugg.style.display = "none";
    });

    window.clearMapDistrito = function () {
        mapDistrito                = "";
        mapDistInput.value         = "";
        mapDistClear.style.display = "none";
        mapDistSugg.style.display  = "none";
        renderDisplayPoints();
    };

    window._getMapDistrito = () => mapDistrito;

    document.getElementById("map-partner-sel").addEventListener("change", renderDisplayPoints);

    renderDisplayPoints();
}

// ── CAPA DE PUNTOS DEL MAPA ───────────────────────────────────────────────
function renderDisplayPoints() {
    displayLayer.clearLayers();
    const partnerVal  = document.getElementById("map-partner-sel").value;
    const distritoVal = (window._getMapDistrito && window._getMapDistrito()) || "";

    const filtered = allData.filter(p =>
        (!partnerVal  || p.responsable === partnerVal) &&
        (!distritoVal || p.distrito    === distritoVal)
    );

    document.getElementById("map-total").textContent = filtered.length + " puntos";

    const group = L.featureGroup();

    filtered.forEach(p => {
        const color = colorPartner(p.responsable);
        const m = L.circleMarker([p.lat, p.lng], {
            radius: 6, color: color, fillColor: color,
            fillOpacity: 0.75, weight: 1.5
        }).bindPopup(
            "<b>" + p.nombre + "</b><br>" +
            "ORG_CODE: " + p.ID + "<br>" +
            "RC: " + (p.rc||"-") + "<br>" +
            "Distrito: " + (p.distrito||"-") + "<br>" +
            "GZ: " + (p.gz||"-") + " · JZ: " + (p.jz||"-") + "<br><br>" +
            "<button onclick=\"addStopById('" + p.ID + "')\" style=\"width:100%;padding:7px;background:#1565C0;color:white;border:none;border-radius:6px;cursor:pointer;font-size:13px;\">+ Agregar a ruta</button>"
        );
        displayLayer.addLayer(m);
        group.addLayer(m);
    });

    // solo hace fitBounds cuando hay un filtro activo y hay puntos
    if ((partnerVal || distritoVal) && filtered.length > 0) {
        map.fitBounds(group.getBounds(), { padding: [40, 40], maxZoom: 15 });
    }
}

function addStopById(id) {
    const p = allData.find(x => x.ID === id);
    if (p) { addStop(p); map.closePopup(); }
}

// ── 10 MAS CERCANOS ───────────────────────────────────────────────────────
document.getElementById("btn-nearest").addEventListener("click", () => {
    if (!userLatLng) { alert("Esperando GPS. Activa la ubicacion e intenta de nuevo."); return; }
    const partner  = document.getElementById("partner-filter").value;
    const distSel  = document.getElementById("distrito-filter").value;
    let pool = allData;
    if (partner) pool = pool.filter(p => p.responsable === partner);
    if (distSel) pool = pool.filter(p => p.distrito === distSel);

    const conDist = pool
        .map(p => ({ ...p, _dist: haversine(userLatLng[0], userLatLng[1], p.lat, p.lng) }))
        .sort((a, b) => a._dist - b._dist);

    let agregados = 0;
    conDist.forEach(p => {
        if (agregados >= 10) return;
        if (!selectedStops.some(s => s.ID === p.ID)) {
            selectedStops.push(p);
            agregados++;
        }
    });
    renderList();
});

function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2
            + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ── BUSQUEDA ──────────────────────────────────────────────────────────────
const searchInput   = document.getElementById("search-input");
const searchResults = document.getElementById("search-results");

searchInput.addEventListener("input", function () {
    const q = this.value.trim().toLowerCase();
    searchResults.innerHTML = "";
    if (q.length < 2) { searchResults.classList.remove("visible"); return; }

    const distSel = document.getElementById("distrito-filter").value;
    const matches = allData.filter(p =>
        (!distSel || p.distrito === distSel) &&
        (p.nombre.toLowerCase().includes(q) ||
         String(p.ID).toLowerCase().includes(q) ||
         (p.rc && p.rc.toLowerCase().includes(q)))
    ).slice(0, 40);

    if (!matches.length) { searchResults.classList.remove("visible"); return; }

    matches.forEach(p => {
        const div = document.createElement("div");
        div.className = "result-item";
        const ya = selectedStops.some(s => s.ID === p.ID);
        if (ya) {
            div.classList.add("added");
            div.innerHTML = "✓ " + p.nombre + ' <span class="r-sub">' + p.ID + "</span>";
        } else {
            div.innerHTML = p.nombre + ' <span class="r-sub">' + p.ID + " · " + (p.rc || "") + "</span>";
            div.addEventListener("click", () => { addStop(p); searchInput.focus(); });
        }
        searchResults.appendChild(div);
    });
    searchResults.classList.add("visible");
});

document.addEventListener("click", e => {
    if (!e.target.closest("#search-area")) searchResults.classList.remove("visible");
});

// ── PARADAS ───────────────────────────────────────────────────────────────
function addStop(p) {
    if (selectedStops.some(s => s.ID === p.ID)) return;
    selectedStops.push(p);
    searchInput.value = "";
    searchResults.classList.remove("visible");
    renderList();
}

function removeStop(id) {
    selectedStops = selectedStops.filter(s => s.ID !== id);
    renderList();
}

function moveStop(id, dir) {
    const idx = selectedStops.findIndex(s => s.ID === id);
    if (idx < 0) return;
    const ni = idx + dir;
    if (ni < 0 || ni >= selectedStops.length) return;
    [selectedStops[idx], selectedStops[ni]] = [selectedStops[ni], selectedStops[idx]];
    renderList();
}

function renderList() {
    const ul    = document.getElementById("stops-list");
    const empty = document.getElementById("empty-msg");
    ul.innerHTML = "";
    document.getElementById("stops-count").textContent = selectedStops.length;
    document.getElementById("btn-calcular").disabled = selectedStops.length === 0;
    empty.style.display = selectedStops.length === 0 ? "block" : "none";

    selectedStops.forEach((p, i) => {
        const li = document.createElement("li");
        li.className = "stop-item";
        li.innerHTML =
            '<div class="stop-num">' + (i+1) + "</div>" +
            '<div class="stop-name">' + p.nombre + "<small>" + p.ID + " · " + (p.rc||"-") + "</small></div>" +
            '<button class="stop-up"   onclick="moveStop(\'' + p.ID + "',-1)\">▲</button>" +
            '<button class="stop-down" onclick="moveStop(\'' + p.ID + "',+1)\">▼</button>" +
            '<button class="stop-remove" onclick="removeStop(\'' + p.ID + "')\">×</button>";
        ul.appendChild(li);
    });
}

// ── PANEL TOGGLE ──────────────────────────────────────────────────────────
function togglePanel() {
    const panel = document.getElementById("panel");
    const btn   = document.getElementById("btn-toggle-panel");
    const isMob = window.innerWidth <= 768;

    const filtros = document.getElementById("map-filtros");
    if (panel.classList.contains("collapsed")) {
        panel.classList.remove("collapsed");
        filtros.classList.remove("panel-oculto");
        btn.textContent = "−";
        if (isMob) document.getElementById("fab-abrir").classList.add("oculto");
        else setTimeout(() => map.invalidateSize(), 320);
    } else {
        panel.classList.add("collapsed");
        filtros.classList.add("panel-oculto");
        btn.textContent = "+";
        if (!isMob) setTimeout(() => map.invalidateSize(), 320);
        else document.getElementById("fab-abrir").classList.remove("oculto");
    }
}

function abrirPanel() {
    const panel = document.getElementById("panel");
    panel.classList.remove("collapsed", "hidden");
    document.getElementById("btn-toggle-panel").textContent = "−";
    document.getElementById("fab-abrir").classList.add("oculto");
}

// ── LIMPIAR ───────────────────────────────────────────────────────────────
document.getElementById("btn-limpiar").addEventListener("click", nuevaRuta);

function nuevaRuta() {
    selectedStops = []; rutaOrdenada = [];
    renderList();
    clearRoute();
    document.getElementById("route-action-bar").classList.remove("visible");
    abrirPanel();
}

function clearRoute() {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    stopMarkers.forEach(m => map.removeLayer(m));
    stopMarkers = [];
}

// ── CALCULAR RUTA ─────────────────────────────────────────────────────────
document.getElementById("btn-calcular").addEventListener("click", calcularRuta);

async function calcularRuta() {
    if (!selectedStops.length) return;
    clearRoute();

    const optimizar = document.getElementById("chk-optimizar").checked;
    const pts = userLatLng
        ? [[userLatLng[1], userLatLng[0]], ...selectedStops.map(p => [p.lng, p.lat])]
        : selectedStops.map(p => [p.lng, p.lat]);

    const coordStr = pts.map(c => c[0]+","+c[1]).join(";");
    const url = optimizar
        ? "https://router.project-osrm.org/trip/v1/driving/"+coordStr+"?source=first&roundtrip=false&steps=false&geometries=geojson&overview=full"
        : "https://router.project-osrm.org/route/v1/driving/"+coordStr+"?steps=false&geometries=geojson&overview=full";

    const btn = document.getElementById("btn-calcular");
    btn.textContent = "Calculando...";
    btn.disabled = true;

    try {
        const json = await fetch(url).then(r => r.json());
        btn.textContent = "Calcular Ruta";
        btn.disabled = false;

        if (json.code !== "Ok") { alert("No se pudo calcular la ruta."); return; }

        let geometry, distM, durS;
        if (optimizar) {
            geometry = json.trips[0].geometry;
            distM    = json.trips[0].distance;
            durS     = json.trips[0].duration;
        } else {
            geometry = json.routes[0].geometry;
            distM    = json.routes[0].distance;
            durS     = json.routes[0].duration;
        }

        routeLayer = L.geoJSON(geometry, {
            style: { color: "#1565C0", weight: 5, opacity: 0.85 }
        }).addTo(map);

        if (optimizar) {
            const wpStops = userLatLng ? json.waypoints.slice(1) : json.waypoints;
            rutaOrdenada = wpStops
                .map((wp, i) => ({ orden: wp.waypoint_index, stop: selectedStops[i] }))
                .sort((a,b) => a.orden - b.orden)
                .map(x => x.stop);
        } else {
            rutaOrdenada = [...selectedStops];
        }

        rutaOrdenada.forEach((p, idx) => {
            if (!p) return;
            const icon = L.divIcon({
                className: "",
                html: '<div style="background:#1565C0;color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.45);">'+(idx+1)+"</div>",
                iconSize: [32,32], iconAnchor: [16,16]
            });
            const m = L.marker([p.lat, p.lng], { icon }).addTo(map)
                .bindPopup("<b>"+(idx+1)+". "+p.nombre+"</b><br>ORG_CODE: "+p.ID+"<br>RC: "+(p.rc||"-")+"<br>Usuario: "+(p.username||"-")+"<br>Distrito: "+(p.distrito||"-")+"<br>GZ: "+(p.gz||"-")+"<br>JZ: "+(p.jz||"-"));
            stopMarkers.push(m);
        });

        map.fitBounds(routeLayer.getBounds(), { padding: [50,50] });

        const distKm = (distM/1000).toFixed(1);
        const durMin = Math.round(durS/60);
        const hrs    = Math.floor(durMin/60);
        const mins   = durMin % 60;
        const durStr = hrs > 0 ? hrs+"h "+mins+"min" : mins+" min";

        document.getElementById("ra-stats").innerHTML =
            "<span>🏪 "+rutaOrdenada.length+" paradas</span>" +
            "<span>📏 ~"+distKm+" km</span>" +
            "<span>⏱️ ~"+durStr+"</span>";

        document.getElementById("route-action-bar").classList.add("visible");

        // Colapsar panel para ver el mapa completo
        const panel = document.getElementById("panel");
        panel.classList.add("collapsed");
        document.getElementById("btn-toggle-panel").textContent = "+";
        if (window.innerWidth <= 768) {
            document.getElementById("fab-abrir").classList.remove("oculto");
        } else {
            setTimeout(() => map.invalidateSize(), 320);
        }

    } catch(e) {
        document.getElementById("btn-calcular").textContent = "Calcular Ruta";
        document.getElementById("btn-calcular").disabled = false;
        alert("Error al conectar con el servicio de rutas.");
    }
}

// ── NAVEGACION GOOGLE MAPS ────────────────────────────────────────────────
document.getElementById("btn-navegar").addEventListener("click", () => {
    if (!rutaOrdenada.length) return;

    const wayps = [...rutaOrdenada];
    const dest  = wayps.pop();

    let url = "https://www.google.com/maps/dir/?api=1";

    if (userLatLng) {
        url += "&origin=" + userLatLng[0] + "," + userLatLng[1];
    } else if (wayps.length > 0) {
        const orig = wayps.shift();
        url += "&origin=" + orig.lat + "," + orig.lng;
    }

    url += "&destination=" + dest.lat + "," + dest.lng;

    if (wayps.length > 0) {
        // Google Maps soporta max 8 waypoints intermedios
        url += "&waypoints=" + encodeURIComponent(
            wayps.slice(0, 8).map(p => p.lat+","+p.lng).join("|")
        );
    }

    url += "&travelmode=driving";
    window.open(url, "_blank");
});
</script>
