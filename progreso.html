<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
  <title>Mi Progreso · GeoDor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #050505;
      --surf:  #0D0D0D;
      --surf2: #161616;
      --border:#242424;
      --text:  #FFFFFF;
      --muted: #888888;
      --dim:   #444444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOADING ──────────────────────────────────────── */
    #loading {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .spin {
      width: 26px; height: 26px;
      border: 2.5px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { font-size: 13px; color: var(--muted); }

    /* ── PORTAL ───────────────────────────────────────── */
    #portal {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 44px 16px 64px;
      min-height: 100vh;
    }

    .portal-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .portal-heading {
      font-size: clamp(24px, 6vw, 32px);
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
      text-wrap: balance;
    }

    .portal-sub {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 36px;
      max-width: 300px;
    }

    /* ── PARTNER GRID ─────────────────────────────────── */
    .partner-grid {
      width: 100%;
      max-width: 520px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 340px) { .partner-grid { grid-template-columns: 1fr; } }

    /* ── PARTNER CARD ─────────────────────────────────── */
    .pcard {
      border-radius: 18px;
      padding: 18px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      overflow: hidden;
      border: 1.5px solid transparent;
      background: var(--surf);
      transition: transform .15s, box-shadow .2s;
    }

    .pcard.active {
      border-color: color-mix(in srgb, var(--c) 35%, transparent);
      background: color-mix(in srgb, var(--c) 6%, var(--surf));
      cursor: default;
    }
    .pcard.active:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px color-mix(in srgb, var(--c) 20%, transparent);
    }

    .pcard.soon {
      border-color: var(--border);
      opacity: .55;
    }

    .pcard-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      width: fit-content;
    }
    .pcard.active  .pcard-badge { background: var(--c); color: #fff; }
    .pcard.soon    .pcard-badge { background: var(--border); color: var(--muted); }

    .pcard-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      color: color-mix(in srgb, var(--c) 70%, #fff);
    }
    .pcard.soon .pcard-name { color: var(--muted); }

    .soon-pill {
      display: none;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
      width: fit-content;
    }
    .pcard.soon .soon-pill { display: block; }

    /* Search inside active card */
    .card-search-wrap { width: 100%; position: relative; }

    .card-search-input {
      width: 100%;
      background: rgba(0,0,0,.4);
      border: 1px solid color-mix(in srgb, var(--c) 30%, transparent);
      border-radius: 10px;
      padding: 9px 10px 9px 32px;
      font-size: 12px;
      color: var(--text);
      font-family: inherit;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .card-search-input:focus {
      border-color: var(--c);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--c) 20%, transparent);
    }
    .card-search-input::placeholder { color: var(--dim); }

    .card-search-ico {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--dim);
      pointer-events: none;
    }

    .card-ac {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 30;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .card-ac.open { display: block; }

    .card-ac-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .card-ac-item:last-child { border-bottom: none; }
    .card-ac-item:hover {
      background: color-mix(in srgb, var(--c) 12%, transparent);
    }
    .card-ac-item .ci-name { font-size: 12px; font-weight: 600; }
    .card-ac-item .ci-meta { font-size: 10px; color: var(--dim); }

    /* ── ERROR ────────────────────────────────────────── */
    #error-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      gap: 12px;
    }
    .err-icon { font-size: 38px; }
    .err-msg  { font-size: 16px; font-weight: 700; }
    .err-sub  { font-size: 13px; color: var(--muted); max-width: 280px; }
    .err-btn  {
      margin-top: 8px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color .15s, color .15s;
    }
    .err-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── FOOTER ───────────────────────────────────────── */
    .portal-footer {
      margin-top: 36px;
      font-size: 11px;
      color: var(--dim);
      text-align: center;
    }

    @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="loading-msg" id="loading-msg">Identificando tienda…</div>
</div>

<div id="portal">
  <div class="portal-eyebrow">GeoDor · Mi Progreso</div>
  <h1 class="portal-heading">¿Cómo va tu tienda?</h1>
  <p class="portal-sub">Selecciona tu operador y busca tu punto de venta</p>

  <div class="partner-grid" id="partner-grid">
    <!-- cards generados por JS -->
  </div>

  <div class="portal-footer">Desarrollado por <strong>Doriant C. F.</strong> · GeoDor</div>
</div>

<div id="error-screen">
  <div class="err-icon">🔍</div>
  <div class="err-msg" id="err-msg">Tienda no encontrada</div>
  <div class="err-sub" id="err-sub">No se encontró una tienda con ese código.</div>
  <button class="err-btn" onclick="showPortal()">Buscar manualmente</button>
</div>

<script>
  // ── Configuración de partners ──────────────────────────
  const PARTNERS = [
    { key: 'APUESTA TOTAL', label: 'Apuesta Total', short: 'AT',     color: '#E53535', page: 'bonus_at.html',       active: true  },
    { key: 'TINBET',        label: 'Tinbet',         short: 'TIN',    color: '#16A34A', page: 'bonus_tinbet.html',   active: true  },
    { key: 'LIVESPORT',     label: 'Livesport',      short: 'LIVE',   color: '#2563EB', page: 'bonus_livesport.html',active: false },
    { key: 'RETABET',       label: 'Retabet',         short: 'RET',    color: '#7C3AED', page: 'bonus_retabet.html',  active: false },
    { key: 'DORADOBET',     label: 'Doradobet',       short: 'DOR',    color: '#D97706', page: null,                  active: false },
    { key: 'ACIERTALA',     label: 'Aciertala',       short: 'ACT',    color: '#0891B2', page: null,                  active: false },
    { key: 'LOTOBOLA',      label: 'Lotobola',         short: 'LOTO',   color: '#DB2777', page: null,                  active: false },
    { key: 'TAMBO',         label: 'Tambo',            short: 'TMB',    color: '#DC2626', page: null,                  active: false },
    { key: 'CENCOSUD',      label: 'Cencosud',         short: 'CEN',    color: '#0369A1', page: null,                  active: false },
    { key: 'AUR BODEGA',    label: 'Aur Bodega',       short: 'AUR',    color: '#65A30D', page: null,                  active: false },
    { key: 'FRANCO',        label: 'Franco',           short: 'FRA',    color: '#B45309', page: null,                  active: false },
    { key: 'JS BODEGA',     label: 'JS Bodega',        short: 'JS',     color: '#6D28D9', page: null,                  active: false },
    { key: 'MCG BODEGA',    label: 'MCG Bodega',       short: 'MCG',    color: '#0F766E', page: null,                  active: false },
  ];

  const PARTNER_MAP = {};
  PARTNERS.forEach(p => { PARTNER_MAP[p.key] = p; });

  let allStores = [];

  function loadJSON(u) {
    return fetch(u + '?v=' + Date.now(), { cache: 'no-store' }).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    });
  }

  function redirect(store) {
    const pkey = (store.responsable || '').toUpperCase().trim();
    const cfg  = PARTNER_MAP[pkey];
    if (cfg && cfg.active && cfg.page) {
      window.location.replace(cfg.page + '?id=' + store.ID);
    } else if (cfg && !cfg.active) {
      showError('Página en desarrollo', `El módulo de progreso para ${cfg.label} estará disponible próximamente.`);
    } else {
      showError('Partner no reconocido', `La tienda "${store.nombre}" tiene el operador "${store.responsable}" que aún no está configurado.`);
    }
  }

  function showError(msg, sub) {
    document.getElementById('loading').style.display      = 'none';
    document.getElementById('portal').style.display       = 'none';
    document.getElementById('err-msg').textContent        = msg;
    document.getElementById('err-sub').textContent        = sub;
    document.getElementById('error-screen').style.display = 'flex';
  }

  function showPortal() {
    document.getElementById('loading').style.display      = 'none';
    document.getElementById('error-screen').style.display = 'none';
    document.getElementById('portal').style.display       = 'flex';
  }

  function buildCard(cfg, stores) {
    const card = document.createElement('div');
    card.className = 'pcard ' + (cfg.active ? 'active' : 'soon');
    card.style.setProperty('--c', cfg.color);

    const badgeEl = document.createElement('div');
    badgeEl.className = 'pcard-badge';
    badgeEl.textContent = cfg.short;

    const nameEl = document.createElement('div');
    nameEl.className = 'pcard-name';
    nameEl.textContent = cfg.label;

    card.appendChild(badgeEl);
    card.appendChild(nameEl);

    if (cfg.active) {
      const wrap  = document.createElement('div');
      wrap.className = 'card-search-wrap';

      const ico = document.createElement('span');
      ico.className = 'card-search-ico';
      ico.textContent = '🔍';

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'card-search-input';
      input.placeholder = 'Nombre o código…';
      input.autocomplete = 'off';
      input.spellcheck = false;

      const ac = document.createElement('div');
      ac.className = 'card-ac';

      wrap.appendChild(ico);
      wrap.appendChild(input);
      wrap.appendChild(ac);
      card.appendChild(wrap);

      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        if (q.length < 2) { ac.classList.remove('open'); return; }
        const hits = stores.filter(p =>
          p.nombre.toLowerCase().includes(q) || String(p.ID).includes(q)
        ).slice(0, 8);
        if (!hits.length) { ac.classList.remove('open'); return; }
        ac.innerHTML = hits.map(p => `
          <div class="card-ac-item" data-id="${p.ID}" style="--c:${cfg.color}">
            <div class="ci-name">${p.nombre}</div>
            <div class="ci-meta">${p.ID}${p.zona ? ' · ' + p.zona : ''}${p.distrito ? ' · ' + p.distrito : ''}</div>
          </div>`).join('');
        ac.classList.add('open');
        ac.querySelectorAll('.card-ac-item').forEach(el => {
          el.addEventListener('click', () => {
            window.location.href = cfg.page + '?id=' + el.dataset.id;
          });
        });
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('.card-search-wrap')) ac.classList.remove('open');
      });

    } else {
      const pill = document.createElement('div');
      pill.className = 'soon-pill';
      pill.textContent = 'Próximamente';
      card.appendChild(pill);
    }

    return card;
  }

  async function init() {
    try {
      const puntosData = await loadJSON('data/puntos.json');
      allStores = Array.isArray(puntosData) ? puntosData : [];

      const params  = new URLSearchParams(location.search);
      const idParam = params.get('id') || params.get('tienda') || params.get('codigo');

      if (idParam) {
        document.getElementById('loading-msg').textContent = 'Buscando código ' + idParam + '…';
        const store = allStores.find(p => String(p.ID) === String(idParam));
        if (store) { redirect(store); }
        else {
          showError('Código no encontrado', `No existe ninguna tienda con el código "${idParam}".`);
        }
        return;
      }

      // Sin ID → mostrar portal
      const grid = document.getElementById('partner-grid');
      PARTNERS.forEach(cfg => {
        const stores = allStores.filter(p =>
          (p.responsable || '').toUpperCase().trim() === cfg.key &&
          (p.estado || '').toUpperCase() !== 'INACTIVO'
        );
        grid.appendChild(buildCard(cfg, stores));
      });

      showPortal();

    } catch(e) {
      document.getElementById('loading').innerHTML =
        `<div style="color:#F04444;font-size:13px;text-align:center;padding:20px">Error al cargar datos:<br>${e.message}</div>`;
      document.getElementById('loading').style.display = 'flex';
    }
  }

  init();
</script>
</body>
</html>
