<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<meta name="theme-color" content="#0F172A"/>
<title>Seguimiento de Visitas del RC</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/visitas.css">
</head>
<body>

<div id="authOverlay">
    <div id="authBox">
        <h2>📍 Seguimiento de Visitas del RC</h2>
        <p>Ingresa la contraseña para continuar</p>
        <input id="authInput" type="password" placeholder="Contraseña" onkeydown="if(event.key==='Enter') checkAuth()"/>
        <button id="authBtn" onclick="checkAuth()">Ingresar</button>
        <div id="authError">Contraseña incorrecta</div>
    </div>
</div>

<div id="switchOverlay">
    <div id="switchBox">
        <h3 id="switchTitle">Cambiar modo</h3>
        <p id="switchDesc">Ingresa la contraseña para continuar</p>
        <input id="switchInput" type="password" placeholder="Contraseña"
               onkeydown="if(event.key==='Enter') confirmarSwitch()"/>
        <div class="switch-btns">
            <button id="switchConfirm" onclick="confirmarSwitch()">Confirmar</button>
            <button id="switchCancel" onclick="cancelarSwitch()">Cancelar</button>
        </div>
        <div id="switchError">Contraseña incorrecta</div>
    </div>
</div>

<div id="header">
    <h1>📍 Seguimiento de Visitas del RC</h1>
    <button id="btnModoRC" class="activo" onclick="setModoVista('rc')">👤 RCs</button>
    <button id="btnModoCap" onclick="setModoVista('cap')">🎓 Capacitadores</button>
    <select id="fechaFilter"></select>
    <select id="supFilter"><option value="ALL">Todos los supervisores</option></select>
    <select id="semanaFilter"></select>
    <select id="zonalTipoFilter">
        <option value="ALL">Lima + Provincia</option>
        <option value="LIMA">Solo Lima</option>
        <option value="PROVINCIA">Solo Provincia</option>
    </select>
    <button id="btnTodosPuntos" class="activo" onclick="toggleTodosPuntos()">📍 Todos los puntos</button>
    <button id="btnRutaHoy" onclick="toggleRutaHoy()" disabled>📅 Ruta Hoy</button>
    <button id="btnSinVenta" onclick="toggleSinVenta()">🔴 Sin Venta</button>
    <span id="lastUpdate">--</span>
</div>

<div id="content">
    <div id="panel">
        <div id="panelHandle" onclick="togglePanel()"></div>
        <div id="rcSection">
            <div id="panelHeader">RCs activos hoy</div>
            <div id="rcList"><div id="noData">Cargando...</div></div>
        </div>
        <div id="coberturaSection">
            <div id="coberturaHeader">
                <span>📊 Cobertura por partner</span>
                <button id="btnDescarga" onclick="descargarSinVisita()">⬇ CSV</button>
            </div>
            <div id="coberturaResumen">
                <div class="res-total" id="resumenTexto">— / — puntos visitados</div>
                <div class="res-bar"><div class="res-bar-fill" id="resumenBar" style="width:0%;background:#43A047"></div></div>
            </div>
            <div id="coberturaList"></div>
        </div>
    </div>
    <button id="panelToggle" onclick="togglePanel()">&#128100; Ver RCs</button>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/visitas.js"></script>

</body>
</html>
