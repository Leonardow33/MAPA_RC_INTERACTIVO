<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bonos Tambo · GeoDor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0F172A;
      --surface:  #1E293B;
      --border:   #334155;
      --text:     #E2E8F0;
      --muted:    #94A3B8;
      --green:    #22C55E;
      --red:      #EF4444;
      --yellow:   #F59E0B;
      --blue:     #3B82F6;
      --accent:   #6366F1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header h1 { font-size: 18px; font-weight: 700; color: #fff; flex: 1; }
    .header .updated { font-size: 12px; color: var(--muted); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 14px 20px;
      background: var(--bg);
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 120px;
    }
    .stat-card .stat-val { font-size: 22px; font-weight: 700; }
    .stat-card .stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .stat-card.green .stat-val { color: var(--green); }
    .stat-card.red   .stat-val { color: var(--red); }
    .stat-card.blue  .stat-val { color: var(--blue); }

    /* ── FILTROS ── */
    .filtros {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }
    .filtros input, .filtros select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
    }
    .filtros input { width: 220px; }
    .filtros input:focus, .filtros select:focus { border-color: var(--accent); }
    .filtros .toggle-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
      white-space: nowrap;
    }
    .filtros .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filtros .count { margin-left: auto; color: var(--muted); font-size: 12px; white-space: nowrap; }

    /* ── TABLA WRAPPER ── */
    .tabla-wrap {
      overflow-x: auto;
      padding: 16px 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 740px;
    }
    thead th {
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-icon { margin-left: 4px; opacity: .4; }
    thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:hover { background: var(--surface); }

    td { padding: 9px 12px; vertical-align: middle; }

    /* nombre tienda */
    .td-nombre { font-weight: 600; font-size: 13px; }
    .td-code   { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* cluster badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .badge-A { background: #7C3AED22; color: #A78BFA; border: 1px solid #7C3AED55; }
    .badge-B { background: #0EA5E922; color: #38BDF8; border: 1px solid #0EA5E955; }
    .badge-C { background: #10B98122; color: #34D399; border: 1px solid #10B98155; }
    .badge-D { background: #F59E0B22; color: #FCD34D; border: 1px solid #F59E0B55; }

    /* métrica con barra */
    .metrica {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 90px;
    }
    .metrica-nums {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }
    .metrica-nums .actual { font-weight: 700; }
    .metrica-nums .meta   { color: var(--muted); }
    .bar-track {
      height: 5px;
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .3s;
    }
    .bar-fill.ok   { background: var(--green); }
    .bar-fill.warn { background: var(--yellow); }
    .bar-fill.bad  { background: var(--red); }

    /* estado */
    .estado-ganando {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #22C55E18;
      color: var(--green);
      border: 1px solid #22C55E44;
      white-space: nowrap;
    }
    .estado-no {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: #EF444418;
      color: var(--red);
      border: 1px solid #EF444444;
      white-space: nowrap;
    }
    .estado-sin {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    /* separador ganando / no ganando */
    .separator td {
      background: var(--surface);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      padding: 6px 12px;
      border-top: 2px solid var(--border);
    }

    /* loading / error */
    .msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .msg.error { color: var(--red); }

    .td-rc { font-size: 12px; color: var(--muted); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .td-bono { font-size: 12px; color: var(--green); font-weight: 700; white-space: nowrap; }
    .td-bono-empty { font-size: 12px; color: var(--muted); }

    .dl-btn {
      background: #1D4ED822;
      border-color: #3B82F655;
      color: #60A5FA;
    }
    .dl-btn:hover { background: #1D4ED844; }

    /* ── TABS ── */
    .tab-nav {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 20px;
    }
    .tab-btn {
      padding: 11px 22px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── PANEL PAGOS ── */
    .pagos-bar {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pagos-autocomplete { position: relative; }
    #pagos-input {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      outline: none;
    }
    #pagos-input:focus { border-color: var(--accent); }
    .pagos-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 340px;
      max-height: 280px;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      display: none;
    }
    .pagos-dd-item {
      padding: 9px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .pagos-dd-item:last-child { border-bottom: none; }
    .pagos-dd-item:hover, .pagos-dd-item.focused { background: var(--bg); color: var(--accent); }
    .pagos-result { padding: 20px; }
    .pagos-store-title {
      font-size: 18px; font-weight: 700; margin-bottom: 4px;
    }
    .pagos-store-sub {
      font-size: 12px; color: var(--muted); margin-bottom: 16px;
    }
    .meses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .mes-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .mes-card:hover { border-color: var(--accent); }
    .mes-card.active { border-color: var(--accent); background: rgba(99,102,241,.08); }
    .mes-card .mc-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
    .mes-card .mc-total { font-size: 24px; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
    .mes-card .mc-n { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .pagos-detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .pagos-detail h3 {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .pagos-detail table {
      width: 100%;
      border-collapse: collapse;
      min-width: 400px;
    }
    .pagos-detail thead th {
      background: var(--bg);
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 8px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .pagos-detail tbody tr:hover { background: rgba(255,255,255,.03); }
    .pagos-detail tbody td {
      padding: 9px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .pagos-detail tbody tr:last-child td { border-bottom: none; }
    .pagos-detail .td-monto { font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; text-align: right; }
    .pagos-detail .td-total-row td { background: rgba(99,102,241,.07); font-weight: 700; }
    .pagos-placeholder {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
    }
  </style>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="header">
  <h1>🏆 Bonos Tambo</h1>
  <span class="updated" id="updated">Cargando...</span>
</div>

<nav class="tab-nav">
  <button class="tab-btn active" id="tab-bonos" onclick="setTab('bonos')">📊 Bonos Semana</button>
  <button class="tab-btn" id="tab-pagos" onclick="setTab('pagos')">💳 Pagos SR</button>
</nav>

<div id="panel-bonos">
<div class="stats-bar">
  <div class="stat-card green">
    <span class="stat-val" id="cnt-ganando">—</span>
    <span class="stat-lbl">Ganando bono</span>
  </div>
  <div class="stat-card red">
    <span class="stat-val" id="cnt-falta">—</span>
    <span class="stat-lbl">Por alcanzar</span>
  </div>
  <div class="stat-card blue">
    <span class="stat-val" id="cnt-total">—</span>
    <span class="stat-lbl">Total tiendas</span>
  </div>
  <div class="stat-card">
    <span class="stat-val" id="pct-ganando" style="color:var(--accent)">—</span>
    <span class="stat-lbl">% ganando</span>
  </div>
  <div class="stat-card" style="border-color:var(--accent)33">
    <span class="stat-val" id="cnt-registros" style="color:var(--muted);font-size:16px">—</span>
    <span class="stat-lbl">Registros semana</span>
  </div>
  <div style="width:1px;background:var(--border);margin:4px 4px;align-self:stretch"></div>
  <div class="stat-card" style="border-color:#10B98144">
    <span class="stat-val" id="stat-total-tienda" style="color:#34D399;font-size:18px">—</span>
    <span class="stat-lbl">Bono Tienda</span>
  </div>
  <div class="stat-card" style="border-color:#38BDF844">
    <span class="stat-val" id="stat-total-admi" style="color:#38BDF8;font-size:18px">—</span>
    <span class="stat-lbl">Bono Admin</span>
  </div>
  <div class="stat-card" style="border-color:#F59E0B55;background:#F59E0B08;min-width:150px">
    <span class="stat-val" id="stat-total-pagar" style="color:#F59E0B;font-size:26px;font-weight:800">—</span>
    <span class="stat-lbl" style="color:#F59E0B;opacity:.7">Total a pagar</span>
  </div>
</div>

<div class="filtros">
  <select id="filtro-semana" style="font-weight:600;color:var(--text);border-color:var(--accent)"></select>
  <input type="search" id="buscar" placeholder="🔍 Buscar tienda o código..."/>
  <select id="filtro-cluster">
    <option value="">Cluster</option>
    <option value="A">Cluster A</option>
    <option value="B">Cluster B</option>
    <option value="C">Cluster C</option>
    <option value="D">Cluster D</option>
  </select>
  <select id="filtro-rc"><option value="">RC</option></select>
  <select id="filtro-sup"><option value="">Supervisor</option></select>
  <button class="toggle-btn active" id="btn-ganando" onclick="toggleFiltroGanando()">★ Solo ganando</button>
  <button class="toggle-btn" id="btn-todas" onclick="toggleFiltroTodas()">Todas las tiendas</button>
  <button class="toggle-btn dl-btn" onclick="descargarFormato1()">⬇ Formato Excel</button>
  <span class="count" id="count-label"></span>
</div>

<div class="tabla-wrap">
  <div id="msg" class="msg">Cargando datos...</div>
  <table id="tabla" style="display:none">
    <thead>
      <tr>
        <th onclick="sortBy('nombre')">Tienda <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('cluster')">Cluster <span class="sort-icon">↕</span></th>
        <th>RC</th>
        <th onclick="sortBy('pp')">PozoPower <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('ld')">LakiDey <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('total')">Total <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('estado')">Estado <span class="sort-icon">↕</span></th>
        <th>B. Tienda</th>
        <th>B. Admin</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
</div><!-- /panel-bonos -->

<div id="panel-pagos" style="display:none">
  <div class="pagos-bar">
    <div class="pagos-autocomplete">
      <input type="search" id="pagos-input" placeholder="🔍 Buscar tienda Tambo..." autocomplete="off"/>
      <div class="pagos-dropdown" id="pagos-dropdown"></div>
    </div>
    <span id="pagos-stat" style="color:var(--muted);font-size:13px"></span>
  </div>
  <div class="pagos-result" id="pagos-result">
    <div class="pagos-placeholder">Busca una tienda para ver su historial de pagos SR</div>
  </div>
</div>

<script>
  // ── Premios por cluster ────────────────────────────────────────
  const PREMIOS_MAP = {
    A: { tienda: 100, admi: 70 },
    B: { tienda:  70, admi: 50 },
    C: { tienda:  50, admi: 40 },
    D: { tienda:  40, admi: 30 },
  };

  // ── Número de bono de la semana (1–5) dentro del mes ──────────
  function getBonoNumero(juevesFecha) {
    const mes  = juevesFecha.getMonth();
    const anio = juevesFecha.getFullYear();
    // Primer jueves del mes
    let primerJueves = new Date(anio, mes, 1);
    while (primerJueves.getDay() !== 4) primerJueves.setDate(primerJueves.getDate() + 1);
    const diffMs    = juevesFecha - primerJueves;
    const diffSem   = Math.round(diffMs / (7 * 24 * 60 * 60 * 1000));
    return Math.max(1, Math.min(5, diffSem + 1));
  }

  // ── Semanas Jue→Mié ───────────────────────────────────────────
  function juevesDe(fecha) {
    const d = new Date(fecha);
    d.setHours(0, 0, 0, 0);
    const offset = [3, 4, 5, 6, 0, 1, 2]; // Dom=3, Lun=4... Jue=0, Vie=1...
    d.setDate(d.getDate() - offset[d.getDay()]);
    return d;
  }

  function semanaLabel(jueves) {
    const mies = new Date(jueves);
    mies.setDate(jueves.getDate() + 6);
    return `${fmtFecha(jueves)} — ${fmtFecha(mies)}`;
  }

  function fmtFecha(d) {
    const dias  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
  }

  function isoDate(d) {
    return d.toISOString().slice(0, 10);
  }

  // ── Estado global ──────────────────────────────────────────────
  let TIENDAS   = [];   // array de objetos calculados
  let sortCol   = 'estado';
  let sortAsc   = false;
  let modoFiltro = 'ganando'; // 'ganando' | 'todas'

  // ── Utilidades ─────────────────────────────────────────────────
  const bar = (actual, meta) => {
    const pct = meta > 0 ? Math.min(100, (actual / meta) * 100) : 0;
    const cls = pct >= 100 ? 'ok' : pct >= 60 ? 'warn' : 'bad';
    return `
      <div class="metrica">
        <div class="metrica-nums">
          <span class="actual">${fmtN(actual)}</span>
          <span class="meta">/ ${fmtN(meta)}</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      </div>`;
  };

  const fmtN = n => n >= 1000 ? (n/1000).toFixed(1)+'k' : String(Math.round(n));

  const badgeCluster = c =>
    `<span class="badge badge-${c}">${c || '—'}</span>`;

  const estadoHTML = t => {
    if (!t.cluster_bono || !['A','B','C','D'].includes(t.cluster_bono))
      return `<span class="estado-sin">Sin cluster</span>`;
    if (t.ganando) {
      const upward = t.bono_tier && t.bono_tier !== t.cluster_bono;
      const extra  = upward
        ? ` <span style="font-size:10px;background:rgba(34,197,94,.15);padding:1px 5px;border-radius:3px;color:#4ade80">↑${t.bono_tier}</span>`
        : '';
      return `<span class="estado-ganando">✓ BONO${extra}</span>`;
    }
    return `<span class="estado-no">✗ Falta</span>`;
  };

  // ── Carga de datos ──────────────────────────────────────────────
  async function loadJSON(url) {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) throw new Error(`${r.status} ${url}`);
    return r.json();
  }

  async function init() {
    try {
      const [ventas, puntos, keys] = await Promise.all([
        loadJSON('data/ventas_mes.json'),
        loadJSON('data/puntos.json'),
        loadJSON('data/keys_bonos.json'),
      ]);

      document.getElementById('updated').textContent =
        `Datos: ${ventas.updated || ventas.ts || '—'}`;

      // Mapa de mínimos por cluster
      const KEYS = {};
      keys.forEach(k => { KEYS[k.cluster] = k; });

      // ── Detectar semanas disponibles en los datos ──────────────
      const registros = ventas.body || ventas.ventas || [];
      const semanasMap = {};
      registros.forEach(v => {
        if (!v.fecha) return;
        const jue = juevesDe(new Date(v.fecha + 'T12:00:00'));
        const key = isoDate(jue);
        if (!semanasMap[key]) semanasMap[key] = jue;
      });

      const semanas = Object.values(semanasMap)
        .sort((a, b) => b - a); // más reciente primero

      const selSemana = document.getElementById('filtro-semana');
      selSemana.innerHTML = '';
      semanas.forEach((jue, i) => {
        const opt = document.createElement('option');
        opt.value = isoDate(jue);
        opt.textContent = semanaLabel(jue) + (i === 0 ? ' (actual)' : '');
        selSemana.appendChild(opt);
      });

      // Guardar estado global para recalcular al cambiar semana
      window.TODAS_VENTAS = ventas.body || ventas.ventas || [];
      window.KEYS         = KEYS;

      // Filtrar solo tiendas Tambo (por tipo o por tener cluster_bono A/B/C/D)
      window.TAMBOS = puntos.filter(p => {
        const tipo = String(p.tipo || '').toUpperCase();
        const cb   = String(p.cluster_bono || '').trim().toUpperCase();
        return tipo.includes('TAMBO') || ['A','B','C','D'].includes(cb);
      });
      // Inactivos — solo para la alerta
      window.TAMBOS_INACTIVOS = window.TAMBOS.filter(p =>
        (p.estado || '').toUpperCase() === 'INACTIVO'
      );

      // Poblar filtros de RC/Supervisor (no cambian con la semana)
      poblarSelect('filtro-rc',  [...new Set(window.TAMBOS.map(p => p.rc || '').filter(Boolean))].sort());
      poblarSelect('filtro-sup', [...new Set(window.TAMBOS.map(p => p.supervisor || '').filter(Boolean))].sort());

      calcularSemana();

    } catch(e) {
      document.getElementById('msg').className = 'msg error';
      document.getElementById('msg').textContent = 'Error al cargar datos: ' + e.message;
    }
  }

  // ── Recalcular TIENDAS para la semana seleccionada ─────────────
  function calcularSemana() {
    const selVal = document.getElementById('filtro-semana').value;
    if (!selVal) return;

    const jueves    = new Date(selVal + 'T00:00:00');
    window.SEMANA_JUEVES = jueves;
    const miercoles = new Date(jueves);
    miercoles.setDate(jueves.getDate() + 6);
    miercoles.setHours(23, 59, 59, 999);

    // Agregar ventas de la semana seleccionada
    const ventasMap = {};
    let registros = 0;
    (window.TODAS_VENTAS || []).forEach(v => {
      const fecha = new Date(v.fecha + 'T12:00:00');
      if (fecha < jueves || fecha > miercoles) return;
      registros++;
      const id = String(v.org_code);
      if (!ventasMap[id]) ventasMap[id] = { pp: 0, ld: 0, grand: 0 };
      ventasMap[id].grand += (v.total || 0); // acumula todos los tipos
      if (v.tipo_juego === 'PozoPower') ventasMap[id].pp    += (v.total || 0);
      if (v.tipo_juego === 'LakiDey')  ventasMap[id].ld    += (v.total || 0);
    });

    document.getElementById('cnt-registros').textContent = registros.toLocaleString();

    const KEYS = window.KEYS || {};
    TIENDAS = (window.TAMBOS || []).map(p => {
      const id  = String(p.ID || '');
      const cb  = (p.cluster_bono || '').trim().toUpperCase();
      const key = KEYS[cb] || null;
      const v      = ventasMap[id] || { pp: 0, ld: 0, grand: 0 };
      const pp_uni = Math.floor(v.pp / 5); // soles → unidades (1 PozoPower = S/5)
      const total  = v.grand;
      // Tier más alto que cumple (del cluster asignado hacia arriba)
      const TIER_ORDER = ['A', 'B', 'C', 'D'];
      const floorIdx = TIER_ORDER.indexOf(cb);
      let bonoTier = null;
      if (floorIdx >= 0) {
        for (let ti = 0; ti <= floorIdx; ti++) {
          const t = TIER_ORDER[ti];
          const k = KEYS[t];
          if (k && total >= k.meta && pp_uni >= k.pp && v.ld >= k.lakidey) {
            bonoTier = t;
            break;
          }
        }
      }
      const ganando = bonoTier !== null;
      const premios = PREMIOS_MAP[bonoTier || cb] || { tienda: 0, admi: 0 };
      return {
        id, nombre: p.nombre || '',
        cluster: cb, cluster_bono: cb,
        rc: p.rc || '', supervisor: p.supervisor || '',
        pp: pp_uni, ld: v.ld, total,
        meta_total: key ? key.meta    : null,
        meta_pp:    key ? key.pp      : null,
        meta_ld:    key ? key.lakidey : null,
        ganando, bono_tier: bonoTier, key,
        bono_tienda: ganando ? premios.tienda : 0,
        bono_admi:   ganando ? premios.admi   : 0,
      };
    });

    // Detectar inactivos con venta en la semana
    const inactivosConVenta = (window.TAMBOS_INACTIVOS || []).filter(p => {
      const v = ventasMap[String(p.ID || '')];
      return v && v.grand > 0;
    });
    renderAlertaInactivos(inactivosConVenta);

    renderStats();
    render();
  }

  // ── Sort ────────────────────────────────────────────────────────
  let lastSort = null;
  function sortBy(col) {
    if (lastSort === col) { sortAsc = !sortAsc; } else { sortAsc = col !== 'estado'; }
    lastSort = col;
    // actualizar icons
    document.querySelectorAll('thead th').forEach(th => th.classList.remove('sorted'));
    event.currentTarget.classList.add('sorted');
    event.currentTarget.querySelector('.sort-icon').textContent = sortAsc ? '↑' : '↓';
    render();
  }

  function sortedTiendas(arr) {
    return [...arr].sort((a, b) => {
      let va, vb;
      if (lastSort === 'nombre')  { va = a.nombre;  vb = b.nombre; }
      else if (lastSort === 'cluster') { va = a.cluster; vb = b.cluster; }
      else if (lastSort === 'pp')  { va = a.pp;    vb = b.pp; }
      else if (lastSort === 'ld')  { va = a.ld;    vb = b.ld; }
      else if (lastSort === 'total') { va = a.total; vb = b.total; }
      else { // estado: ganando primero
        return (b.ganando ? 1 : 0) - (a.ganando ? 1 : 0) || b.total - a.total;
      }
      if (typeof va === 'string') return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });
  }

  // ── Render ──────────────────────────────────────────────────────
  function render() {
    const buscar  = document.getElementById('buscar').value.trim().toLowerCase();
    const cluster = document.getElementById('filtro-cluster').value;
    const rc      = document.getElementById('filtro-rc').value;
    const sup     = document.getElementById('filtro-sup').value;

    let lista = TIENDAS.filter(t => {
      if (modoFiltro === 'ganando' && !t.ganando) return false;
      if (cluster && t.cluster !== cluster) return false;
      if (rc  && t.rc !== rc)   return false;
      if (sup && t.supervisor !== sup) return false;
      if (buscar && !t.nombre.toLowerCase().includes(buscar) && !t.id.includes(buscar))
        return false;
      return true;
    });

    lista = sortedTiendas(lista);

    document.getElementById('count-label').textContent =
      lista.length + ' tienda' + (lista.length !== 1 ? 's' : '');

    // Totales a pagar (solo tiendas ganando dentro del filtro actual)
    const ganadosFiltrados = lista.filter(t => t.ganando);
    const totalTienda = ganadosFiltrados.reduce((s, t) => s + (t.bono_tienda || 0), 0);
    const totalAdmi   = ganadosFiltrados.reduce((s, t) => s + (t.bono_admi   || 0), 0);
    const fmt = n => 'S/ ' + n.toLocaleString('es-PE');
    document.getElementById('stat-total-tienda').textContent = fmt(totalTienda);
    document.getElementById('stat-total-admi').textContent   = fmt(totalAdmi);
    document.getElementById('stat-total-pagar').textContent  = fmt(totalTienda + totalAdmi);

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (lista.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Sin resultados</td>`;
      tbody.appendChild(tr);
    } else if (modoFiltro === 'todas' && !lastSort) {
      // Separador entre ganando y no ganando
      const ganando   = lista.filter(t => t.ganando);
      const noGanando = lista.filter(t => !t.ganando);

      if (ganando.length > 0) {
        addSeparator(tbody, `✓ Ganando bono (${ganando.length})`);
        ganando.forEach(t => addRow(tbody, t));
      }
      if (noGanando.length > 0) {
        addSeparator(tbody, `Por alcanzar (${noGanando.length})`);
        noGanando.forEach(t => addRow(tbody, t));
      }
    } else {
      lista.forEach(t => addRow(tbody, t));
    }

    document.getElementById('msg').style.display   = 'none';
    document.getElementById('tabla').style.display = '';
  }

  function addSeparator(tbody, label) {
    const tr = document.createElement('tr');
    tr.className = 'separator';
    tr.innerHTML = `<td colspan="9">${label}</td>`;
    tbody.appendChild(tr);
  }

  function addRow(tbody, t) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div class="td-nombre">${t.nombre}</div>
        <div class="td-code">${t.id}</div>
      </td>
      <td>${badgeCluster(t.cluster_bono)}</td>
      <td class="td-rc" title="${t.rc}">${t.rc || '—'}</td>
      <td>${t.meta_pp   != null ? bar(t.pp,    t.meta_pp)    : '<span style="color:var(--muted)">—</span>'}</td>
      <td>${t.meta_ld   != null ? bar(t.ld,    t.meta_ld)    : '<span style="color:var(--muted)">—</span>'}</td>
      <td>${t.meta_total!= null ? bar(t.total, t.meta_total) : '<span style="color:var(--muted)">—</span>'}</td>
      <td>${estadoHTML(t)}</td>
      <td>${t.ganando ? `<span class="td-bono">S/ ${t.bono_tienda}</span>` : `<span class="td-bono-empty">—</span>`}</td>
      <td>${t.ganando ? `<span class="td-bono">S/ ${t.bono_admi}</span>` : `<span class="td-bono-empty">—</span>`}</td>
    `;
    tbody.appendChild(tr);
  }

  // ── Descarga FORMATO_1_TAMBO (todas las semanas cerradas del mes) ──
  function descargarFormato1() {
    const ventas  = window.TODAS_VENTAS || [];
    const keysMap = window.KEYS || {};
    const tambos  = window.TAMBOS || [];

    if (!ventas.length || !tambos.length) {
      alert('Datos no cargados aún.');
      return;
    }

    const hoyStr = isoDate(new Date());

    // ── 1. Detectar semanas cerradas (miércoles ya pasó) ─────────────
    const semanasSet = {};
    ventas.forEach(v => {
      if (!v.fecha) return;
      const jue    = juevesDe(new Date(v.fecha + 'T12:00:00'));
      const jueStr = isoDate(jue);
      const mieStr = isoDate(new Date(jue.getTime() + 6 * 86400000));
      if (mieStr <= hoyStr) semanasSet[jueStr] = jue;
    });

    const semanasCerradas = Object.values(semanasSet).sort((a, b) => a - b);

    if (semanasCerradas.length === 0) {
      alert('No hay semanas cerradas en el mes actual.');
      return;
    }

    // ── 2. Calcular ganadores por semana y acumular por tienda ───────
    const tiendaBonos = {};  // id → { bonosTienda:[…], bonosAdmi:[…] }
    const tiendaInfo  = {};  // id → { nombre, cluster, rc }

    semanasCerradas.forEach(jueves => {
      const bonoNum = getBonoNumero(jueves);
      const jueStr  = isoDate(jueves);
      const mieStr  = isoDate(new Date(jueves.getTime() + 6 * 86400000));

      // Agregar ventas de la semana
      const vm = {};
      ventas.forEach(v => {
        if (!v.fecha || v.fecha < jueStr || v.fecha > mieStr) return;
        const id = String(v.org_code);
        if (!vm[id]) vm[id] = { pp: 0, ld: 0, grand: 0 };
        const amt = v.total || 0;
        vm[id].grand += amt; // acumula todos los tipos
        if (v.tipo_juego === 'PozoPower') vm[id].pp    += amt;
        if (v.tipo_juego === 'LakiDey')  vm[id].ld    += amt;
      });

      // Evaluar cada tienda
      tambos.forEach(p => {
        const id  = String(p.ID || '');
        const cb  = (p.cluster_bono || '').trim().toUpperCase();
        const key = keysMap[cb];
        if (!key) return;
        const v      = vm[id] || { pp: 0, ld: 0, grand: 0 };
        const pp_uni = Math.floor(v.pp / 5);
        if (v.grand >= key.meta && pp_uni >= key.pp && v.ld >= key.lakidey) {
          if (!tiendaBonos[id]) {
            tiendaBonos[id] = { bonosTienda: [0,0,0,0,0], bonosAdmi: [0,0,0,0,0] };
            tiendaInfo[id]  = { nombre: p.nombre || '', cluster: cb, rc: p.rc || '' };
          }
          const prem = PREMIOS_MAP[cb] || { tienda: 0, admi: 0 };
          tiendaBonos[id].bonosTienda[bonoNum - 1] = prem.tienda;
          tiendaBonos[id].bonosAdmi[bonoNum - 1]   = prem.admi;
        }
      });
    });

    const ganadorIds = Object.keys(tiendaBonos);
    if (ganadorIds.length === 0) {
      alert('No hay tiendas ganadoras en las semanas cerradas.');
      return;
    }

    // Ordenar por cluster → nombre
    ganadorIds.sort((a, b) => {
      const ia = tiendaInfo[a], ib = tiendaInfo[b];
      return (ia.cluster + ia.nombre).localeCompare(ib.cluster + ib.nombre);
    });

    // ── 3. Construir filas Excel ─────────────────────────────────────
    const HEADERS = [
      'BONO 1','BONO 2','BONO 3','BONO 4','BONO 5','MONTO TIENDA',
      'BONO 1','BONO 2','BONO 3','BONO 4','BONO 5','MONTO ADMI',
      'TOTAL','RETAIL','POSICION','NOMBRE DE TIENDA','DETALLE',
      'DNI','NOMBRES','APELLIDO PATERNO','APELLIDO MATERNO','MONTO',
    ];

    const rows = [HEADERS];

    ganadorIds.forEach(id => {
      const info        = tiendaInfo[id];
      const bonos       = tiendaBonos[id];
      const montoTienda = bonos.bonosTienda.reduce((s, n) => s + n, 0);
      const montoAdmi   = bonos.bonosAdmi.reduce((s, n) => s + n, 0);

      // Fila ADMINISTRADOR (montos llenados)
      rows.push([
        ...bonos.bonosTienda, montoTienda,
        ...bonos.bonosAdmi,   montoAdmi,
        montoTienda + montoAdmi,
        'TAMBO', 'ADMINISTRADOR', info.nombre,
        'ADMINISTRADOR ' + info.nombre,
        '', '', '', '', '',
      ]);

      // Filas COLABORADOR 1–8 (sin montos)
      for (let i = 1; i <= 8; i++) {
        rows.push([
          '', '', '', '', '', '',
          '', '', '', '', '', '',
          '',
          'TAMBO', 'COLABORADOR ' + i, info.nombre,
          'COLABORADOR ' + i + ' ' + info.nombre,
          '', '', '', '', '',
        ]);
      }
    });

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [
      {wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:13},
      {wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:12},
      {wch:9},{wch:9},{wch:16},{wch:30},{wch:38},
      {wch:11},{wch:22},{wch:22},{wch:22},{wch:10},
    ];

    const mes = new Date().toISOString().slice(0, 7);
    const wb  = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'BONO');
    XLSX.writeFile(wb, `FORMATO_TAMBO_${mes}_${semanasCerradas.length}sem.xlsx`);
  }

  function setTab(name) {
    document.getElementById('panel-bonos').style.display = name === 'bonos' ? '' : 'none';
    document.getElementById('panel-pagos').style.display = name === 'pagos' ? '' : 'none';
    document.getElementById('tab-bonos').classList.toggle('active', name === 'bonos');

  // ════════════════════════════════════════════════════════════════
  // PAGOS SR
  // ════════════════════════════════════════════════════════════════
  let PAGOS_DATA        = null;
  let pagosTiendaActual = null;
  let pagosMesActivo    = null;
  let ddFocused         = -1;
  let ddItems           = [];

  async function initPagos() {
    try {
      const [pagosR, detalleR] = await Promise.all([
        fetch('data/pagos_sr.json?t='     + Date.now()),
        fetch('data/detalle_semana.json?t=' + Date.now()),
      ]);
      if (!pagosR.ok) throw new Error(pagosR.status + ' pagos_sr.json');
      window.PAGOS_DATA   = await pagosR.json();
      window.DETALLE_DATA = detalleR.ok ? await detalleR.json() : null;
      const n = window.PAGOS_DATA.tiendas_lista.length;
      document.getElementById('pagos-stat').textContent = `${n} tiendas en historial`;
      bindPagosSearch();
    } catch(e) {
      document.getElementById('pagos-result').innerHTML =
        `<div class="pagos-placeholder" style="color:var(--red)">Error al cargar datos: ${e.message}</div>`;
    }
  }

  function bindPagosSearch() {
    const inp = document.getElementById('pagos-input');
    const dd  = document.getElementById('pagos-dropdown');

    inp.addEventListener('input', () => {
      const q = inp.value.trim().toUpperCase();
      if (!q || q.length < 2) { dd.style.display = 'none'; return; }
      const matches = window.PAGOS_DATA.tiendas_lista
        .filter(t => t.includes(q))
        .slice(0, 30);
      if (!matches.length) { dd.style.display = 'none'; return; }
      ddItems = matches;
      ddFocused = -1;
      dd.innerHTML = matches.map((t, i) =>
        `<div class="pagos-dd-item" data-idx="${i}">${t}</div>`
      ).join('');
      dd.style.display = 'block';
      dd.querySelectorAll('.pagos-dd-item').forEach(el => {
        el.addEventListener('mousedown', () => selectPagosTienda(el.textContent));
      });
    });

    inp.addEventListener('keydown', e => {
      if (!ddItems.length) return;
      if (e.key === 'ArrowDown') { ddFocused = Math.min(ddFocused + 1, ddItems.length - 1); updateDDFocus(); e.preventDefault(); }
      if (e.key === 'ArrowUp')   { ddFocused = Math.max(ddFocused - 1, 0); updateDDFocus(); e.preventDefault(); }
      if (e.key === 'Enter' && ddFocused >= 0) { selectPagosTienda(ddItems[ddFocused]); e.preventDefault(); }
      if (e.key === 'Escape') { dd.style.display = 'none'; }
    });

    document.addEventListener('click', e => {
      if (!inp.contains(e.target) && !dd.contains(e.target)) dd.style.display = 'none';
    });
  }

  function updateDDFocus() {
    document.querySelectorAll('#pagos-dropdown .pagos-dd-item').forEach((el, i) => {
      el.classList.toggle('focused', i === ddFocused);
    });
  }

  function selectPagosTienda(tienda) {
    const inp = document.getElementById('pagos-input');
    const dd  = document.getElementById('pagos-dropdown');
    inp.value = tienda;
    dd.style.display = 'none';
    pagosTiendaActual = tienda;
    pagosMesActivo    = null;
    renderPagosTienda(tienda);
  }

  function renderPagosTienda(tienda) {
    const data    = window.PAGOS_DATA;
    const meses   = data.meses;
    const labels  = data.labels;
    const tData   = data.por_tienda[tienda] || {};

    // total acumulado
    let totalAcum = 0;
    meses.forEach(m => { if (tData[m]) totalAcum += tData[m].total; });

    const stat = document.getElementById('pagos-stat');
    stat.innerHTML = `<strong style="color:var(--text)">${tienda}</strong>&nbsp;&nbsp;
      <span style="color:var(--green);font-weight:700">S/ ${totalAcum.toFixed(2)}</span>
      <span style="opacity:.6"> acumulado</span>`;

    // cards de meses
    const cardsHtml = meses.map(m => {
      const d = tData[m];
      if (!d) return `<div class="mes-card" style="opacity:.35;cursor:default">
        <div class="mc-label">${labels[m]}</div>
        <div class="mc-total" style="color:var(--muted);font-size:16px">—</div>
        <div class="mc-n">sin pagos</div>
      </div>`;
      const isSel    = pagosMesActivo === m;
      const hasDet   = !!window.DETALLE_DATA?.por_tienda?.[tienda]?.[m];
      const detBadge = hasDet ? `<span style="font-size:10px;background:rgba(56,189,248,.15);color:#38BDF8;padding:1px 5px;border-radius:3px;margin-left:4px">desglose</span>` : '';
      return `<div class="mes-card${isSel ? ' active' : ''}" onclick="toggleMesDetalle('${m}')">
        <div class="mc-label">${labels[m]}${detBadge}</div>
        <div class="mc-total">S/ ${d.total.toFixed(2)}</div>
        <div class="mc-n">${d.n} persona${d.n !== 1 ? 's' : ''}</div>
      </div>`;
    }).join('');

    const detailHtml = pagosMesActivo && tData[pagosMesActivo]
      ? renderMesDetalle(pagosMesActivo, tData[pagosMesActivo], labels[pagosMesActivo])
      : '';

    document.getElementById('pagos-result').innerHTML = `
      <div class="pagos-store-title">${tienda}</div>
      <div class="pagos-store-sub">Total acumulado: <strong style="color:var(--green)">S/ ${totalAcum.toFixed(2)}</strong> · ${Object.keys(tData).length} mes(es) con pagos</div>
      <div class="meses-grid">${cardsHtml}</div>
      <div id="pagos-det">${detailHtml}</div>`;
  }

  function toggleMesDetalle(mes) {
    pagosMesActivo = pagosMesActivo === mes ? null : mes;
    renderPagosTienda(pagosTiendaActual);
    if (pagosMesActivo) {
      setTimeout(() => document.getElementById('pagos-det')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  }

  function renderMesDetalle(mes, d, label) {
    // ── Desglose semanal (si existe) ───────────────────────────────
    let detalleHtml = '';
    const det = window.DETALLE_DATA?.por_tienda?.[pagosTiendaActual]?.[mes];
    if (det) {
      const semanas = det.semanas || [];
      const filasS = semanas.map(s => {
        const vt = det.tienda_semanal?.[s] ?? 0;
        const va = det.admi_semanal?.[s]   ?? 0;
        const tot = vt + va;
        return `<tr>
          <td style="color:var(--muted)">${s}</td>
          <td style="color:#34D399;font-variant-numeric:tabular-nums">${vt > 0 ? 'S/ ' + vt.toFixed(0) : '—'}</td>
          <td style="color:#38BDF8;font-variant-numeric:tabular-nums">${va > 0 ? 'S/ ' + va.toFixed(0) : '—'}</td>
          <td style="font-weight:600;font-variant-numeric:tabular-nums">${tot > 0 ? 'S/ ' + tot.toFixed(0) : '—'}</td>
        </tr>`;
      }).join('');
      detalleHtml = `
        <div class="pagos-detail" style="margin-bottom:12px">
          <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>${label} — Desglose semanal calculado</span>
            <span style="font-size:12px;font-weight:400;color:var(--muted)">Total: S/ ${det.total.toFixed(0)}</span>
          </h3>
          <div style="overflow-x:auto">
            <table>
              <thead><tr>
                <th>Semana</th>
                <th style="color:#34D399">Tienda</th>
                <th style="color:#38BDF8">Admin</th>
                <th>Total</th>
              </tr></thead>
              <tbody>
                ${filasS}
                <tr class="td-total-row">
                  <td>Total</td>
                  <td style="color:#34D399;font-weight:700">S/ ${det.monto_tienda.toFixed(0)}</td>
                  <td style="color:#38BDF8;font-weight:700">S/ ${det.monto_admi.toFixed(0)}</td>
                  <td style="font-weight:700">S/ ${det.total.toFixed(0)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>`;
    }

    // ── Pagos SR efectuados ────────────────────────────────────────
    const filas = d.personas.map(p => `
      <tr>
        <td>${p.nombre || '—'}</td>
        <td style="color:var(--muted);font-size:12px">${p.dni || '—'}</td>
        <td class="td-monto">S/ ${p.monto.toFixed(2)}</td>
      </tr>`).join('');

    const srHtml = `<div class="pagos-detail">
      <h3 style="display:flex;justify-content:space-between;align-items:center">
        <span>${label} — Pagos SR efectuados</span>
        <span style="font-size:12px;font-weight:400;color:var(--muted)">${d.n} persona${d.n !== 1 ? 's' : ''} · S/ ${d.total.toFixed(2)}</span>
      </h3>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Nombre</th><th>DNI</th><th style="text-align:right">Monto</th></tr></thead>
          <tbody>
            ${filas}
            <tr class="td-total-row">
              <td colspan="2">Total pagado</td>
              <td class="td-monto">S/ ${d.total.toFixed(2)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;

    return detalleHtml + srHtml;
  }

</script>
</body>
</html>
