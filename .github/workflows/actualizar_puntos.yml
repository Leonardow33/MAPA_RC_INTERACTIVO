name: Actualizar Puntos de Venta

on:
  schedule:
    - cron: '0 13 * * 1'   # Lunes 8:00 AM Peru (UTC-5)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Cachear Chromium de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar dependencias
        run: |
          pip install playwright pandas openpyxl
          playwright install chromium --with-deps

      - name: Descargar y procesar Excel desde SharePoint
        run: |
          python3 - << 'PYEOF'
          import sys, json, shutil
          import pandas as pd
          from datetime import datetime
          from playwright.sync_api import sync_playwright

          URL   = "https://elotgroup2020-my.sharepoint.com/:x:/g/personal/doriant_elotgroup_com/IQB-NddQMXR2So7GfQzrHRtsAWTJsTyNAclAXDO5jp5x7pA?e=CJHQci"
          HOJA  = "BASE_RSUM"
          EXCEL = "/tmp/base_mapas.xlsx"

          # ── Descargar Excel ──────────────────────────────────────────
          dl_path = None

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(accept_downloads=True)

              # Intento 1: &download=1 — ignorar "Download is starting" (es normal en xlsx)
              try:
                  print("Intento 1: expect_download con &download=1...")
                  page = context.new_page()
                  with page.expect_download(timeout=45000) as dl_info:
                      try:
                          page.goto(URL + "&download=1", wait_until="commit", timeout=30000)
                      except Exception as nav_e:
                          if "Download is starting" not in str(nav_e):
                              raise
                          print("  -> 'Download is starting' capturado, esperando archivo...")
                  dl_info.value.save_as(EXCEL)
                  dl_path = EXCEL
                  print(f"  -> OK guardado en {EXCEL}")
              except Exception as e:
                  print(f"  -> fallo: {e}")

              # Intento 2: navegar al preview de SharePoint y clic en botón descarga
              if not dl_path:
                  try:
                      print("Intento 2: navegar y clic en botón descarga...")
                      page2 = context.new_page()
                      page2.goto(URL, wait_until="networkidle", timeout=60000)
                      print(f"  -> página cargada: {page2.title()}")
                      with page2.expect_download(timeout=30000) as dl_info:
                          btn = page2.locator(
                              '[data-automation-id="downloadCommand"], '
                              '[data-icon-name="Download"], '
                              'a[data-action="download"], '
                              '[aria-label="Download"], [aria-label="Descargar"], '
                              'button:has-text("Download"), button:has-text("Descargar"), '
                              'a:has-text("Download"), a:has-text("Descargar")'
                          ).first
                          print(f"  -> botón encontrado: {btn.text_content()}")
                          btn.click(timeout=15000)
                      dl_info.value.save_as(EXCEL)
                      dl_path = EXCEL
                      print(f"  -> OK guardado en {EXCEL}")
                  except Exception as e:
                      print(f"  -> fallo: {e}")

              # Intento 3: interceptar respuesta binaria xlsx en la navegación
              if not dl_path:
                  try:
                      print("Intento 3: interceptar respuesta xlsx...")
                      captured_bytes = []

                      def on_response(resp):
                          try:
                              ct = resp.headers.get("content-type", "")
                              if "spreadsheet" in ct or "excel" in ct or "octet-stream" in ct:
                                  body = resp.body()
                                  if len(body) > 1000:
                                      captured_bytes.append(body)
                                      print(f"  -> xlsx capturado ({len(body)} bytes)")
                          except Exception:
                              pass

                      page3 = context.new_page()
                      page3.on("response", on_response)
                      page3.goto(URL, wait_until="networkidle", timeout=60000)

                      if captured_bytes:
                          with open(EXCEL, "wb") as f:
                              f.write(captured_bytes[-1])
                          dl_path = EXCEL
                          print(f"  -> OK: {dl_path}")
                  except Exception as e:
                      print(f"  -> fallo: {e}")

              browser.close()

          if not dl_path:
              print("ERROR: no se pudo descargar el Excel de SharePoint")
              sys.exit(1)

          print(f"Excel listo: {EXCEL}")

          # ── Leer hoja BASE_RSUM ──────────────────────────────────────
          print(f"Leyendo hoja '{HOJA}'...")
          df = pd.read_excel(EXCEL, sheet_name=HOJA)
          df.columns = df.columns.str.strip()   # quitar espacios en nombres de columna
          print(f"  -> {len(df)} filas")
          # Debug: columnas que contienen META
          meta_cols = [c for c in df.columns if 'META' in str(c).upper()]
          print(f"  -> columnas META encontradas: {meta_cols}")

          data = []

          for _, row in df.iterrows():
              if (pd.notnull(row.get("LATITUD")) and pd.notnull(row.get("LONGITUD"))
                      and float(row["LATITUD"]) != 0 and float(row["LONGITUD"]) != 0
                      and str(row.get("ESTATUS", "")).strip().upper() != "CERRADO"):

                  dias = []
                  if pd.notnull(row.get("FRECUENCIA-NORMAL")):
                      for d in str(row["FRECUENCIA-NORMAL"]).upper().split("-"):
                          dia = d.strip()
                          if dia not in ["", "NAN", "SIN ASIGNAR"]:
                              dias.append(dia)
                  dias = list(set(dias)) or ["SIN RUTA"]

                  def s(val):
                      return str(val).strip() if pd.notnull(val) else ""

                  data.append({
                      "nombre":       s(row.get("NOMBRE DE TIENDA")),
                      "lat":          float(row["LATITUD"]),
                      "lng":          float(row["LONGITUD"]),
                      "estado":       s(row.get("ESTATUS")),
                      "zona":         s(row.get("ZONAL")),
                      "cluster":      s(row.get("CLUSTER INTERNO")),
                      "cluster_bono": s(row.get("CLUSTER")),
                      "ID":           str(row.get("ORG_CODE", "")),
                      "rc":           s(row.get("RC_NOMBRE")),
                      "rc_codigo":    s(row.get("RC_ENCARGADO_DE_TIENDA")),
                      "username":     s(row.get("USERNAME")),
                      "supervisor":   s(row.get("SUPERVISOR")),
                      "capacitador":  s(row.get("CAPACITADOR")),
                      "responsable":  s(row.get("P_RESPONSABLE")),
                      "frecuencia":   s(row.get("FRECUENCIA-NORMAL")),
                      "dias":         dias,
                      "meta_diaria":  (lambda v: float(v) if v == v and v is not None else None)(pd.to_numeric(row.get("META DIARIA"), errors='coerce')),
                      "direccion":    s(row.get("TdaDireccion")),
                      "distrito":     s(row.get("DISTRITOS")),
                      "gz":           s(row.get("GZ")),
                      "jz":           s(row.get("JZ")),
                      "zonal_tipo":   s(row.get("ZONAL_TIPO", "")).upper(),
                      "tipo":         s(row.get("TIPO", "")).upper(),
                  })

          ts = datetime.now().strftime("%Y-%m-%dT%H:%M:%S")

          with open("data/puntos.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=4)

          with open("data/version.json", "w", encoding="utf-8") as f:
              json.dump({"v": ts, "n": len(data)}, f)

          partners = {}
          for _, row in df.iterrows():
              cod  = str(row.get("ORG_CODE", "")).strip()
              resp = str(row["P_RESPONSABLE"]).strip() if pd.notnull(row.get("P_RESPONSABLE")) else ""
              if cod and resp:
                  partners[cod] = resp

          with open("data/partners.json", "w", encoding="utf-8") as f:
              json.dump(partners, f, ensure_ascii=False)

          print(f"OK: {len(data)} puntos activos | {len(partners)} partners | v{ts}")
          PYEOF

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/puntos.json data/version.json data/partners.json
          git diff --cached --quiet || {
            git commit -m "chore: actualizar puntos desde SharePoint"
            for i in 1 2 3 4 5; do
              git pull --rebase && git push && break
              echo "Intento $i fallido, reintentando en $((i*5))s..."
              sleep $((i * 5))
            done
          }
