name: Update Sin Venta

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 minutos
  workflow_dispatch:           # permite lanzarlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descargar datos de Sin Venta desde SharePoint
        run: |
          python3 - << 'EOF'
          import urllib.request
          import sys

          url = "https://elotgroup2020-my.sharepoint.com/:t:/g/personal/doriant_elotgroup_com/IQDOVKkrNAxRQLROxaknVeI0AeETKdn2V-BF0AGwXsAFR_0?e=KRN7C3&download=1"

          req = urllib.request.Request(url, headers={
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Accept": "text/plain,*/*",
              "Accept-Language": "es-PE,es;q=0.9",
          })

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  content = resp.read().decode("utf-8", errors="replace")
          except Exception as e:
              print(f"ERROR descargando: {e}")
              sys.exit(1)

          if "<html" in content[:200].lower():
              print("ERROR: SharePoint devolvio HTML en lugar del archivo")
              print(content[:500])
              sys.exit(1)

          with open("sinventa.txt", "w", encoding="utf-8") as f:
              f.write(content)

          print(f"OK: {len(content)} chars | primeros 80: {content[:80]}")
          EOF

      - name: Hacer commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sinventa.txt
          git diff --cached --quiet || (git commit -m "chore: actualizar sinventa.txt" && git push)
