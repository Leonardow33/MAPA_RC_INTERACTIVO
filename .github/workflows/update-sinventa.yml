name: Update Sin Venta

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 minutos
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Cachear Chromium de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Descargar Sin Venta con browser real
        run: |
          python3 - << 'PYEOF'
          import sys
          from playwright.sync_api import sync_playwright

          URL = "https://elotgroup2020-my.sharepoint.com/:t:/g/personal/doriant_elotgroup_com/IQDOVKkrNAxRQLROxaknVeI0AeETKdn2V-BF0AGwXsAFR_0?e=KRN7C3&download=1"

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(accept_downloads=True)
              page = context.new_page()
              try:
                  with page.expect_download(timeout=30000) as dl_info:
                      page.goto(URL)
                  download = dl_info.value
                  download.save_as("sinventa.txt")
              finally:
                  browser.close()

          with open("sinventa.txt", encoding="utf-8", errors="replace") as f:
              content = f.read()

          if "<html" in content[:300].lower():
              print("ERROR: se recibio HTML en lugar del archivo")
              print(content[:400])
              sys.exit(1)

          print(f"OK: {len(content)} chars | {content[:80]}")
          PYEOF

      - name: Hacer commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sinventa.txt
          git diff --cached --quiet || (git commit -m "chore: actualizar sinventa.txt" && git push)
