name: Actualizar Ventas Mes

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM Peru (UTC-5) todos los días
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Cachear Chromium de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Descargar ventas_mes.json desde SharePoint
        run: |
          python3 - << 'PYEOF'
          import sys
          from playwright.sync_api import sync_playwright

          URL = "https://elotgroup2020-my.sharepoint.com/:u:/g/personal/doriant_elotgroup_com/IQCpFbui95x1S5JXjev_tlsPATMjiDRm0DtiFAF9rfvVMh0?e=glgPSX"

          captured = []

          def on_response(resp):
              ct = resp.headers.get('content-type', '')
              cd = resp.headers.get('content-disposition', '')
              if 'application/json' in ct or 'octet-stream' in ct or 'attachment' in cd:
                  try:
                      text = resp.body().decode('utf-8', errors='replace')
                      if text.strip().startswith('{'):
                          captured.append(text)
                          print(f"Capturado JSON: {len(text)} chars desde {resp.url[:80]}")
                  except Exception as e:
                      print(f"Error leyendo respuesta: {e}")

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(accept_downloads=True)
              page    = context.new_page()
              page.on("response", on_response)

              try:
                  page.goto(URL, wait_until="networkidle", timeout=40000)
              except Exception as e:
                  print(f"Navegacion: {e}")

              if not captured:
                  body = page.evaluate("() => document.body.innerText || ''")
                  print(f"Fallback body: {len(body)} chars | {body[:80]}")
                  if body.strip().startswith('{'):
                      captured.append(body)

              browser.close()

          if not captured:
              print("ERROR: no se pudo capturar el JSON de SharePoint")
              sys.exit(1)

          content = captured[-1]

          if not content.strip().startswith('{'):
              print(f"ERROR: contenido inesperado (no es JSON): {content[:200]}")
              sys.exit(1)

          with open("data/ventas_mes.json", "w", encoding="utf-8") as f:
              f.write(content)

          print(f"OK: {len(content)} chars guardados en data/ventas_mes.json")
          PYEOF

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ventas_mes.json
          git diff --cached --quiet || (git commit -m "chore: actualizar ventas_mes.json" && git pull --rebase && git push)
