name: Actualizar Ventas Mes

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM Peru (UTC-5) todos los días
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Cachear Chromium de Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-v1

      - name: Instalar Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Ejecutar fetch_ventas.py
        env:
          PBI_SESSION: ${{ secrets.PBI_SESSION }}
        run: python scripts/fetch_ventas.py

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ventas_mes.json
          git diff --cached --quiet || (git commit -m "chore: actualizar ventas_mes.json" && git pull --rebase && git push)
