name: Actualizar Ventas Mes

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM Peru (UTC-5) todos los días
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Descargar ventas_mes.json desde SharePoint
        run: |
          URL="https://elotgroup2020-my.sharepoint.com/:u:/g/personal/doriant_elotgroup_com/IQCpFbui95x1S5JXjev_tlsPATMjiDRm0DtiFAF9rfvVMh0?e=glgPSX&download=1"
          echo "Descargando desde SharePoint..."
          curl -L -s -o data/ventas_mes.json \
            -H "User-Agent: Mozilla/5.0" \
            "$URL"

          python3 - << 'PYEOF'
          import json, sys

          with open("data/ventas_mes.json", encoding="utf-8") as f:
              content = f.read()

          print(f"Primeros 120 chars: {content[:120]!r}")

          if not content.strip().startswith('{'):
              print("ERROR: el contenido no es JSON — SharePoint devolvio HTML u otro formato")
              sys.exit(1)

          try:
              data = json.loads(content)
          except json.JSONDecodeError as e:
              print(f"ERROR: JSON invalido: {e}")
              sys.exit(1)

          ventas = data.get("ventas", [])
          print(f"OK: {len(ventas)} registros de ventas — updated: {data.get('updated','?')}")

          if len(ventas) == 0:
              print("ADVERTENCIA: el archivo tiene 0 registros de ventas")
          PYEOF

      - name: Commit si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ventas_mes.json
          git diff --cached --quiet || (git commit -m "chore: actualizar ventas_mes.json" && git pull --rebase && git push)
