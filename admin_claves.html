<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · GeoDor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #03091B;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 56px;
      gap: 0;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #556;
      margin-bottom: 6px;
    }
    .page-title {
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 4px;
    }
    .date-label {
      font-size: 13px;
      color: #556;
      text-align: center;
      margin-bottom: 28px;
    }

    /* ── SECCIÓN LINKS ───────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #445;
      align-self: flex-start;
      max-width: 420px;
      width: 100%;
      margin-bottom: 10px;
    }

    .partner-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 32px;
    }

    .pc {
      background: #060F2A;
      border: 1.5px solid;
      border-radius: 16px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .pc-bar {
      width: 4px;
      height: 44px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .pc-info {
      flex: 1;
      min-width: 0;
    }
    .pc-name {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.2;
    }
    .pc-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .pc-ventas {
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #cdd;
    }
    .pc-upd {
      font-size: 11px;
      color: #445;
    }
    .pc-copy {
      background: none;
      border: 1.5px solid #223;
      color: #667;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pc-copy:hover { color: #fff; border-color: #556; background: #0d1830; }
    .pc-copy.copied { color: #4ade80; border-color: #4ade80; }

    /* ── SECCIÓN CLAVES ──────────────────────────────────── */
    .code-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 420px;
    }
    .cc {
      background: #060F2A;
      border: 1.5px solid;
      border-radius: 14px;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cc-left { display: flex; flex-direction: column; gap: 2px; }
    .cc-partner { font-size: 13px; font-weight: 700; }
    .cc-hint { font-size: 10px; color: #445; }
    .cc-code {
      font-size: 22px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: .08em;
    }

    .footer {
      font-size: 11px;
      color: #334;
      text-align: center;
      max-width: 300px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="eyebrow">GeoDor · Administración</div>
  <h1 class="page-title">Panel de Partners</h1>
  <div class="date-label" id="date-label">—</div>

  <div class="section-label">Links de acceso directo</div>
  <div class="partner-cards" id="partner-cards"></div>

  <div class="section-label">Claves del día</div>
  <div class="code-cards" id="code-cards"></div>

  <div class="footer">
    Uso interno · GeoDor<br>
    Comparte la clave de cada partner solo con sus cajeras.
  </div>

<script>
  const BASE = 'https://leonardow33.github.io/MAPA_RC_INTERACTIVO/BONOS%20PARTNERS/';

  const PARTNERS = [
    { label: 'Apuesta Total', color: '#E53535', seed: 'GEODOR_AT_2025',   file: 'bonus_at.html',        key: 'APUESTA TOTAL' },
    { label: 'Tinbet',        color: '#16A34A', seed: 'GEODOR_TIN_2025',  file: 'bonus_tinbet.html',    key: 'TINBET'        },
    { label: 'Livesport',     color: '#2563EB', seed: 'GEODOR_LIVE_2025', file: 'bonus_livesport.html', key: 'LIVESPORT'     },
    { label: 'Retabet',       color: '#64748B', seed: 'GEODOR_RET_2025',  file: 'bonus_retabet.html',   key: 'RETABET'       },
    { label: 'Doradobet',     color: '#D97706', seed: 'GEODOR_DOR_2025',  file: 'bonus_doradobet.html', key: 'DORADOBET'     },
    { label: 'Aciertala',     color: '#0891B2', seed: 'GEODOR_ACT_2025',  file: 'bonus_aciertala.html', key: 'ACIERTALA'     },
    { label: 'Cencosud',      color: '#006633', seed: 'GEODOR_CEN_2025',  file: 'bonus_cencosud.html',  key: 'CENCOSUD'      },
  ];

  function isoDate() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function dailyCode(seed, date) {
    const s = seed + '|' + date;
    let h = 5381;
    for (let i = 0; i < s.length; i++) {
      h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
    }
    return h.toString(36).toUpperCase().slice(0, 5);
  }

  function fmtS(n) {
    if (!n) return 'S/ 0';
    return 'S/ ' + Math.round(n).toLocaleString('es-PE');
  }

  function fmtUpd(utcStr) {
    if (!utcStr) return '—';
    // "2026-07-10 14:35 UTC" → Peru (UTC-5)
    const clean = utcStr.replace(' UTC', '').replace(' ', 'T') + ':00Z';
    const d = new Date(clean);
    if (isNaN(d)) return utcStr;
    return d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Lima' });
  }

  // ── Fecha ──────────────────────────────────────────────────
  const today = isoDate();
  const days   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const now = new Date();
  document.getElementById('date-label').textContent =
    `${days[now.getDay()]} ${now.getDate()} de ${months[now.getMonth()]} ${now.getFullYear()}`;

  // ── Claves ─────────────────────────────────────────────────
  const codeCards = document.getElementById('code-cards');
  PARTNERS.forEach(p => {
    const code = dailyCode(p.seed, today);
    const el = document.createElement('div');
    el.className = 'cc';
    el.style.borderColor = p.color + '44';
    el.innerHTML = `
      <div class="cc-left">
        <div class="cc-partner" style="color:${p.color}">${p.label}</div>
        <div class="cc-hint">válida solo hoy</div>
      </div>
      <div class="cc-code" style="color:${p.color}">${code}</div>`;
    codeCards.appendChild(el);
  });

  // ── Links + ventas ──────────────────────────────────────────
  const partnerCards = document.getElementById('partner-cards');

  // Crear cards con placeholder (IDs numéricos para evitar espacios en selectores)
  PARTNERS.forEach((p, i) => {
    const url = BASE + p.file;
    const el = document.createElement('div');
    el.className = 'pc';
    el.style.borderColor = p.color + '44';
    el.innerHTML = `
      <div class="pc-bar" style="background:${p.color}"></div>
      <div class="pc-info">
        <div class="pc-name" style="color:${p.color}">${p.label}</div>
        <div class="pc-meta">
          <span class="pc-ventas" id="pv${i}">S/ —</span>
          <span class="pc-upd" id="pu${i}">cargando…</span>
        </div>
      </div>
      <button class="pc-copy" id="pb${i}">Copiar link</button>`;
    partnerCards.appendChild(el);

    document.getElementById(`pb${i}`).onclick = () => {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById(`pb${i}`);
        btn.textContent = '¡Copiado!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copiar link'; btn.classList.remove('copied'); }, 2000);
      });
    };
  });

  // Cargar ventas
  fetch('data/ventas_mes.json')
    .then(r => r.json())
    .then(data => {
      const ventas = data.body || data.ventas || [];
      const updTime = fmtUpd(data.updated || '');
      const mesIni = today.slice(0, 7);

      const totales = {};
      ventas.forEach(v => {
        if (v.tipo_juego !== 'TOTAL') return;
        if (!v.fecha || !v.fecha.startsWith(mesIni)) return;
        const k = (v.partner || '').toUpperCase();
        totales[k] = (totales[k] || 0) + (v.total || 0);
      });

      PARTNERS.forEach((p, i) => {
        document.getElementById(`pv${i}`).textContent = fmtS(totales[p.key] || 0);
        document.getElementById(`pu${i}`).textContent = updTime ? `Act. ${updTime}` : '—';
      });
    })
    .catch(() => {
      PARTNERS.forEach((p, i) => {
        document.getElementById(`pu${i}`).textContent = 'sin datos';
      });
    });
</script>
</body>
</html>
