<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin · GeoDor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #FFF0F4;
      color: #2D1020;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 56px;
    }

    .eyebrow {
      font-size: 10px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: #C090A8; margin-bottom: 6px;
    }
    .page-title { font-size: 24px; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .date-label { font-size: 13px; color: #B090A0; text-align: center; margin-bottom: 16px; }

    /* ── FILTRO ──────────────────────────────────────────── */
    .filter-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px; width: 100%; max-width: 880px;
    }
    .filter-label { font-size: 11px; color: #B090A0; font-weight: 600; letter-spacing: .05em; }
    .filter-btn {
      background: none; border: 1.5px solid #E8C8D4; color: #A07090;
      font-size: 11px; font-weight: 700; font-family: inherit;
      border-radius: 20px; padding: 5px 14px; cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      letter-spacing: .04em;
    }
    .filter-btn:hover { color: #2D1020; border-color: #C090A8; background: #FFE4EE; }
    .filter-btn.active { color: #0DA870; border-color: #0DA870; background: rgba(13,168,112,.08); }

    /* ── GRID PRINCIPAL (tabla 2 columnas) ───────────────── */
    .main-grid {
      width: 100%;
      max-width: 880px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 28px;
      align-items: stretch;
    }
    @media (max-width: 620px) {
      .main-grid { grid-template-columns: 1fr; }
    }

    .col-header {
      font-size: 10px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: #C090A8; padding-bottom: 6px;
      border-bottom: 1px solid #F0D0DC; margin-bottom: 2px;
    }

    /* ── CARD PARTNER (link) ─────────────────────────────── */
    .pc {
      background: #FFFFFF; border: 1.5px solid; border-radius: 16px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 4px rgba(180,80,120,.07);
    }
    .pc-bar { width: 4px; border-radius: 4px; flex-shrink: 0; align-self: stretch; min-height: 36px; }
    .pc-info { flex: 1; min-width: 0; }
    .pc-name { font-size: 15px; font-weight: 800; line-height: 1.2; }
    .pc-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
    .pc-ventas { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; color: #4A2030; }
    .pc-upd { font-size: 11px; color: #C0A0B0; }
    .pc-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .pc-copy {
      background: none; border: 1.5px solid #E8C8D4; color: #A07090;
      font-size: 12px; font-weight: 600; font-family: inherit;
      border-radius: 10px; padding: 7px 12px; cursor: pointer;
      transition: color .15s, border-color .15s, background .15s; white-space: nowrap;
    }
    .pc-copy:hover { color: #2D1020; border-color: #C090A8; background: #FFE4EE; }
    .pc-copy.copied { color: #0DA870; border-color: #0DA870; }
    .pc-open {
      background: none; border: 1.5px solid #E8C8D4; color: #A07090;
      font-size: 12px; font-weight: 600; border-radius: 10px;
      padding: 7px 12px; cursor: pointer;
      transition: color .15s, border-color .15s, background .15s;
      white-space: nowrap; text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .pc-open:hover { color: #2D1020; border-color: #C090A8; background: #FFE4EE; }

    /* ── CARD CLAVE ──────────────────────────────────────── */
    .cc {
      background: #FFFFFF; border: 1.5px solid; border-radius: 14px;
      padding: 14px 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer;
      transition: background .15s;
      box-shadow: 0 1px 4px rgba(180,80,120,.07);
    }
    .cc:hover { background: #FFF5F8; }
    .cc-left { display: flex; flex-direction: column; gap: 2px; }
    .cc-partner { font-size: 13px; font-weight: 700; }
    .cc-hint { font-size: 10px; color: #C0A0B0; transition: color .15s; }
    .cc.copied .cc-hint { color: #0DA870; }
    .cc-code { font-size: 22px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: .08em; }

    .footer { font-size: 11px; color: #C0A0B0; text-align: center; max-width: 300px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="eyebrow">GeoDor · Administración</div>
  <h1 class="page-title">Panel de Partners</h1>
  <div class="date-label" id="date-label">—</div>

  <div class="filter-row">
    <span class="filter-label">Mostrando: casas de apuestas</span>
    <button class="filter-btn" id="filter-btn">+ Ver todos</button>
  </div>

  <div class="main-grid" id="main-grid"></div>

  <div class="footer">
    Uso interno · GeoDor<br>
    Comparte la clave de cada partner solo con sus cajeras.
  </div>

<script>
  const BASE = 'https://leonardow33.github.io/MAPA_RC_INTERACTIVO/BONOS%20PARTNERS/';

  const PARTNERS = [
    { label: 'Apuesta Total', color: '#E53535', seed: 'GEODOR_AT_2025',   file: 'bonus_at.html',        key: 'APUESTA TOTAL' },
    { label: 'Tinbet',        color: '#16A34A', seed: 'GEODOR_TIN_2025',  file: 'bonus_tinbet.html',    key: 'TINBET'        },
    { label: 'Livesport',     color: '#2563EB', seed: 'GEODOR_LIVE_2025', file: 'bonus_livesport.html', key: 'LIVESPORT'     },
    { label: 'Retabet',       color: '#64748B', seed: 'GEODOR_RET_2025',  file: 'bonus_retabet.html',   key: 'RETABET'       },
    { label: 'Doradobet',     color: '#D97706', seed: 'GEODOR_DOR_2025',  file: 'bonus_doradobet.html', key: 'DORADOBET'     },
    { label: 'Aciertala',     color: '#0891B2', seed: 'GEODOR_ACT_2025',  file: 'bonus_aciertala.html', key: 'ACIERTALA'     },
    { label: 'Cencosud',      color: '#006633', seed: 'GEODOR_CEN_2025',  file: 'bonus_cencosud.html',  key: 'CENCOSUD',      hidden: true },
  ];

  function isoDate() {
    return new Date().toLocaleDateString('sv', { timeZone: 'America/Lima' });
  }

  function dailyCode(seed, date) {
    const s = seed + '|' + date;
    let h = 5381;
    for (let i = 0; i < s.length; i++) {
      h = (((h << 5) + h) ^ s.charCodeAt(i)) >>> 0;
    }
    return h.toString(36).toUpperCase().slice(0, 5);
  }

  function fmtS(n) {
    if (!n) return 'S/ 0';
    return 'S/ ' + Math.round(n).toLocaleString('es-PE');
  }

  function fmtUpd(utcStr) {
    if (!utcStr) return '—';
    const clean = utcStr.replace(' UTC', '').replace(' ', 'T') + ':00Z';
    const d = new Date(clean);
    if (isNaN(d)) return utcStr;
    return d.toLocaleTimeString('es-PE', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Lima' });
  }

  const today = isoDate();
  const days   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const now = new Date();
  document.getElementById('date-label').textContent =
    `${days[now.getDay()]} ${now.getDate()} de ${months[now.getMonth()]} ${now.getFullYear()}`;

  // ── Estado de ventas (cargado una vez) ────────────────────────
  let ventasTotales = {};
  let ventasUpdTime = '';

  // ── Render ────────────────────────────────────────────────────
  let showAll = false;

  function render() {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = '';

    // Cabeceras
    ['Links de acceso directo', 'Claves del día'].forEach(txt => {
      const h = document.createElement('div');
      h.className = 'col-header';
      h.textContent = txt;
      grid.appendChild(h);
    });

    const visible = PARTNERS.filter(p => showAll || !p.hidden);

    visible.forEach((p, i) => {
      const url = BASE + p.file;
      const code = dailyCode(p.seed, today);
      const uid = 'p' + i + (showAll ? 'a' : '');

      // ── Card link ─────────────────────────────────────────
      const pc = document.createElement('div');
      pc.className = 'pc';
      pc.style.borderColor = p.color + '44';
      pc.innerHTML = `
        <div class="pc-bar" style="background:${p.color}"></div>
        <div class="pc-info">
          <div class="pc-name" style="color:${p.color}">${p.label}</div>
          <div class="pc-meta">
            <span class="pc-ventas" id="pv${uid}">${fmtS(ventasTotales[p.key] || 0)}</span>
            <span class="pc-upd" id="pu${uid}">${ventasUpdTime ? 'Act. ' + ventasUpdTime : 'cargando…'}</span>
          </div>
        </div>
        <div class="pc-actions">
          <a class="pc-open" href="${url}" target="_blank">Abrir ↗</a>
          <button class="pc-copy" id="pb${uid}">Copiar link</button>
        </div>`;
      grid.appendChild(pc);

      document.getElementById(`pb${uid}`).addEventListener('click', () => {
        navigator.clipboard.writeText(url).then(() => {
          const btn = document.getElementById(`pb${uid}`);
          btn.textContent = '¡Copiado!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copiar link'; btn.classList.remove('copied'); }, 2000);
        });
      });

      // ── Card clave ────────────────────────────────────────
      const cc = document.createElement('div');
      cc.className = 'cc';
      cc.style.borderColor = p.color + '44';
      cc.innerHTML = `
        <div class="cc-left">
          <div class="cc-partner" style="color:${p.color}">${p.label}</div>
          <div class="cc-hint">toca para copiar</div>
        </div>
        <div class="cc-code" style="color:${p.color}">${code}</div>`;
      cc.addEventListener('click', () => {
        navigator.clipboard.writeText(code).then(() => {
          cc.classList.add('copied');
          cc.querySelector('.cc-hint').textContent = '¡Copiado!';
          setTimeout(() => {
            cc.classList.remove('copied');
            cc.querySelector('.cc-hint').textContent = 'toca para copiar';
          }, 2000);
        });
      });
      grid.appendChild(cc);
    });
  }

  // ── Filtro ────────────────────────────────────────────────────
  document.getElementById('filter-btn').addEventListener('click', () => {
    showAll = !showAll;
    const btn = document.getElementById('filter-btn');
    const lbl = document.querySelector('.filter-label');
    if (showAll) {
      btn.textContent = '− Solo apuestas';
      btn.classList.add('active');
      lbl.textContent = 'Mostrando: todos los partners';
    } else {
      btn.textContent = '+ Ver todos';
      btn.classList.remove('active');
      lbl.textContent = 'Mostrando: casas de apuestas';
    }
    render();
  });

  // Render inicial
  render();

  // ── Cargar ventas ─────────────────────────────────────────────
  fetch('data/ventas_mes.json')
    .then(r => r.json())
    .then(data => {
      const ventas = data.body || data.ventas || [];
      ventasUpdTime = fmtUpd(data.updated || '');
      const mesIni = today.slice(0, 7);
      ventas.forEach(v => {
        if (v.tipo_juego !== 'TOTAL') return;
        if (!v.fecha || !v.fecha.startsWith(mesIni)) return;
        const k = (v.partner || '').toUpperCase();
        ventasTotales[k] = (ventasTotales[k] || 0) + (v.total || 0);
      });
      render();
    })
    .catch(() => {
      ventasUpdTime = 'sin datos';
      render();
    });
</script>
</body>
</html>
