<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo</title>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { height: 100%; margin: 0; }

#map { height: 85%; }

#filtro {
    padding: 14px;
    background: white;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    position: relative;
}

#filtro label {
    font-size: 16px;
    font-weight: 600;
}

#filtro select {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    min-width: 160px;
    border: 1px solid #ccc;
}

#buscador {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    min-width: 220px;
}

/* 🔽 RESULTADOS */
#resultados {
    position: absolute;
    top: 60px;
    left: 0;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    width: 260px;
    max-height: 250px;
    overflow-y: auto;
    z-index: 999;
}

.item-resultado {
    padding: 10px;
    cursor: pointer;
    font-size: 16px;
}

.item-resultado:hover {
    background: #f0f0f0;
}

/* BOTÓN CAPAS */
.leaflet-control-layers-toggle {
    width: 44px !important;
    height: 44px !important;
}
</style>
</head>

<body>

<div id="filtro">

    <!-- 🔍 BUSCADOR -->
    <input type="text" id="buscador" placeholder="🔍 Buscar tienda o código..." />
    <div id="resultados"></div>

    <!-- FILTROS -->
    <label>RC:</label>
    <select id="rcFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Día:</label>
    <select id="diaFilter">
        <option value="ALL">Todos</option>
    </select>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-12.0464, -77.0428], 14);

// 🗺️ CAPAS
var street = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

L.control.layers({
    "Calles": street,
    "Satélite": satellite,
    "Oscuro": dark
}, null, { position: 'bottomright' }).addTo(map);

let allData = [];
let markersLayer = L.layerGroup().addTo(map);

// ICONOS
function getIcon(responsable) {

    if (!responsable) return "icons/default.png";

    responsable = responsable.trim().toUpperCase();

    if (responsable.includes("APUESTA TOTAL")) return "icons/apuesta.png";
    if (responsable.includes("TAMBO")) return "icons/tambo.png";
    if (responsable.includes("TINBET")) return "icons/tinbet.png";
    if (responsable.includes("LIVESPORT")) return "icons/livesport.png";

    if (
        responsable.includes("AUR BODEGA") ||
        responsable.includes("JS BODEGA") ||
        responsable.includes("MCG BODEGA")
    ) return "icons/bodega.png";

    return "icons/default.png";
}

// FETCH
fetch('puntos.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

    allData = data;

    let rcSet = new Set();
    let diaSet = new Set();

    data.forEach(p => {
        rcSet.add(p.rc);
        if (p.dias) p.dias.forEach(d => diaSet.add(d));
    });

    let rcSelect = document.getElementById("rcFilter");
    rcSet.forEach(rc => {
        let option = document.createElement("option");
        option.value = rc;
        option.text = rc;
        rcSelect.appendChild(option);
    });

    let diaSelect = document.getElementById("diaFilter");
    diaSet.forEach(dia => {
        let option = document.createElement("option");
        option.value = dia;
        option.text = dia;
        diaSelect.appendChild(option);
    });

    renderMap("ALL", "ALL");
});

// MAPA
function renderMap(filterRC, filterDia) {

    markersLayer.clearLayers();

    let filtered = allData.filter(p =>
        (filterRC === "ALL" || p.rc === filterRC) &&
        (filterDia === "ALL" || (p.dias && p.dias.includes(filterDia)))
    );

    let group = new L.featureGroup();

    filtered.forEach(p => {

    let icon = L.icon({
        iconUrl: getIcon(p.responsable),
        iconSize: [38, 38],
        iconAnchor: [19, 38],
        popupAnchor: [0, -30]
    });

    let marker = L.marker([p.lat, p.lng], { icon: icon });

    marker.bindPopup(`
        <b>${p.nombre}</b><br>
        ID: ${p.ID}<br>
        RC: ${p.rc}<br>
        Responsable: ${p.responsable}<br>
        Estado: ${p.estado}<br>
        Zona: ${p.zona}
    `);

    markersLayer.addLayer(marker);
    group.addLayer(marker);
});

// 🔥 ESTO FALTABA
if (filtered.length > 0) {
    map.fitBounds(group.getBounds());
}

}

// FILTROS
document.getElementById("rcFilter").addEventListener("change", updateFilters);
document.getElementById("diaFilter").addEventListener("change", updateFilters);

function updateFilters() {
    renderMap(
        document.getElementById("rcFilter").value,
        document.getElementById("diaFilter").value
    );
}

// 📍 GEOLOCALIZACIÓN
navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    L.marker([lat, lng]).addTo(map).bindPopup("Estás aquí");
});

// 🔍 BUSCADOR
const buscador = document.getElementById("buscador");
const resultadosDiv = document.getElementById("resultados");

buscador.addEventListener("input", function () {

    let texto = this.value.toLowerCase();
    resultadosDiv.innerHTML = "";

    if (texto.length < 2) return;

    let resultados = allData.filter(p =>
        p.nombre.toLowerCase().includes(texto) ||
        p.ID.toString().includes(texto)
    ).slice(0, 10);

    resultados.forEach(p => {

        let item = document.createElement("div");
        item.className = "item-resultado";
        item.innerHTML = `<b>${p.nombre}</b><br>${p.ID}`;

        item.onclick = () => {
            map.setView([p.lat, p.lng], 16);
            resultadosDiv.innerHTML = "";
        };

        resultadosDiv.appendChild(item);
    });
});

</script>

</body>
</html>
