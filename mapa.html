<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#map {
    flex: 1;
    min-height: 0;
    width: 100%;
}

#filtro {
    padding: 14px;
    background: white;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    position: relative;
}

#filtro label {
    font-size: 16px;
    font-weight: 600;
}

#filtro select {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    min-width: 160px;
    border: 1px solid #ccc;
}

#buscador {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    min-width: 220px;
}

/* 🔽 RESULTADOS */
#resultados {
    position: absolute;
    top: 60px;
    left: 0;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    width: 260px;
    max-height: 250px;
    overflow-y: auto;
    z-index: 999;
}

.item-resultado {
    padding: 10px;
    cursor: pointer;
    font-size: 16px;
}

.item-resultado:hover {
    background: #f0f0f0;
}

/* BOTÓN CAPAS */
.leaflet-control-layers-toggle {
    width: 44px !important;
    height: 44px !important;
}

#btnRuta {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #9E9E9E;
    color: white;
    cursor: not-allowed;
    font-weight: 600;
    opacity: 0.6;
    transition: background 0.2s, opacity 0.2s;
}
#btnRuta.activo {
    background: #2196F3;
    cursor: pointer;
    opacity: 1;
}
#btnRuta.activo:hover { background: #1565C0; }

#btnUbicacion {
    font-size: 20px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: #f5f5f5;
    color: #333;
    cursor: pointer;
    line-height: 1;
}
#btnUbicacion:hover { background: #e0e0e0; }

#btnLimpiarRuta {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #f44336;
    color: white;
    cursor: pointer;
    font-weight: 600;
    display: none;
}
#btnLimpiarRuta:hover { background: #c62828; }

#panelRuta {
    display: none;
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 290px;
    background: white;
    border-left: 3px solid #2196F3;
    overflow-y: auto;
    z-index: 1001;
    padding: 14px;
    box-sizing: border-box;
    box-shadow: -4px 0 12px rgba(0,0,0,0.2);
}

.stop-item {
    padding: 9px 6px;
    border-bottom: 1px solid #eee;
    font-size: 13px;
}

.stop-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #2196F3;
    color: white;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-weight: bold;
    font-size: 12px;
    margin-right: 6px;
}

.stop-nav {
    display: inline-block;
    margin-top: 5px;
    font-size: 12px;
    color: #2196F3;
    text-decoration: none;
    font-weight: 600;
}
.stop-nav:hover { text-decoration: underline; }

@media (max-width: 600px) {
    #filtro {
        padding: 8px;
        gap: 6px;
    }
    #filtro label { font-size: 14px; }
    #filtro select {
        font-size: 16px;
        padding: 8px;
        min-width: 0;
        flex: 1;
    }
    #buscador {
        font-size: 16px;
        padding: 8px;
        min-width: 0;
        width: 100%;
        box-sizing: border-box;
    }
    #btnRuta, #btnLimpiarRuta {
        font-size: 14px;
        padding: 8px 12px;
    }
    #panelRuta {
        width: 100%;
        height: 50%;
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        border-left: none;
        border-top: 3px solid #2196F3;
        border-radius: 16px 16px 0 0;
    }
}
</style>
</head>

<body>

<div id="filtro">

    <!-- 🔍 BUSCADOR -->
    <input type="text" id="buscador" placeholder="🔍 Buscar tienda o código..." />
    <div id="resultados"></div>

    <!-- FILTROS -->
    <label>RC:</label>
    <select id="rcFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Día:</label>
    <select id="diaFilter">
        <option value="ALL">Todos</option>
    </select>

    <button id="btnUbicacion" onclick="irAUbicacion()" title="Mi ubicación">📍</button>
    <button id="btnRuta" onclick="generarRuta()">🗺️ Generar Ruta</button>
    <button id="btnLimpiarRuta" onclick="limpiarRuta()">✕ Limpiar Ruta</button>

</div>

<div id="panelRuta">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong style="font-size:15px">🗺️ Ruta por cercanía</strong>
        <button onclick="document.getElementById('panelRuta').style.display='none'" style="border:none;background:none;font-size:22px;cursor:pointer;color:#888;line-height:1">×</button>
    </div>
    <div id="listaRuta"></div>
</div>


<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-9.19, -75.02], 6);

// 🗺️ CAPAS
var street = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

L.control.layers({
    "Calles": street,
    "Satélite": satellite,
    "Oscuro": dark
}, null, { position: 'bottomright' }).addTo(map);

let allData = [];
let currentFiltered = [];
let userLat = null, userLng = null;
let userMarker = null;
let routeLayer = null;
let routeMarkersLayer = L.layerGroup().addTo(map);
let markersLayer = L.layerGroup().addTo(map);

// ICONOS
function getIcon(responsable) {

    if (!responsable) return "icons/default.png";

    responsable = responsable.trim().toUpperCase();

    if (responsable.includes("APUESTA TOTAL")) return "icons/apuesta.png";
    if (responsable.includes("TAMBO")) return "icons/tambo.png";
    if (responsable.includes("TINBET")) return "icons/tinbet.png";
    if (responsable.includes("LIVESPORT")) return "icons/livesport.png";

    if (
        responsable.includes("AUR BODEGA") ||
        responsable.includes("JS BODEGA") ||
        responsable.includes("MCG BODEGA")
    ) return "icons/bodega.png";

    return "icons/default.png";
}

// FETCH
fetch('puntos.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

    allData = data;

    let rcSet = new Set();
    let diaSet = new Set();

    data.forEach(p => {
        rcSet.add(p.rc);
        if (p.dias) p.dias.forEach(d => diaSet.add(d));
    });

    let rcSelect = document.getElementById("rcFilter");
    rcSet.forEach(rc => {
        let option = document.createElement("option");
        option.value = rc;
        option.text = rc;
        rcSelect.appendChild(option);
    });

    let diaSelect = document.getElementById("diaFilter");
    diaSet.forEach(dia => {
        let option = document.createElement("option");
        option.value = dia;
        option.text = dia;
        diaSelect.appendChild(option);
    });

    renderMap("ALL", "ALL");
});

// MAPA
function renderMap(filterRC, filterDia) {

    markersLayer.clearLayers();

    let filtered = allData.filter(p =>
        (filterRC === "ALL" || p.rc === filterRC) &&
        (filterDia === "ALL" || (p.dias && p.dias.includes(filterDia)))
    );
    currentFiltered = filtered;

    let group = new L.featureGroup();

    filtered.forEach(p => {

    let icon = L.icon({
        iconUrl: getIcon(p.responsable),
        iconSize: [38, 38],
        iconAnchor: [19, 38],
        popupAnchor: [0, -30]
    });

    let marker = L.marker([p.lat, p.lng], { icon: icon });

    marker.bindPopup(`
        <b>${p.nombre}</b><br>
        ID: ${p.ID}<br>
        RC: ${p.rc}<br>
        Responsable: ${p.responsable}<br>
        Estado: ${p.estado}<br>
        Zona: ${p.zona}
    `);

    markersLayer.addLayer(marker);
    group.addLayer(marker);
});

if (filtered.length > 0 && (filterRC !== "ALL" || filterDia !== "ALL")) {
    map.fitBounds(group.getBounds());
}

}

// FILTROS
document.getElementById("rcFilter").addEventListener("change", updateFilters);
document.getElementById("diaFilter").addEventListener("change", updateFilters);

function updateFilters() {
    let rc = document.getElementById("rcFilter").value;
    let btnRuta = document.getElementById("btnRuta");
    if (rc !== "ALL") {
        btnRuta.classList.add("activo");
    } else {
        btnRuta.classList.remove("activo");
        limpiarRuta();
    }
    renderMap(rc, document.getElementById("diaFilter").value);
}

function irAUbicacion() {
    if (!userLat || !userLng) {
        alert("Esperando señal GPS. Asegúrate de haber dado permiso de ubicación.");
        return;
    }
    map.flyTo([userLat, userLng], 16, { duration: 1.2 });
    if (userMarker) userMarker.openPopup();
}

// 📍 GEOLOCALIZACIÓN
navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    if (userMarker) {
        userMarker.setLatLng([userLat, userLng]);
    } else {
        userMarker = L.circleMarker([userLat, userLng], {
            radius: 10,
            fillColor: '#2196F3',
            color: 'white',
            weight: 3,
            fillOpacity: 1
        }).addTo(map).bindPopup("Estás aquí");
    }
}, () => {}, { enableHighAccuracy: true });

// RUTA POR CERCANÍA
function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function generarRuta() {
    if (!document.getElementById("btnRuta").classList.contains("activo")) return;
    if (!userLat || !userLng) {
        alert("Esperando señal GPS. Asegúrate de haber dado permiso de ubicación.");
        return;
    }
    if (currentFiltered.length === 0) {
        alert("No hay puntos visibles en el mapa.");
        return;
    }

    limpiarRuta();

    // Algoritmo vecino más cercano partiendo de la ubicación actual
    let remaining = [...currentFiltered];
    let ordered = [];
    let curLat = userLat, curLng = userLng;

    while (remaining.length > 0) {
        let minDist = Infinity, minIdx = 0;
        remaining.forEach((p, i) => {
            let d = haversine(curLat, curLng, p.lat, p.lng);
            if (d < minDist) { minDist = d; minIdx = i; }
        });
        ordered.push(remaining[minIdx]);
        curLat = remaining[minIdx].lat;
        curLng = remaining[minIdx].lng;
        remaining.splice(minIdx, 1);
    }

    // Línea de ruta
    let coords = [[userLat, userLng], ...ordered.map(p => [p.lat, p.lng])];
    routeLayer = L.polyline(coords, { color: '#2196F3', weight: 3, opacity: 0.85, dashArray: '8,5' }).addTo(map);

    // Marcadores numerados
    ordered.forEach((p, i) => {
        let numIcon = L.divIcon({
            html: `<div style="background:#2196F3;color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid white;box-shadow:0 2px 5px rgba(0,0,0,0.4)">${i+1}</div>`,
            className: '',
            iconSize: [26, 26],
            iconAnchor: [13, 13]
        });
        L.marker([p.lat, p.lng], { icon: numIcon })
            .bindPopup(`<b>#${i+1} ${p.nombre}</b><br>ID: ${p.ID}<br>RC: ${p.rc}`)
            .addTo(routeMarkersLayer);
    });

    // Panel lateral con lista
    let lista = document.getElementById("listaRuta");
    let distTotal = 0;
    let prevLat = userLat, prevLng = userLng;
    ordered.forEach(p => {
        distTotal += haversine(prevLat, prevLng, p.lat, p.lng);
        prevLat = p.lat; prevLng = p.lng;
    });

    lista.innerHTML = `<div style="font-size:12px;color:#666;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee">
        <b>${ordered.length} paradas</b> · ${distTotal.toFixed(1)} km aprox.
    </div>`;

    ordered.forEach((p, i) => {
        let navUrl = `https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
        lista.innerHTML += `
            <div class="stop-item">
                <div style="display:flex;align-items:center">
                    <span class="stop-num">${i+1}</span>
                    <span style="font-weight:600">${p.nombre}</span>
                </div>
                <div style="font-size:11px;color:#888;margin-top:3px;margin-left:30px">${p.ID} · ${p.rc || ''}</div>
                <a class="stop-nav" href="${navUrl}" target="_blank" style="margin-left:30px">Navegar →</a>
            </div>`;
    });

    document.getElementById("panelRuta").style.display = "block";
    document.getElementById("btnLimpiarRuta").style.display = "inline-block";
    map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
}

function limpiarRuta() {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    routeMarkersLayer.clearLayers();
    document.getElementById("panelRuta").style.display = "none";
    document.getElementById("btnLimpiarRuta").style.display = "none";
}

// 🔍 BUSCADOR
const buscador = document.getElementById("buscador");
const resultadosDiv = document.getElementById("resultados");

buscador.addEventListener("input", function () {

    let texto = this.value.toLowerCase();
    resultadosDiv.innerHTML = "";

    if (texto.length < 2) return;

    let resultados = allData.filter(p =>
        p.nombre.toLowerCase().includes(texto) ||
        p.ID.toString().includes(texto)
    ).slice(0, 10);

    resultados.forEach(p => {

        let item = document.createElement("div");
        item.className = "item-resultado";
        item.innerHTML = `<b>${p.nombre}</b><br>${p.ID}`;

        item.onclick = () => {

    resultadosDiv.innerHTML = "";
    buscador.value = p.nombre;

    // 🔥 filtrar SOLO esa tienda
    let resultadoUnico = [p];

    markersLayer.clearLayers();

    resultadoUnico.forEach(p => {

        let icon = L.icon({
            iconUrl: getIcon(p.responsable),
            iconSize: [38, 38],
            iconAnchor: [19, 38],
            popupAnchor: [0, -30]
        });

        let marker = L.marker([p.lat, p.lng], { icon: icon });

        marker.bindPopup(`
            <b>${p.nombre}</b><br>
            ID: ${p.ID}<br>
            RC: ${p.rc}<br>
            Responsable: ${p.responsable}<br>
            Estado: ${p.estado}<br>
            Zona: ${p.zona}
        `).openPopup();

        markersLayer.addLayer(marker);
    });

    map.setView([p.lat, p.lng], 16);
};

        resultadosDiv.appendChild(item);
    });
});

</script>

</body>
</html>
