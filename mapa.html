<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo</title>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

   <style>
html, body { height: 100%; margin: 0; }

#map { height: 85%; }

/* 🔹 CONTENEDOR FILTROS */
#filtro {
    padding: 14px;
    background: white;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
}

/* 🔹 TEXTOS */
#filtro label {
    font-size: 16px;
    font-weight: 600;
}

/* 🔹 SELECTS (más grandes 📱) */
#filtro select {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    min-width: 160px;
    border: 1px solid #ccc;
}

/* 🔥 BOTÓN DE CAPAS */
.leaflet-control-layers {
    font-size: 16px;
    border-radius: 10px;
    padding: 6px;
}

/* 🔥 ICONO MÁS GRANDE */
.leaflet-control-layers-toggle {
    width: 44px !important;
    height: 44px !important;
}

/* 🔥 PANEL DESPLEGADO */
.leaflet-control-layers-expanded {
    padding: 12px;
    font-size: 16px;
}
</style>
</head>
<body>

<div id="filtro">
    <label>RC:</label>
    <select id="rcFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Día:</label>
    <select id="diaFilter">
        <option value="ALL">Todos</option>
    </select>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-12.0464, -77.0428], 14);

// 🗺️ CAPAS DE MAPA

// 🟢 CALLES (ESRI - MUY BUENA LEGIBILIDAD)
var street = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri',
    maxZoom: 19
}).addTo(map);

// 🔵 SATÉLITE (ESRI)
var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri',
    maxZoom: 19
});

// 🟡 HÍBRIDO (SATÉLITE + NOMBRES DE CALLES 🔥)
var hybrid = L.layerGroup([
    satellite,
    L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Labels © Esri'
    })
]);

// 🟣 OSCURO (CARTO)
var dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 20
});

// Selector de capas
var baseMaps = {
    "Calles (Pro)": street,
    "Satélite": satellite,
    "Híbrido 🔥": hybrid,
    "Oscuro": dark
};

// Control
L.control.layers(baseMaps, null, { position: 'bottomright' }).addTo(map);

let allData = [];
let markersLayer = L.layerGroup().addTo(map);

// ICONOS
function getIcon(responsable) {
    if (!responsable) return "icons/default.png";

    responsable = responsable.trim().toUpperCase();

    if (responsable.includes("APUESTA TOTAL")) return "icons/apuesta.png";
    if (responsable.includes("TAMBO")) return "icons/tambo.png";
    if (responsable.includes("TINBET")) return "icons/tinbet.png";
    if (responsable.includes("LIVESPORT")) return "icons/livesport.png";

    if (
        responsable.includes("AUR BODEGA") ||
        responsable.includes("JS BODEGA") ||
        responsable.includes("MCG BODEGA")
    ) return "icons/bodega.png";

    return "icons/default.png";
}

// FETCH SIN CACHE 🔥
fetch('puntos.json?v=' + new Date().getTime())
.then(res => res.json())
.then(data => {

    allData = data;

    let rcSet = new Set();
    let diaSet = new Set();

    data.forEach(p => {
        rcSet.add(p.rc);

        if (p.dias) {
            p.dias.forEach(d => diaSet.add(d));
        }
    });

    // RC
    let rcSelect = document.getElementById("rcFilter");
    rcSet.forEach(rc => {
        let option = document.createElement("option");
        option.value = rc;
        option.text = rc;
        rcSelect.appendChild(option);
    });

    // DIAS
    let diaSelect = document.getElementById("diaFilter");
    diaSet.forEach(dia => {
        let option = document.createElement("option");
        option.value = dia;
        option.text = dia;
        diaSelect.appendChild(option);
    });

    renderMap("ALL", "ALL");
});

function renderMap(filterRC, filterDia) {

    markersLayer.clearLayers();

    let filtered = allData.filter(p => {
        return (filterRC === "ALL" || p.rc === filterRC) &&
               (filterDia === "ALL" || (p.dias && p.dias.includes(filterDia)));
    });

    let group = new L.featureGroup();

    filtered.forEach(p => {

        let lat = parseFloat(p.lat);
        let lng = parseFloat(p.lng);

        if (!isNaN(lat) && !isNaN(lng)) {

            let icon = L.icon({
                iconUrl: getIcon(p.responsable),
                iconSize: [38, 38],
                iconAnchor: [19, 38],
                popupAnchor: [0, -30]
            });

            let marker = L.marker([lat, lng], { icon: icon });

            marker.bindPopup(`
                <b>${p.nombre}</b><br>
                ID: ${p["ID"]}<br>
                RC: ${p.rc}<br>
                Responsable: ${p.responsable}<br>
                Días: ${p.dias ? p.dias.join(", ") : ""}<br>
                Estado: ${p.estado}<br>
                Zona: ${p.zona}<br>
            `);

            markersLayer.addLayer(marker);
            group.addLayer(marker);
        }
    });

    if (filtered.length > 0) {
        map.fitBounds(group.getBounds());
    }
}

// eventos
document.getElementById("rcFilter").addEventListener("change", updateFilters);
document.getElementById("diaFilter").addEventListener("change", updateFilters);

function updateFilters() {
    let rc = document.getElementById("rcFilter").value;
    let dia = document.getElementById("diaFilter").value;

    renderMap(rc, dia);
}

</script>

</body>
</html>
