<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo</title>
    <meta charset="utf-8" />    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest.json"/>
    <link rel="apple-touch-icon" href="icons/icon-192.png"/>
    <meta name="theme-color" content="#0F172A"/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#map {
    flex: 1;
    min-height: 0;
    width: 100%;
}

#filtro {
    padding: 10px 12px;
    background: linear-gradient(to right, #f9e4e4, #f5ece4);
    border-bottom: 2px solid #c4897a;
    box-shadow: 0 2px 8px rgba(150, 80, 60, 0.10);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
    align-items: center;
    position: relative;
}

#filtro label {
    font-size: 11px;
    font-weight: 700;
    color: #9c5a45;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    white-space: nowrap;
}

#filtro select {
    font-size: 13px;
    padding: 6px 8px;
    border-radius: 8px;
    min-width: 110px;
    max-width: 160px;
    border: 1.5px solid #d4a090;
    background: #fff8f6;
    color: #4a2318;
    cursor: pointer;
    height: 34px;
}

#filtro select:focus {
    outline: none;
    border-color: #9c4f3a;
    box-shadow: 0 0 0 2px rgba(196,137,122,0.30);
}

#buscador {
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1.5px solid #d4a090;
    background: #fff8f6;
    color: #4a2318;
    min-width: 180px;
    height: 34px;
}

#buscador:focus {
    outline: none;
    border-color: #9c4f3a;
    box-shadow: 0 0 0 2px rgba(196,137,122,0.30);
}

/* 🔽 RESULTADOS */
#resultados {
    position: absolute;
    top: 60px;
    left: 0;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    width: 260px;
    max-height: 250px;
    overflow-y: auto;
    z-index: 999;
}

.item-resultado {
    padding: 10px;
    cursor: pointer;
    font-size: 16px;
}

.item-resultado:hover {
    background: #f0f0f0;
}

/* BOTÓN CAPAS */
.leaflet-control-layers-toggle {
    width: 44px !important;
    height: 44px !important;
}

#btnRuta {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #9E9E9E;
    color: white;
    cursor: not-allowed;
    font-weight: 600;
    opacity: 0.6;
    transition: background 0.2s, opacity 0.2s;
}
#btnRuta.activo {
    background: #2196F3;
    cursor: pointer;
    opacity: 1;
}
#btnRuta.activo:hover { background: #1565C0; }

#btnUbicacion {
    position: fixed;
    bottom: 92px;
    right: 14px;
    z-index: 1000;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: white;
    color: #1565C0;
    font-size: 26px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.28);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}
#btnUbicacion:hover { background: #e3f2fd; }

#btnModo {
    font-size: 15px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid #c4897a;
    background: #fff8f6;
    color: #6b3a2a;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
}
#btnModo.pie {
    border-color: #43A047;
    color: #43A047;
    background: #f1f8e9;
}

#btnLimpiarRuta {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #f44336;
    color: white;
    cursor: pointer;
    font-weight: 600;
    display: none;
}
#btnLimpiarRuta:hover { background: #c62828; }

#panelRuta {
    display: none;
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 290px;
    background: white;
    border-left: 3px solid #2196F3;
    overflow-y: auto;
    z-index: 1001;
    padding: 14px;
    box-sizing: border-box;
    box-shadow: -4px 0 12px rgba(0,0,0,0.2);
}

.stop-item {
    padding: 9px 6px;
    border-bottom: 1px solid #eee;
    font-size: 13px;
}

.stop-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #2196F3;
    color: white;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-weight: bold;
    font-size: 12px;
    margin-right: 6px;
}

.stop-nav {
    display: inline-block;
    margin-top: 5px;
    font-size: 12px;
    color: #2196F3;
    text-decoration: none;
    font-weight: 600;
}
.stop-nav:hover { text-decoration: underline; }

@media (max-width: 600px) {
    #filtro {
        padding: 8px 10px;
        gap: 5px 6px;
    }
    #filtro label { font-size: 10px; }
    #filtro select {
        font-size: 12px;
        padding: 5px 6px;
        min-width: 0;
        flex: 1;
        height: 32px;
        max-width: none;
    }
    #buscador {
        font-size: 13px;
        padding: 6px 10px;
        min-width: 0;
        width: 100%;
        box-sizing: border-box;
        height: 34px;
    }
    #btnSinVenta {
        font-size: 10px;
        height: 24px;
        padding: 0 8px;
    }
    #btnRuta, #btnLimpiarRuta {
        font-size: 13px;
        padding: 6px 10px;
    }
    #panelRuta {
        width: 100%;
        height: 50%;
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        border-left: none;
        border-top: 3px solid #2196F3;
        border-radius: 16px 16px 0 0;
    }
}

/* === POPUP CARD === */
.popup-card { font-family: sans-serif; min-width: 235px; max-width: 295px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
.popup-header { padding: 10px 14px 9px; }
.popup-nombre { display: block; font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 5px; }
.popup-badge { display: inline-block; font-size: 11px; background: rgba(255,255,255,0.25); color: #fff; padding: 2px 9px; border-radius: 20px; font-weight: 600; }
.popup-body { background: #fff; padding: 6px 14px 2px; border: 1px solid #e8e8e8; border-top: none; }
.popup-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 4px 0; border-bottom: 1px solid #f5f5f5; }
.popup-row:last-child { border-bottom: none; }
.popup-lbl { color: #aaa; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; min-width: 66px; padding-top: 1px; }
.popup-val { color: #222; font-size: 13px; text-align: right; }
.popup-btn-visita { display: none; width: 100%; padding: 13px; background: #1565C0; color: white; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
.popup-btn-maps {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.2); color: white; font-size: 17px;
    text-decoration: none; border: 1px solid rgba(255,255,255,0.35);
    transition: background 0.15s;
}
.popup-btn-maps:hover, .popup-btn-maps:active { background: rgba(255,255,255,0.4); }
.popup-btn-visita:active { opacity: 0.82; }
.popup-visita-sab { background: #fff8e1; border: 1px solid #ffe082; border-bottom: none; padding: 7px 14px 6px; display: flex; flex-direction: column; gap: 2px; }
.popup-visita-sab-titulo { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #f57c00; letter-spacing: 0.5px; }
.popup-visita-sab-rep { font-size: 13px; font-weight: 700; color: #333; }
.popup-visita-sab-hora { font-size: 11px; color: #555; }
.popup-msg-visita { display: block; text-align: center; font-size: 12px; color: #999; padding: 7px 14px 10px; background: #fff; border: 1px solid #e8e8e8; border-top: none; border-radius: 0 0 10px 10px; }

/* === WIDGET PARTIDOS === */
#btnPartidos {
    position: fixed;
    bottom: 156px;
    right: 14px;
    z-index: 1000;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: #1A3A6B;
    color: white;
    font-size: 24px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.32);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: transform 0.2s;
}
#btnPartidos:hover { transform: scale(1.08); }
#btnPartidos .badge {
    position: absolute;
    top: -4px; right: -4px;
    background: #D4001A;
    color: white;
    font-size: 10px;
    font-weight: 800;
    border-radius: 10px;
    padding: 1px 5px;
    min-width: 16px;
    text-align: center;
    line-height: 16px;
    height: 16px;
    display: none;
}

#panelPartidos {
    position: fixed;
    bottom: 220px;
    right: 14px;
    z-index: 1001;
    width: 300px;
    max-width: calc(100vw - 28px);
    max-height: 60vh;
    background: white;
    border-radius: 16px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.28);
    overflow: hidden;
    display: none;
    flex-direction: column;
    font-family: sans-serif;
}
#panelPartidos.visible { display: flex; }

#panelPartidos .pp-header {
    background: #1A3A6B;
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}
#panelPartidos .pp-title {
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.3px;
}
#panelPartidos .pp-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
}
#panelPartidos .pp-body {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
}
.pp-day {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #9c4f3a;
    padding: 8px 14px 3px;
}
.pp-match {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid #f5f5f5;
    cursor: default;
}
.pp-match:last-child { border-bottom: none; }
.pp-bar {
    width: 4px;
    min-width: 4px;
    height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
}
.pp-info { flex: 1; min-width: 0; }
.pp-teams {
    font-size: 13px;
    font-weight: 700;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.pp-teams .pp-vs { color: #aaa; font-weight: 400; font-size: 11px; margin: 0 3px; }
.pp-meta { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
.pp-time {
    font-size: 11px; font-weight: 700;
    color: #1A3A6B;
    background: rgba(26,58,107,0.08);
    padding: 1px 5px; border-radius: 3px;
}
.pp-liga { font-size: 10px; color: #999; }
.pp-empty { text-align: center; padding: 24px 16px; color: #aaa; font-size: 13px; }
.pp-match-past .pp-teams { color: #888; }
.pp-match-past .pp-bar   { opacity: 0.35; }
.pp-score {
    font-size: 12px; font-weight: 800; color: #1A3A6B;
    background: rgba(26,58,107,0.1); padding: 1px 7px; border-radius: 4px;
}
.pp-fin {
    font-size: 10px; font-weight: 700; color: #999;
    background: #f0f0f0; padding: 1px 6px; border-radius: 4px;
    text-transform: uppercase;
}

/* drum inside panel */
.pp-drum-vp {
    position: relative; height: 72px; overflow: hidden;
    cursor: grab; touch-action: pan-y; user-select: none; -webkit-user-select: none;
    border-bottom: 1px solid #f0f0f0; flex-shrink: 0;
}
.pp-drum-vp:active { cursor: grabbing; }
.pp-drum-fade-left, .pp-drum-fade-right {
    position: absolute; top: 0; bottom: 0; width: 60px;
    z-index: 2; pointer-events: none;
}
.pp-drum-fade-left  { left: 0;  background: linear-gradient(to right, #fff 0%, transparent 100%); }
.pp-drum-fade-right { right: 0; background: linear-gradient(to left,  #fff 0%, transparent 100%); }
.pp-drum-line { position: absolute; top: 8%; bottom: 8%; width: 1px; background: rgba(26,58,107,0.18); z-index: 3; pointer-events: none; }
.pp-drum-line.l { left:  calc(50% - 38px); }
.pp-drum-line.r { right: calc(50% - 38px); }
.pp-drum-scene { perspective: 320px; height: 100%; display: flex; align-items: center; justify-content: center; }
#ppDrumTrack {
    transform-style: preserve-3d; position: relative; width: 62px; height: 60px;
    transition: transform 0.35s cubic-bezier(.25,.46,.45,.94);
}
.pp-drum-item {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
    font-family: sans-serif; backface-visibility: hidden; pointer-events: none;
}
.pp-drum-dday  { font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; transition: color 0.2s, font-size 0.2s; }
.pp-drum-ddate { font-size: 11px; color: #888; transition: opacity 0.2s; }

/* === MARKER PULSE === */
@keyframes markerPulse { 0%{transform:scale(1)} 40%{transform:scale(1.5)} 100%{transform:scale(1)} }
.marker-pulse { animation: markerPulse 0.42s ease; }

/* === CHIPS DE FILTROS ACTIVOS === */
#filtro-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 7px 14px;
    background: rgba(245,220,215,0.55);
    border-bottom: 1px solid #e0b8ae;
    min-height: 0;
}
#filtro-chips:empty { display: none; padding: 0; }
.chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #9c4f3a;
    color: white;
    border-radius: 20px;
    padding: 5px 8px 5px 12px;
    font-size: 13px;
    font-weight: 600;
    animation: chipIn 0.18s ease;
}
@keyframes chipIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
.chip-x {
    background: rgba(255,255,255,0.28);
    border: none;
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
}
.chip-x:hover { background: rgba(255,255,255,0.5); }

/* === BANNER GPS === */
#gpsBanner {
    display: none;
    position: fixed;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    background: #1565C0;
    color: white;
    border-radius: 14px;
    padding: 12px 18px;
    font-size: 13px;
    font-family: sans-serif;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    max-width: 310px;
    width: 90%;
    text-align: center;
}
#gpsBanner.denied { background: #c62828; }
#gpsBanner button {
    margin-top: 8px;
    padding: 7px 16px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
}
#gpsBanner button:hover { background: rgba(255,255,255,0.4); }

/* === SIN VENTA === */
#btnSinVenta {
    font-size: 11px;
    padding: 0 10px;
    border-radius: 20px;
    border: 1.5px solid #b71c1c;
    background: transparent;
    color: #b71c1c;
    font-weight: 700;
    cursor: pointer;
    opacity: 0.6;
    transition: all 0.2s;
    white-space: nowrap;
    height: 26px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
}
#btnSinVenta.activo { opacity: 1; background: #b71c1c; color: white; box-shadow: 0 0 0 2px rgba(183,28,28,0.25); }
#btnSinVenta:hover:not(:disabled) { opacity: 0.85; }
#btnSinVenta:disabled { opacity: 0.25; cursor: not-allowed; }

#clusterBtns { display: none; gap: 4px; align-items: center; }
#clusterBtns.visible { display: flex; }
.btn-cluster {
    font-size: 11px; padding: 6px 9px; border-radius: 8px; border: none;
    color: white; font-weight: 800; cursor: pointer; opacity: 0.6;
    transition: all 0.15s; line-height: 1;
}
.btn-cluster.activo { opacity: 1; box-shadow: 0 0 0 2px rgba(0,0,0,0.35); transform: scale(1.08); }
.btn-cluster:hover { opacity: 0.9; }
.bc-ta  { background: #7B1FA2; }
.bc-tb  { background: #9C27B0; }
.bc-tc  { background: #CE93D8; color: #4a0072; }
.bc-bro { background: #8B5E3C; }
.bc-dia { background: linear-gradient(135deg, #e0f7fa, #00E5FF); color: #004D61; text-shadow: 0 0 4px rgba(255,255,255,0.8); box-shadow: 0 0 6px rgba(0,229,255,0.5); }
.bc-oro { background: #F9A825; color: #3e2000; }
.bc-pla { background: #757575; }

#sinVentaBar {
    display: none;
    background: #b71c1c;
    color: white;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    font-family: sans-serif;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid #7f0000;
}
#sinVentaBar.visible { display: flex; }

/* === BOTÓN REUNIÓN === */
#btnReunion {
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #9E9E9E;
    color: white;
    font-weight: 700;
    cursor: not-allowed;
    opacity: 0.5;
    transition: all 0.2s;
    white-space: nowrap;
}
#btnReunion.activo {
    background: #00897B;
    cursor: pointer;
    opacity: 1;
}
#btnReunion.activo:hover { background: #00695C; }

/* === MODAL PIN === */
#modalReunion {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 3000;
    align-items: center;
    justify-content: center;
}
#modalReunion.visible { display: flex; }
#modalCard {
    background: white;
    border-radius: 18px;
    padding: 28px 24px 22px;
    width: 300px;
    max-width: 92vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
    text-align: center;
}
#modalCard h3 {
    margin: 0 0 4px;
    font-size: 18px;
    color: #00897B;
}
#modalRCNombre {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
    font-weight: 600;
}
#pinBoxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
}
.pin-digit {
    width: 52px;
    height: 58px;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 10px;
    outline: none;
    color: #222;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
}
.pin-digit:focus { border-color: #00897B; }
#pinError {
    color: #e53935;
    font-size: 13px;
    font-weight: 600;
    min-height: 18px;
    margin-bottom: 14px;
}
#modalBtns { display: flex; gap: 10px; }
#btnPinConfirm {
    flex: 1;
    padding: 12px;
    background: #00897B;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}
#btnPinConfirm:active { opacity: 0.85; }
#btnPinCancel {
    padding: 12px 18px;
    background: #f5f5f5;
    color: #555;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="filtro">

    <!-- 🔍 BUSCADOR -->
    <input type="text" id="buscador" placeholder="🔍 Buscar tienda o código..." />
    <div id="resultados"></div>

    <!-- FILTROS -->
    <label>Supervisor:</label>
    <select id="supFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>RC:</label>
    <select id="rcFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Día:</label>
    <select id="diaFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Zona:</label>
    <select id="zonaFilter">
        <option value="ALL">Todas</option>
    </select>

    <label>Partner:</label>
    <select id="partnerFilter">
        <option value="ALL">Todos</option>
    </select>

    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
        <label style="margin:0">to 60k:</label>
        <select id="sab30Filter">
