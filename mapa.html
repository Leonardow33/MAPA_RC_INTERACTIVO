<!DOCTYPE html>
<html>
<head>
    <title>Mapa Interactivo</title>
    <meta charset="utf-8" />    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

<style>
html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
}

#map {
    flex: 1;
    min-height: 0;
    width: 100%;
}

#filtro {
    padding: 14px;
    background: linear-gradient(to right, #f9e4e4, #f5ece4);
    border-bottom: 2.5px solid #c4897a;
    box-shadow: 0 3px 10px rgba(150, 80, 60, 0.12);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    position: relative;
}

#filtro label {
    font-size: 16px;
    font-weight: 700;
    color: #6b3a2a;
    letter-spacing: 0.3px;
}

#filtro select {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    min-width: 160px;
    border: 1.5px solid #c4897a;
    background: #fff8f6;
    color: #4a2318;
}

#filtro select:focus {
    outline: none;
    border-color: #9c4f3a;
    box-shadow: 0 0 0 3px rgba(196,137,122,0.25);
}

#buscador {
    font-size: 18px;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid #c4897a;
    background: #fff8f6;
    color: #4a2318;
    min-width: 220px;
}

#buscador:focus {
    outline: none;
    border-color: #9c4f3a;
    box-shadow: 0 0 0 3px rgba(196,137,122,0.25);
}

/* 🔽 RESULTADOS */
#resultados {
    position: absolute;
    top: 60px;
    left: 0;
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    width: 260px;
    max-height: 250px;
    overflow-y: auto;
    z-index: 999;
}

.item-resultado {
    padding: 10px;
    cursor: pointer;
    font-size: 16px;
}

.item-resultado:hover {
    background: #f0f0f0;
}

/* BOTÓN CAPAS */
.leaflet-control-layers-toggle {
    width: 44px !important;
    height: 44px !important;
}

#btnRuta {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #9E9E9E;
    color: white;
    cursor: not-allowed;
    font-weight: 600;
    opacity: 0.6;
    transition: background 0.2s, opacity 0.2s;
}
#btnRuta.activo {
    background: #2196F3;
    cursor: pointer;
    opacity: 1;
}
#btnRuta.activo:hover { background: #1565C0; }

#btnUbicacion {
    position: fixed;
    bottom: 92px;
    right: 14px;
    z-index: 1000;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: white;
    color: #1565C0;
    font-size: 26px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.28);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
}
#btnUbicacion:hover { background: #e3f2fd; }

#btnModo {
    font-size: 15px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid #c4897a;
    background: #fff8f6;
    color: #6b3a2a;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.2s;
}
#btnModo.pie {
    border-color: #43A047;
    color: #43A047;
    background: #f1f8e9;
}

#btnLimpiarRuta {
    font-size: 16px;
    padding: 12px 18px;
    border-radius: 10px;
    border: none;
    background: #f44336;
    color: white;
    cursor: pointer;
    font-weight: 600;
    display: none;
}
#btnLimpiarRuta:hover { background: #c62828; }

#panelRuta {
    display: none;
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 290px;
    background: white;
    border-left: 3px solid #2196F3;
    overflow-y: auto;
    z-index: 1001;
    padding: 14px;
    box-sizing: border-box;
    box-shadow: -4px 0 12px rgba(0,0,0,0.2);
}

.stop-item {
    padding: 9px 6px;
    border-bottom: 1px solid #eee;
    font-size: 13px;
}

.stop-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #2196F3;
    color: white;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    font-weight: bold;
    font-size: 12px;
    margin-right: 6px;
}

.stop-nav {
    display: inline-block;
    margin-top: 5px;
    font-size: 12px;
    color: #2196F3;
    text-decoration: none;
    font-weight: 600;
}
.stop-nav:hover { text-decoration: underline; }

@media (max-width: 600px) {
    #filtro {
        padding: 8px;
        gap: 6px;
    }
    #filtro label { font-size: 14px; }
    #filtro select {
        font-size: 16px;
        padding: 8px;
        min-width: 0;
        flex: 1;
    }
    #buscador {
        font-size: 16px;
        padding: 8px;
        min-width: 0;
        width: 100%;
        box-sizing: border-box;
    }
    #btnRuta, #btnLimpiarRuta {
        font-size: 14px;
        padding: 8px 12px;
    }
    #panelRuta {
        width: 100%;
        height: 50%;
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        border-left: none;
        border-top: 3px solid #2196F3;
        border-radius: 16px 16px 0 0;
    }
}

/* === POPUP CARD === */
.popup-card { font-family: sans-serif; min-width: 235px; max-width: 295px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
.popup-header { padding: 10px 14px 9px; }
.popup-nombre { display: block; font-size: 15px; font-weight: 700; color: #fff; line-height: 1.3; margin-bottom: 5px; }
.popup-badge { display: inline-block; font-size: 11px; background: rgba(255,255,255,0.25); color: #fff; padding: 2px 9px; border-radius: 20px; font-weight: 600; }
.popup-body { background: #fff; padding: 6px 14px 2px; border: 1px solid #e8e8e8; border-top: none; }
.popup-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 4px 0; border-bottom: 1px solid #f5f5f5; }
.popup-row:last-child { border-bottom: none; }
.popup-lbl { color: #aaa; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; min-width: 66px; padding-top: 1px; }
.popup-val { color: #222; font-size: 13px; text-align: right; }
.popup-btn-visita { display: none; width: 100%; padding: 13px; background: #1565C0; color: white; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
.popup-btn-visita:active { opacity: 0.82; }
.popup-msg-visita { display: block; text-align: center; font-size: 12px; color: #999; padding: 7px 14px 10px; background: #fff; border: 1px solid #e8e8e8; border-top: none; border-radius: 0 0 10px 10px; }

/* === WIDGET PARTIDOS === */
#btnPartidos {
    position: fixed;
    bottom: 156px;
    right: 14px;
    z-index: 1000;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    background: #1A3A6B;
    color: white;
    font-size: 24px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.32);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: transform 0.2s;
}
#btnPartidos:hover { transform: scale(1.08); }
#btnPartidos .badge {
    position: absolute;
    top: -4px; right: -4px;
    background: #D4001A;
    color: white;
    font-size: 10px;
    font-weight: 800;
    border-radius: 10px;
    padding: 1px 5px;
    min-width: 16px;
    text-align: center;
    line-height: 16px;
    height: 16px;
    display: none;
}

#panelPartidos {
    position: fixed;
    bottom: 220px;
    right: 14px;
    z-index: 1001;
    width: 300px;
    max-width: calc(100vw - 28px);
    max-height: 60vh;
    background: white;
    border-radius: 16px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.28);
    overflow: hidden;
    display: none;
    flex-direction: column;
    font-family: sans-serif;
}
#panelPartidos.visible { display: flex; }

#panelPartidos .pp-header {
    background: #1A3A6B;
    color: white;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
}
#panelPartidos .pp-title {
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.3px;
}
#panelPartidos .pp-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 0;
}
#panelPartidos .pp-body {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
}
.pp-day {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #9c4f3a;
    padding: 8px 14px 3px;
}
.pp-match {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 14px;
    border-bottom: 1px solid #f5f5f5;
    cursor: default;
}
.pp-match:last-child { border-bottom: none; }
.pp-bar {
    width: 4px;
    min-width: 4px;
    height: 32px;
    border-radius: 2px;
    flex-shrink: 0;
}
.pp-info { flex: 1; min-width: 0; }
.pp-teams {
    font-size: 13px;
    font-weight: 700;
    color: #222;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.pp-teams .pp-vs { color: #aaa; font-weight: 400; font-size: 11px; margin: 0 3px; }
.pp-meta { display: flex; gap: 6px; align-items: center; margin-top: 2px; }
.pp-time {
    font-size: 11px; font-weight: 700;
    color: #1A3A6B;
    background: rgba(26,58,107,0.08);
    padding: 1px 5px; border-radius: 3px;
}
.pp-liga { font-size: 10px; color: #999; }
.pp-empty { text-align: center; padding: 24px 16px; color: #aaa; font-size: 13px; }

/* === MARKER PULSE === */
@keyframes markerPulse { 0%{transform:scale(1)} 40%{transform:scale(1.5)} 100%{transform:scale(1)} }
.marker-pulse { animation: markerPulse 0.42s ease; }

/* === CHIPS DE FILTROS ACTIVOS === */
#filtro-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 7px 14px;
    background: rgba(245,220,215,0.55);
    border-bottom: 1px solid #e0b8ae;
    min-height: 0;
}
#filtro-chips:empty { display: none; padding: 0; }
.chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #9c4f3a;
    color: white;
    border-radius: 20px;
    padding: 5px 8px 5px 12px;
    font-size: 13px;
    font-weight: 600;
    animation: chipIn 0.18s ease;
}
@keyframes chipIn { from{opacity:0;transform:scale(0.85)} to{opacity:1;transform:scale(1)} }
.chip-x {
    background: rgba(255,255,255,0.28);
    border: none;
    color: white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
}
.chip-x:hover { background: rgba(255,255,255,0.5); }

/* === BANNER GPS === */
#gpsBanner {
    display: none;
    position: fixed;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2000;
    background: #1565C0;
    color: white;
    border-radius: 14px;
    padding: 12px 18px;
    font-size: 13px;
    font-family: sans-serif;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    max-width: 310px;
    width: 90%;
    text-align: center;
}
#gpsBanner.denied { background: #c62828; }
#gpsBanner button {
    margin-top: 8px;
    padding: 7px 16px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.25);
    color: white;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
}
#gpsBanner button:hover { background: rgba(255,255,255,0.4); }

/* === SIN VENTA === */
#btnSinVenta {
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #b71c1c;
    color: white;
    font-weight: 700;
    cursor: pointer;
    opacity: 0.55;
    transition: all 0.2s;
    white-space: nowrap;
}
#btnSinVenta.activo { opacity: 1; box-shadow: 0 0 0 3px rgba(183,28,28,0.35); }
#btnSinVenta:hover:not(:disabled) { opacity: 0.85; }
#btnSinVenta:disabled { opacity: 0.35; cursor: not-allowed; }

#clusterBtns { display: none; gap: 4px; align-items: center; }
#clusterBtns.visible { display: flex; }
.btn-cluster {
    font-size: 11px; padding: 6px 9px; border-radius: 8px; border: none;
    color: white; font-weight: 800; cursor: pointer; opacity: 0.6;
    transition: all 0.15s; line-height: 1;
}
.btn-cluster.activo { opacity: 1; box-shadow: 0 0 0 2px rgba(0,0,0,0.35); transform: scale(1.08); }
.btn-cluster:hover { opacity: 0.9; }
.bc-ta  { background: #7B1FA2; }
.bc-tb  { background: #9C27B0; }
.bc-tc  { background: #CE93D8; color: #4a0072; }
.bc-bro { background: #8B5E3C; }
.bc-dia { background: linear-gradient(135deg, #e0f7fa, #00E5FF); color: #004D61; text-shadow: 0 0 4px rgba(255,255,255,0.8); box-shadow: 0 0 6px rgba(0,229,255,0.5); }
.bc-oro { background: #F9A825; color: #3e2000; }
.bc-pla { background: #757575; }

#sinVentaBar {
    display: none;
    background: #b71c1c;
    color: white;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    font-family: sans-serif;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid #7f0000;
}
#sinVentaBar.visible { display: flex; }

/* === BOTÓN REUNIÓN === */
#btnReunion {
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    background: #9E9E9E;
    color: white;
    font-weight: 700;
    cursor: not-allowed;
    opacity: 0.5;
    transition: all 0.2s;
    white-space: nowrap;
}
#btnReunion.activo {
    background: #00897B;
    cursor: pointer;
    opacity: 1;
}
#btnReunion.activo:hover { background: #00695C; }

/* === MODAL PIN === */
#modalReunion {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 3000;
    align-items: center;
    justify-content: center;
}
#modalReunion.visible { display: flex; }
#modalCard {
    background: white;
    border-radius: 18px;
    padding: 28px 24px 22px;
    width: 300px;
    max-width: 92vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.28);
    text-align: center;
}
#modalCard h3 {
    margin: 0 0 4px;
    font-size: 18px;
    color: #00897B;
}
#modalRCNombre {
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
    font-weight: 600;
}
#pinBoxes {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
}
.pin-digit {
    width: 52px;
    height: 58px;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 10px;
    outline: none;
    color: #222;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
}
.pin-digit:focus { border-color: #00897B; }
#pinError {
    color: #e53935;
    font-size: 13px;
    font-weight: 600;
    min-height: 18px;
    margin-bottom: 14px;
}
#modalBtns { display: flex; gap: 10px; }
#btnPinConfirm {
    flex: 1;
    padding: 12px;
    background: #00897B;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}
#btnPinConfirm:active { opacity: 0.85; }
#btnPinCancel {
    padding: 12px 18px;
    background: #f5f5f5;
    color: #555;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>

<div id="filtro">

    <!-- 🔍 BUSCADOR -->
    <input type="text" id="buscador" placeholder="🔍 Buscar tienda o código..." />
    <div id="resultados"></div>

    <!-- FILTROS -->
    <label>Supervisor:</label>
    <select id="supFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>RC:</label>
    <select id="rcFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Día:</label>
    <select id="diaFilter">
        <option value="ALL">Todos</option>
    </select>

    <label>Zona:</label>
    <select id="zonaFilter">
        <option value="ALL">Todas</option>
    </select>

    <label>Partner:</label>
    <select id="partnerFilter">
        <option value="ALL">Todos</option>
    </select>

    <button id="btnModo" onclick="toggleModo()">🚗 Auto</button>
    <button id="btnRuta" onclick="generarRuta()">🗺️ Generar Ruta</button>
    <button id="btnLimpiarRuta" onclick="limpiarRuta()">✕ Limpiar Ruta</button>
    <button id="btnReunion" onclick="abrirModalReunion()" disabled>📅 Reunión</button>
    <button id="btnSinVenta" onclick="toggleSinVenta()">🔴 Sin Venta</button>

    <div id="clusterBtns">
        <span id="tamboClusterGroup" style="display:none;gap:4px;align-items:center;display:none">
            <button class="btn-cluster bc-ta" data-cluster="TOP A" onclick="toggleCluster(this)">A</button>
            <button class="btn-cluster bc-tb" data-cluster="TOP B" onclick="toggleCluster(this)">B</button>
            <button class="btn-cluster bc-tc" data-cluster="TOP C" onclick="toggleCluster(this)">C</button>
        </span>
        <span id="atClusterGroup" style="display:none;gap:4px;align-items:center;display:none">
            <button class="btn-cluster bc-bro" data-cluster="BRONCE"   onclick="toggleCluster(this)">B</button>
            <button class="btn-cluster bc-pla" data-cluster="PLATA"    onclick="toggleCluster(this)">P</button>
            <button class="btn-cluster bc-oro" data-cluster="ORO"      onclick="toggleCluster(this)">O</button>
            <button class="btn-cluster bc-dia" data-cluster="DIAMANTE" onclick="toggleCluster(this)">D</button>
        </span>
    </div>

</div>
<div id="filtro-chips"></div>
<div id="sinVentaBar">
    <span>🔴 Sin venta hoy · <b id="sinVentaCount">0</b> tiendas</span>
    <span style="margin-left:auto;font-weight:400;font-size:11px">Actualizado: <span id="sinVentaTs">--:--</span></span>
</div>

<!-- MODAL REUNIÓN MENSUAL -->
<div id="modalReunion">
    <div id="modalCard">
        <h3>📅 Reunión Mensual</h3>
        <div id="modalRCNombre"></div>
        <div id="pinBoxes">
            <input class="pin-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric"/>
            <input class="pin-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric"/>
            <input class="pin-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric"/>
            <input class="pin-digit" type="number" maxlength="1" min="0" max="9" inputmode="numeric"/>
        </div>
        <div id="pinError"></div>
        <div id="modalBtns">
            <button id="btnPinCancel" onclick="cerrarModalReunion()">Cancelar</button>
            <button id="btnPinConfirm" onclick="validarPinReunion()">✔ Confirmar</button>
        </div>
    </div>
</div>

<div id="panelRuta">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <strong style="font-size:15px">🗺️ Ruta por cercanía</strong>
        <button onclick="document.getElementById('panelRuta').style.display='none'" style="border:none;background:none;font-size:22px;cursor:pointer;color:#888;line-height:1">×</button>
    </div>
    <div id="listaRuta"></div>
</div>


<div id="map"></div>

<button id="btnUbicacion" onclick="irAUbicacion()" title="Mi ubicación">📍</button>

<!-- WIDGET PARTIDOS IMPORTANTES -->
<button id="btnPartidos" onclick="togglePanelPartidos()" title="Partidos importantes">
    ⚽
    <span class="badge" id="badgePartidos"></span>
</button>
<div id="panelPartidos">
    <div class="pp-header">
        <span class="pp-title">⚽ Partidos importantes</span>
        <button class="pp-close" onclick="togglePanelPartidos()">×</button>
    </div>
    <div class="pp-body" id="ppBody">
        <div class="pp-empty">Cargando...</div>
    </div>
</div>
<div id="gpsBanner">
    <div id="gpsBannerMsg"></div>
    <button id="gpsBannerBtn"></button>
</div>

<!-- Logo + crédito -->
<div style="
    position:fixed;
    bottom:10px;left:10px;
    z-index:1000;
    pointer-events:none;
    display:flex;flex-direction:column;align-items:flex-start;gap:3px;">

    "APUESTA TOTAL": "#FDD835",

function getPinBorder(responsable) {
    if (!responsable) return PIN_BORDER["DEFAULT"];
    const r = responsable.trim().toUpperCase();
    if (r.includes("APUESTA TOTAL")) return PIN_BORDER["APUESTA TOTAL"];
    if (r.includes("TAMBO"))         return PIN_BORDER["TAMBO"];
    if (r.includes("TINBET"))        return PIN_BORDER["TINBET"];
    if (r.includes("LIVESPORT"))     return PIN_BORDER["LIVESPORT"];
    if (r.includes("CENCOSUD"))      return PIN_BORDER["CENCOSUD"];
    if (r.includes("BODEGA"))        return PIN_BORDER["BODEGA"];
    return PIN_BORDER["DEFAULT"];
}

function getIconUrl(responsable) {
    if (!responsable) return "icons/default.png";
    const r = responsable.trim().toUpperCase();
    if (r.includes("APUESTA TOTAL")) return "icons/apuesta.png";
    if (r.includes("TAMBO"))         return "icons/tambo.png";
    if (r.includes("TINBET"))        return "icons/tinbet.png";
    if (r.includes("LIVESPORT"))     return "icons/livesport.png";
    if (r.includes("AUR BODEGA") || r.includes("JS BODEGA") || r.includes("MCG BODEGA")) return "icons/bodega.png";

}

// HELPERS DE ORDENAMIENTO
const DIA_ORDER = ["LUNES","MARTES","MIERCOLES","MIÉRCOLES","JUEVES","VIERNES","SABADO","SÁBADO","DOMINGO","SIN RUTA"];

function sortedLast(arr, lastValues) {
    const lasts = lastValues.map(v => v.toUpperCase());
    return arr.sort((a, b) => {
        const aLast = lasts.includes((a || "").toUpperCase());
        const bLast = lasts.includes((b || "").toUpperCase());
        if (aLast && !bLast) return 1;
        if (!aLast && bLast) return -1;
        return (a || "").localeCompare(b || "", "es");
    });
}

function sortDias(arr) {
    return arr.sort((a, b) => {
        const ai = DIA_ORDER.indexOf((a || "").toUpperCase());
        const bi = DIA_ORDER.indexOf((b || "").toUpperCase());
        if (ai === -1 && bi === -1) return (a || "").localeCompare(b || "", "es");
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
    });
}

function repoblarRC(sup) {
    const rcSelect = document.getElementById("rcFilter");
    const prevRC = rcSelect.value;
    rcSelect.innerHTML = '<option value="ALL">Todos</option>';
    const base = sup === "ALL" ? allData : allData.filter(p => p.supervisor === sup);
    const rcSet = new Set(base.map(p => p.rc));
    sortedLast([...rcSet], ["SIN RC"]).forEach(rc => {
        const opt = document.createElement("option");
        opt.value = rc; opt.text = rc;
        rcSelect.appendChild(opt);
    });
    // mantener selección si sigue disponible
    rcSelect.value = [...rcSelect.options].some(o => o.value === prevRC) ? prevRC : "ALL";
}

    data.forEach(p => {

        option.value = rc; option.text = rc;
        rcSelect.appendChild(option);
    });

    let diaSelect = document.getElementById("diaFilter");
    sortDias([...diaSet]).forEach(dia => {
        let option = document.createElement("option");
        option.value = dia; option.text = dia;
        diaSelect.appendChild(option);

// ── ESTADO DE VISITAS (localStorage por día) ──────────────────────────────
function getTodayKey() {
    const limaDate = new Date(Date.now() - 5 * 60 * 60 * 1000);
    return "visitas_mapa_" + limaDate.toISOString().slice(0, 10);
}
function getVisitasHoy() {
    return JSON.parse(localStorage.getItem(getTodayKey()) || "{}");
}
function getEstadoPunto(id) {
    const v = getVisitasHoy()[String(id)];
    if (!v)        return "libre";
    if (v.salida)  return "completado";
    return "en_visita";
}
function guardarEstadoLocal(id, tipo, hora) {
    const key = getTodayKey();
    const visitas = getVisitasHoy();
    if (!visitas[String(id)]) visitas[String(id)] = {};
    visitas[String(id)][tipo] = hora;
    localStorage.setItem(key, JSON.stringify(visitas));
}

function enviarAlSheet(p, tipo, distM) {
    const params = new URLSearchParams({
        hoja: "Visitas", tipo,
        tienda: p.nombre, id: p.ID,
        rc: p.rc || "", supervisor: p.supervisor || "",
        zona: p.zona || "", cluster: p.cluster || "",
        gz: p.gz || "", jz: p.jz || "",
        latT: p.lat, lngT: p.lng,
        latRC: userLat, lngRC: userLng,
        dist: Math.round(distM)
    });
    return fetch(SHEET_URL + "?" + params.toString(), { mode: 'no-cors' });
}

function registrarMovimiento(p, tipo, marker) {
    const safeId = String(p.ID).replace(/[^a-zA-Z0-9_-]/g, "_");
    const btn    = document.getElementById("btn-visita-" + safeId);
    const msg    = document.getElementById("msg-visita-" + safeId);
    const hora   = new Date().toTimeString().slice(0, 5);
    const distM  = haversine(userLat, userLng, p.lat, p.lng) * 1000;

    if (btn) { btn.textContent = "⏳ Registrando..."; btn.disabled = true; }

    guardarEstadoLocal(p.ID, tipo, hora);
    marker.setIcon(makePinIcon(p.responsable, getEstadoPunto(p.ID)));

    if ('vibrate' in navigator) navigator.vibrate([60, 40, 60]);
    const _mEl = marker.getElement ? marker.getElement() : null;
    if (_mEl) { _mEl.classList.add('marker-pulse'); setTimeout(() => _mEl.classList.remove('marker-pulse'), 500); }

    enviarAlSheet(p, tipo, distM)
        .then(() => {
            const estado = getEstadoPunto(p.ID);
            if (estado === "completado") {
                const v = getVisitasHoy()[String(p.ID)];
                if (btn) btn.style.display = "none";
                if (msg) {
                    msg.style.display = "block";
                    msg.style.color = "#388E3C";
                    msg.textContent = `✅ Visita completa · E: ${v.entrada} · S: ${v.salida}`;
                }
            } else {
                const v = getVisitasHoy()[String(p.ID)];
                if (btn) {
                    btn.textContent = `🔴 Registrar Salida`;
                    btn.style.background = "#E65100";
                    btn.disabled = false;
                    btn.onclick = () => registrarMovimiento(p, "salida", marker);
                }
                if (msg) {
                    msg.style.display = "block";
                    msg.style.color = "#E65100";
                    msg.textContent = `🟡 En visita · Entrada: ${v.entrada}`;
                }
            }
        })
        .catch(() => {
            guardarEstadoLocal(p.ID, tipo === "entrada" ? "_entrada_err" : "_salida_err", hora);
            if (btn) { btn.textContent = "❌ Error - reintentar"; btn.style.background = "#e53935"; btn.disabled = false; }
        });
}

function buildPopupContent(p) {
    const safeId  = String(p.ID).replace(/[^a-zA-Z0-9_-]/g, "_");
    const isElot  = (p.nombre || "").toUpperCase().includes("OFICINA ELOT");
    const color   = isElot ? "#B8860B" : getPinBorder(p.responsable);
    return `
    <div class="popup-card">
      <div class="popup-header" style="background:${color}">
        <span class="popup-nombre">${p.nombre}</span>
        <span class="popup-badge">${p.responsable || "Sin partner"}</span>
      </div>
      <div class="popup-body">
        <div class="popup-row"><span class="popup-lbl">ORG_CODE</span><span class="popup-val">${p.ID}</span></div>
        <div class="popup-row"><span class="popup-lbl">RC</span><span class="popup-val">${p.rc || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">Usuario</span><span class="popup-val">${p.username || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">Supervisor</span><span class="popup-val">${p.supervisor || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">Cluster</span><span class="popup-val">${p.cluster || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">Zona</span><span class="popup-val">${p.zona || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">Distrito</span><span class="popup-val">${p.distrito || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">GZ</span><span class="popup-val">${p.gz || "-"}</span></div>
        <div class="popup-row"><span class="popup-lbl">JZ</span><span class="popup-val">${p.jz || "-"}</span></div>
      </div>
      <button id="btn-visita-${safeId}" class="popup-btn-visita"></button>
      <div id="msg-visita-${safeId}" class="popup-msg-visita">📍 Acércate a 40m para registrar</div>
    </div>`;
}

function attachPopupOpen(marker, p) {
    const safeId = String(p.ID).replace(/[^a-zA-Z0-9_-]/g, "_");
    marker.on("popupopen", function() {
        const btn = document.getElementById("btn-visita-" + safeId);
        const msg = document.getElementById("msg-visita-" + safeId);
        if (!btn || !msg) return;

        const estado = getEstadoPunto(p.ID);
        const v      = getVisitasHoy()[String(p.ID)];

        if (estado === "completado") {
            btn.style.display = "none";
            msg.style.display = "block";
            msg.style.color   = "#388E3C";
            msg.textContent   = `✅ Visita completa · E: ${v.entrada} · S: ${v.salida}`;
            return;
        }
        if (!userLat || !userLng) {
            btn.style.display = "none";
            msg.style.display = "block";
            msg.style.color   = "#999";
            msg.textContent   = "📍 Activa GPS para registrar";
            return;
        }
        const distM = haversine(userLat, userLng, p.lat, p.lng) * 1000;
        if (distM > 40) {
            btn.style.display = "none";
            msg.style.display = "block";
            msg.style.color   = "#999";
            msg.textContent   = `📍 Estás a ${Math.round(distM)}m (necesitas 40m)`;
            return;
        }
        msg.style.display = "block";
        btn.style.display = "block";
        if (estado === "libre") {
            btn.textContent       = "🟢 Registrar Entrada";
            btn.style.background  = "#1565C0";
            btn.disabled          = false;
            msg.style.color       = "#999";
            msg.textContent       = "";
            btn.onclick = () => registrarMovimiento(p, "entrada", marker);
        } else {
            btn.textContent       = "🔴 Registrar Salida";
            btn.style.background  = "#E65100";
            btn.disabled          = false;
            msg.style.color       = "#E65100";
            msg.textContent       = `🟡 En visita · Entrada: ${v.entrada}`;
            btn.onclick = () => registrarMovimiento(p, "salida", marker);
        }
    });
}

function renderMap(filterRC, filterDia, filterSup, filterPartner, filterZona) {

    markersLayer.clearLayers();

    let filtered = allData.filter(p =>
        !(p.nombre || "").toUpperCase().includes("OFICINA ELOT") &&
        (p.estado || "").toUpperCase() === "ACTIVO" &&
        (filterSup     === "ALL" || p.supervisor  === filterSup) &&
        (filterRC      === "ALL" || p.rc          === filterRC) &&
        (filterDia     === "ALL" || (p.dias && p.dias.includes(filterDia))) &&
        (filterPartner === "ALL" || p.responsable === filterPartner) &&
        (filterZona    === "ALL" || p.zona        === filterZona) &&
        (activeCluster === null  || (p.cluster || "").toUpperCase() === activeCluster)
    );
    currentFiltered = filtered;

    let group = new L.featureGroup();

    filtered.forEach(p => {

    let icon = makePinIcon(p.responsable, getEstadoPunto(p.ID));

    let marker = L.marker([p.lat, p.lng], { icon: icon });
    marker.bindPopup(buildPopupContent(p));
    attachPopupOpen(marker, p);
    markersLayer.addLayer(marker);
    group.addLayer(marker);
});

if (filtered.length > 0 && (filterRC !== "ALL" || filterDia !== "ALL" || filterPartner !== "ALL" || filterSup !== "ALL")) {
    map.fitBounds(group.getBounds(), { padding: [30, 30] });
}

if (sinVentaActive) renderSinVentaLayer();

}

// PERSISTENCIA DE FILTROS
function saveFilters() {
    localStorage.setItem("filtros_mapa", JSON.stringify({
        sup:     document.getElementById("supFilter").value,
        rc:      document.getElementById("rcFilter").value,
        dia:     document.getElementById("diaFilter").value,
        partner: document.getElementById("partnerFilter").value,
        zona:    document.getElementById("zonaFilter").value
    }));
}

function restoreFilters() {
    const saved = JSON.parse(localStorage.getItem("filtros_mapa") || "{}");
    if (!saved.sup) return;

    const supSel = document.getElementById("supFilter");
    if ([...supSel.options].some(o => o.value === saved.sup)) {
        supSel.value = saved.sup;
        repoblarRC(saved.sup);
    }

    const rcSel = document.getElementById("rcFilter");
    if (saved.rc && [...rcSel.options].some(o => o.value === saved.rc))
        rcSel.value = saved.rc;

    const diaSel = document.getElementById("diaFilter");
    if (saved.dia && [...diaSel.options].some(o => o.value === saved.dia))
        diaSel.value = saved.dia;

    repoblarPartner(supSel.value, rcSel.value);

    const partnerSel = document.getElementById("partnerFilter");
    if (saved.partner && [...partnerSel.options].some(o => o.value === saved.partner))
        partnerSel.value = saved.partner;

    const zonaSel = document.getElementById("zonaFilter");
    if (saved.zona && [...zonaSel.options].some(o => o.value === saved.zona))
        zonaSel.value = saved.zona;
}

// FILTROS
function repoblarPartner(sup, rc) {
    const sel = document.getElementById("partnerFilter");
    const prev = sel.value;
    sel.innerHTML = '<option value="ALL">Todos</option>';
    const base = allData.filter(p =>
        (sup === "ALL" || p.supervisor === sup) &&
        (rc  === "ALL" || p.rc === rc)
    );
    const partners = [...new Set(base.map(p => p.responsable).filter(Boolean))].sort();
    partners.forEach(v => {
        const o = document.createElement("option");
        o.value = v; o.text = v;
        sel.appendChild(o);
    });
    sel.value = [...sel.options].some(o => o.value === prev) ? prev : "ALL";
}

document.getElementById("supFilter").addEventListener("change", function() {
    repoblarRC(this.value);
    repoblarPartner(this.value, document.getElementById("rcFilter").value);
    updateFilters();
});
document.getElementById("rcFilter").addEventListener("change", function() {
    repoblarPartner(document.getElementById("supFilter").value, this.value);
    updateFilters();
});
document.getElementById("diaFilter").addEventListener("change", updateFilters);
document.getElementById("zonaFilter").addEventListener("change", updateFilters);
document.getElementById("partnerFilter").addEventListener("change", function() {
    updateClusterButtons();
    updateFilters();
});

function toggleCluster(btn) {
    const cluster = btn.dataset.cluster;
    if (activeCluster === cluster) {
        activeCluster = null;
        btn.classList.remove("activo");
    } else {
        document.querySelectorAll(".btn-cluster").forEach(b => b.classList.remove("activo"));
        activeCluster = cluster;
        btn.classList.add("activo");
    }
    updateFilters();
}

function updateClusterButtons() {
    const partner = (document.getElementById("partnerFilter").value || "").toUpperCase();
    const tamboGroup = document.getElementById("tamboClusterGroup");
    const atGroup    = document.getElementById("atClusterGroup");
    const container  = document.getElementById("clusterBtns");
    activeCluster = null;
    document.querySelectorAll(".btn-cluster").forEach(b => b.classList.remove("activo"));
    if (partner.includes("TAMBO")) {
        tamboGroup.style.display = "flex";
        atGroup.style.display    = "none";
        container.classList.add("visible");
    } else if (partner.includes("APUESTA TOTAL")) {
        tamboGroup.style.display = "none";
        atGroup.style.display    = "flex";
        container.classList.add("visible");
    } else {
        tamboGroup.style.display = "none";
        atGroup.style.display    = "none";
        container.classList.remove("visible");
    }
}

function updateFilters() {
    let rc      = document.getElementById("rcFilter").value;
    let sup     = document.getElementById("supFilter").value;
    let partner = document.getElementById("partnerFilter").value;
    let zona    = document.getElementById("zonaFilter").value;
    let btnRuta = document.getElementById("btnRuta");
    if (rc !== "ALL") {
        btnRuta.classList.add("activo");
    } else {
        btnRuta.classList.remove("activo");
        limpiarRuta();
    }
    renderMap(rc, document.getElementById("diaFilter").value, sup, partner, zona);
    updateChips();
    saveFilters();
}

function updateChips() {
    const container = document.getElementById("filtro-chips");
    container.innerHTML = "";

    const defs = [
        {
            id: "supFilter", label: "Supervisor",

async function initGeolocation() {
    if (!navigator.geolocation) return;
    if (navigator.permissions) {
        try {
            const result = await navigator.permissions.query({ name: 'geolocation' });
            if (result.state === 'granted') {
                startWatchPosition();
            } else if (result.state === 'denied') {
                mostrarGPSBanner('denied');
            } else {
                mostrarGPSBanner('prompt');
                startWatchPosition();
            }
            result.onchange = () => {
                if (result.state === 'granted') { ocultarGPSBanner(); startWatchPosition(); }
                else if (result.state === 'denied') mostrarGPSBanner('denied');
            };
            return;
        } catch(e) {}
    }
    startWatchPosition();
}

const ORS_PROFILE = { driving: 'driving-car', foot: 'foot-walking' };

async function fetchChunk(pts, mode) {
    // Intento 1: OSRM
    try {
        let coordStr = pts.map(p => `${p.lng},${p.lat}`).join(';');
        let res = await fetch(`https://router.project-osrm.org/route/v1/${mode}/${coordStr}?overview=full&geometries=geojson`);
        if (res.ok) {
            let data = await res.json();
            if (data.code === 'Ok' && data.routes[0]) return data.routes[0].geometry;
        }
    } catch(e) { console.warn('OSRM error:', e.message); }

    // Intento 2: OpenRouteService (requiere ORS_KEY)
    if (ORS_KEY) {
        try {
            let profile = ORS_PROFILE[mode] || 'driving-car';
            let res = await fetch(`https://api.openrouteservice.org/v2/directions/${profile}/geojson`, {
                method: 'POST',
                headers: { 'Authorization': ORS_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ coordinates: pts.map(p => [p.lng, p.lat]) })
            });
            if (res.ok) {
                let data = await res.json();
                if (data.features?.[0]) return data.features[0].geometry;
            }
        } catch(e) { console.warn('ORS error:', e.message); }
    }

    return null;
}

async function fetchRutaOSRM(waypoints, mode) {
    const CHUNK = 15;
    let allCoords = [];
    let algunPuntoOmitido = false;

    for (let i = 0; i < waypoints.length - 1; i += CHUNK - 1) {
        let slice = waypoints.slice(i, Math.min(i + CHUNK, waypoints.length));
        if (slice.length < 2) break;

        let geom = await fetchChunk(slice, mode);
        if (!geom) {
            // Sin cobertura: ignorar tramo, continuar sin línea recta
            algunPuntoOmitido = true;
            continue;
        }

        let coords = geom.coordinates;
        if (allCoords.length > 0) coords = coords.slice(1);
        allCoords = allCoords.concat(coords);
    }

    if (allCoords.length < 2) return null;
    return { type: 'LineString', coordinates: allCoords, parcial: algunPuntoOmitido };
}

// UTILIDADES DE RUTA
function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function nearestNeighborAlgo(startLat, startLng, puntos) {
    let remaining = [...puntos];
    let ordered = [];
    let curLat = startLat, curLng = startLng;
    while (remaining.length > 0) {
        let minDist = Infinity, minIdx = 0;
        remaining.forEach((p, i) => {
            let d = haversine(curLat, curLng, p.lat, p.lng);
            if (d < minDist) { minDist = d; minIdx = i; }
        });
        ordered.push(remaining[minIdx]);
        curLat = remaining[minIdx].lat;
        curLng = remaining[minIdx].lng;
        remaining.splice(minIdx, 1);
    }
    return ordered;
}

// 2-opt: elimina cruces mejorando el orden iterativamente
// pts[0] = ubicación del usuario (fijo), resto = tiendas
function twoOpt(pts) {
    let n = pts.length;
    let improved = true;
    let maxIter = 300;
    while (improved && maxIter-- > 0) {
        improved = false;
        for (let i = 0; i < n - 2; i++) {
            for (let j = i + 2; j < n; j++) {
                let d1 = haversine(pts[i].lat, pts[i].lng, pts[i+1].lat, pts[i+1].lng)
                       + (j+1 < n ? haversine(pts[j].lat, pts[j].lng, pts[j+1].lat, pts[j+1].lng) : 0);
                let d2 = haversine(pts[i].lat, pts[i].lng, pts[j].lat, pts[j].lng)
                       + (j+1 < n ? haversine(pts[i+1].lat, pts[i+1].lng, pts[j+1].lat, pts[j+1].lng) : 0);
                if (d2 < d1 - 1e-9) {
                    pts = [...pts.slice(0, i+1), ...pts.slice(i+1, j+1).reverse(), ...pts.slice(j+1)];
                    improved = true;
                }
            }
        }
    }
    return pts.slice(1); // devuelve sin el punto de inicio
}

// OSRM /trip: resuelve TSP + calcula ruta por calles en una sola llamada
async function fetchTripOSRM(allWaypoints, mode) {
    try {
        let coordStr = allWaypoints.map(p => `${p.lng},${p.lat}`).join(';');
        let res = await fetch(
            `https://router.project-osrm.org/trip/v1/${mode}/${coordStr}?source=first&roundtrip=false&geometries=geojson&overview=full`
        );
        if (!res.ok) { console.warn('OSRM trip HTTP:', res.status); return null; }
        let data = await res.json();
        if (data.code !== 'Ok' || !data.trips || !data.trips[0]) {
            console.warn('OSRM trip code:', data.code); return null;
        }
        // Reconstruir orden óptimo desde waypoint_index
        let ordered = data.waypoints
            .map((wp, i) => ({ wp, i }))
            .filter(x => x.i > 0)
            .sort((a, b) => a.wp.waypoint_index - b.wp.waypoint_index)
            .map(x => allWaypoints[x.i]);
        return { geom: data.trips[0].geometry, ordered };
    } catch(e) {
        console.warn('OSRM trip error:', e.message); return null;
    }
}

            .addTo(routeMarkersLayer);
    });

    // Trazar ruta

        distTotal += haversine(prevLat, prevLng, p.lat, p.lng);
        prevLat = p.lat; prevLng = p.lng;
    });

    let estado = !geom
        ? `<span style="color:#FF9800;font-weight:600">⚠️ Sin cobertura vial</span>`
        : geom.parcial
            ? `<span style="color:#FF9800;font-weight:600">⚠️ Algunos puntos omitidos por falta de cobertura</span>`
            : `<span style="color:#388E3C;font-weight:600">✅ Ruta optimizada por calles</span>`;

    let lista = document.getElementById("listaRuta");
    lista.innerHTML = `<div style="font-size:12px;color:#666;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee">
        <b>${ordered.length} paradas</b> · ~${distTotal.toFixed(1)} km<br>${estado}

    document.getElementById("btnLimpiarRuta").style.display = "inline-block";
    if (routeLayer) map.fitBounds(routeLayer.getBounds(), { padding: [30, 30] });
}

async function generarRuta() {
    if (!document.getElementById("btnRuta").classList.contains("activo")) return;
    if (!userLat || !userLng) {
        alert("Esperando señal GPS. Asegúrate de haber dado permiso de ubicación.");
        return;
    }
    if (currentFiltered.length === 0) {
        alert("No hay puntos visibles en el mapa.");
        return;
    }

    limpiarRuta();

    let btnRuta = document.getElementById("btnRuta");
    btnRuta.textContent = "⏳ Optimizando...";
    btnRuta.classList.remove("activo");

    try {
        // Paso 1: vecino más cercano + 2-opt (rápido, síncrono)
        let puntos = currentFiltered.slice(0, 99);
        let nnOrdered = nearestNeighborAlgo(userLat, userLng, puntos);
        let ordered = twoOpt([{ lat: userLat, lng: userLng }, ...nnOrdered]);

        // Paso 2: OSRM /trip — orden óptimo TSP + calles en una llamada
        let allWaypoints = [{ lat: userLat, lng: userLng }, ...puntos];
        let tripResult = await fetchTripOSRM(allWaypoints, routeMode);

        let geom = null;
        if (tripResult) {
            ordered = tripResult.ordered;
            geom = tripResult.geom;
        } else {
            // Paso 3: 2-opt como orden + /route con snap automático para zonas aisladas
            geom = await fetchRutaOSRM([{ lat: userLat, lng: userLng }, ...ordered], routeMode);
        }

        dibujarMarcadoresYPanel(ordered, geom);
    } catch(e) {
        console.error('Error generando ruta:', e);
        document.getElementById("listaRuta").innerHTML =
            `<div style="color:#c62828;padding:12px;font-size:13px">❌ Error inesperado al calcular la ruta.<br>Revisa la consola para más detalles.</div>`;
        document.getElementById("panelRuta").style.display = "block";
    } finally {
        btnRuta.textContent = "🗺️ Generar Ruta";
        btnRuta.classList.add("activo");
    }
}

function fetchSinVenta() {
    return fetch(SIN_VENTA_URL)
        .then(r => r.text())
        .then(text => {
            // Formato: "2026-05-20 10:27|{[C]:"122",[U]:"10:08:58"}[C]{...}"
            const pipeIdx = text.indexOf('|');
            svTimestamp   = pipeIdx >= 0 ? text.slice(0, pipeIdx).trim() : '';
            const records = pipeIdx >= 0 ? text.slice(pipeIdx + 1) : text;

            sinVentaCodes = new Set();
            sinVentaTimes = {};
            (records.match(/\{[^}]+\}/g) || []).forEach(m => {
                try {
                    const r    = JSON.parse(m);
                    const code = String(r['[C]'] || '').trim();
                    if (code) {
                        sinVentaCodes.add(code);
                        sinVentaTimes[code] = String(r['[U]'] || '').trim();
                    }
                } catch(e) {}
            });

            const tsEl = document.getElementById("sinVentaTs");
            if (tsEl) tsEl.textContent = (svTimestamp.slice(11) || svTimestamp) + ` (${sinVentaCodes.size} cód.)`;

            if (sinVentaActive) renderSinVentaLayer();

        .catch(e => console.warn('SinVenta error:', e));

// === WIDGET PARTIDOS IMPORTANTES ==========================================
const PARTIDOS_URL = 'https://raw.githubusercontent.com/Leonardow33/CALENDARIO-INTERACTIVO-PARTIDOS/main/partidos.json';
const LIGA_COLOR = {
    'Liga 1 Perú':      '#D4001A',
    'Libertadores':     '#1A3A6B',
    'Sudamericana':     '#0D7A4E',
    'Champions League': '#001E62',
    'Europa League':    '#FF6600',
    'Premier League':   '#3D195B'
};

let partidosLoaded = false;

function getWeekRange() {
    const today = new Date(); today.setHours(0,0,0,0);
    const dow = today.getDay();
    const monday = new Date(today);
    monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return { start: monday, end: sunday };
}

function parseMatchDay(dayStr) {
    const months = { Jan:0, Feb:1, Mar:2, Apr:3, May:4, Jun:5, Jul:6, Aug:7, Sep:8, Oct:9, Nov:10, Dec:11 };
    const [d, m] = dayStr.trim().split(' ');
    return new Date(new Date().getFullYear(), months[m], parseInt(d));
}

function formatDayLabel(dayStr) {
    const labels = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const d = parseMatchDay(dayStr);
    return `${labels[d.getDay()]} ${dayStr}`;
}

async function loadPartidos() {
    const body = document.getElementById('ppBody');
    try {
        const res = await fetch(PARTIDOS_URL + '?v=' + Date.now());
        const json = await res.json();
        const { start, end } = getWeekRange();

        const matches = (json.matches || []).filter(m => {
            if (!m.importante) return false;
            const d = parseMatchDay(m.day);
            return d >= start && d <= end;
        });

        if (matches.length === 0) {
            body.innerHTML = '<div class="pp-empty">No hay partidos importantes esta semana.</div>';
            return;
        }

        const grouped = {};
        matches.forEach(m => { (grouped[m.day] = grouped[m.day] || []).push(m); });
        const sortedDays = Object.keys(grouped).sort((a, b) => parseMatchDay(a) - parseMatchDay(b));

        body.innerHTML = sortedDays.map(day => {
            const rows = grouped[day].map(m => {
                const color = LIGA_COLOR[m.liga] || '#888';
                return `<div class="pp-match">
                    <div class="pp-bar" style="background:${color}"></div>
                    <div class="pp-info">
                        <div class="pp-teams">${m.home} <span class="pp-vs">vs</span> ${m.away}</div>
                        <div class="pp-meta">
                            <span class="pp-time">${m.time}</span>
                            <span class="pp-liga">${m.liga}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
            return `<div class="pp-day">${formatDayLabel(day)}</div>${rows}`;
        }).join('');

        const badge = document.getElementById('badgePartidos');
        badge.textContent = matches.length;
        badge.style.display = 'block';
        partidosLoaded = true;
    } catch(e) {
        body.innerHTML = '<div class="pp-empty">No se pudieron cargar los partidos.</div>';
    }
}

function togglePanelPartidos() {
    const panel = document.getElementById('panelPartidos');
    const visible = panel.classList.toggle('visible');
    if (visible && !partidosLoaded) loadPartidos();
}

// Pre-cargar en background para mostrar el badge sin que el usuario abra el panel
loadPartidos();
