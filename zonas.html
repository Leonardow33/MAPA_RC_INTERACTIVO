<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Distribución de Zonas RC</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/zonas.css">
</head>
<body>

<div id="topbar">
    <h1>📍 Distribución de Zonas RC</h1>

    <div class="fg">
        <label>Supervisor</label>
        <select id="fSup"><option value="ALL">Todos</option></select>
    </div>
    <div class="fg">
        <label>RC</label>
        <select id="fRC"><option value="ALL">Todos</option></select>
    </div>
    <div class="fg">
        <label>Día</label>
        <select id="fDia"><option value="ALL">Todos</option></select>
    </div>
    <div class="fg">
        <label>Tipo</label>
        <select id="fTipo">
            <option value="ALL">Todos</option>
            <option value="TAMBO">Tambo</option>
            <option value="CASA DE APUESTA">Casa de Apuesta</option>
        </select>
    </div>
    <div class="fg">
        <label>Zona</label>
        <select id="fZona">
            <option value="ALL">Lima + Provincia</option>
            <option value="LIMA">Solo Lima</option>
            <option value="PROVINCIA">Solo Provincia</option>
        </select>
    </div>

    <div class="fg" id="buscarWrap">
        <div id="buscarBox">
            <input id="buscarInput" type="text" placeholder="🔍 Nombre o código..." autocomplete="off"
                   oninput="onBuscar(this.value)" onblur="setTimeout(()=>cerrarSugerencias(),150)"/>
            <div id="buscarSugerencias"></div>
        </div>
    </div>
    <div class="fg">
        <input type="color" id="colorZona" value="#22c55e" title="Color de la zona" style="width:28px;height:28px;border:none;background:none;cursor:pointer;padding:0;border-radius:6px">
        <button id="btnDibujar" onclick="toggleDibujo()">✏ Dibujar zona</button>
        <button id="btnExportarZonas" onclick="exportarZonas()" title="Descargar zonas-manuales.json para subir a GitHub">⬇ Exportar</button>
    </div>
    <button id="btnReset" onclick="resetFiltros()">↺ Limpiar</button>
    <button id="btnMalUbicados" onclick="descargarMalUbicados()" title="Detecta y descarga tiendas cuya coordenada no coincide con su distrito asignado" style="display:none">⚠ Mal ubicados</button>
    <span id="contador">— puntos</span>
</div>

<div id="seleccionTipo">
    <div class="st-logo">
        <h1>Distribución de Zonas RC</h1>
        <p>Selecciona el tipo de puntos a visualizar</p>
    </div>
    <div class="st-cards">
        <div class="st-card" onclick="elegirTipoZona('TAMBO')">
            <span class="st-icon">🏪</span>
            <span class="st-name">Tambo</span>
            <span class="st-desc">Tiendas Tambo</span>
        </div>
        <div class="st-card" onclick="elegirTipoZona('CASA DE APUESTA')">
            <span class="st-icon">🎰</span>
            <span class="st-name">Casa de Apuesta</span>
            <span class="st-desc">Casas de Apuesta</span>
        </div>
    </div>
    <div class="st-footer">
        <span onclick="elegirTipoZona('ALL')">Ver todos los puntos</span>
    </div>
</div>

<div id="layout">
    <div id="panel">
        <div id="panelHeader">Cargando...</div>
        <div id="panelToggleBar">
            <button class="panel-tab activo" id="tabRC"  onclick="setViewMode('rc')">Por RC</button>
            <button class="panel-tab"         id="tabDia" onclick="setViewMode('dia')">Por Día</button>
        </div>
        <div id="rcList"></div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="js/zonas.js"></script>

</body>
</html>
